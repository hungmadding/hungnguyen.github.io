<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Profile Light Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00a8ff; /* Màu xanh dương chủ đạo */
            --text: #2f3640; 
            --glass: rgba(255, 255, 255, 0.5); /* Kính trắng trong suốt */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            font-family: 'Quicksand', sans-serif; 
            background: #f5f6fa; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* NỀN SÁNG VỚI GRADIENT NHẸ */
        .bg-overlay { 
            position: fixed; inset: 0; z-index: -2; 
            background: linear-gradient(135deg, #e0f7fa 0%, #ffffff 100%);
            background-image: url('https://i.pinimg.com/originals/a0/0c/33/a00c33a948e7b9b1e9b1e9b1e9b1e9b1.jpg'); /* Có thể thay ảnh nền sáng hơn tại đây */
            background-size: cover;
            background-position: center;
            filter: brightness(1.1);
        }

        #particles { position: fixed; inset: 0; z-index: -1; }

        /* CARD LIGHT GLASSMORPHISM */
        .container { perspective: 1000px; }
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            text-align: left; /* Căn trái giống ảnh mẫu */
            position: relative;
        }

        /* AVATAR TRÒN VỚI VIỀN XANH */
        .header-flex { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .avatar { 
            width: 90px; height: 90px; border-radius: 50%; 
            border: 3px solid var(--primary); 
            padding: 3px; background: #fff;
        }
        
        .info h1 { font-size: 24px; color: var(--text); }
        .info h1 span { color: var(--primary); }

        .bio-text { 
            font-size: 14px; color: #57606f; line-height: 1.6; 
            margin-bottom: 25px; border-left: 3px solid var(--primary);
            padding-left: 15px;
        }

        /* CÁC NÚT SOCIAL */
        .social-icons { display: flex; gap: 15px; margin-top: 20px; }
        .social-icons a {
            width: 40px; height: 40px; background: #fff;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; color: var(--text);
            text-decoration: none; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .social-icons a:hover { 
            background: var(--primary); color: #fff; 
            transform: translateY(-5px);
        }

        /* MUSIC PLAYER MINI */
        .music-player {
            position: absolute; bottom: -80px; right: 0;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 20px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .play-btn { 
            width: 35px; height: 35px; background: var(--primary); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: #fff; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <canvas id="particles"></canvas>

    <div class="container">
        <div class="card">
            <div class="header-flex">
                <img src="https://i.imgur.com/uIKY94v.png" class="avatar" alt="Hùng Madding">
                <div class="info">
                    <h1>Hey, I'm <span>Hùng Madding</span> 👋</h1>
                    <p style="font-size: 12px; color: #2ecc71;"><i class="fas fa-circle"></i> Online</p>
                </div>
            </div>

            <div class="bio-text">
                Mình là một <b>Python Developer</b> đam mê với các giải pháp tự động hóa. Hiện tại đang học tập tại lớp 11A6 và không ngừng khám phá thế giới lập trình.
            </div>

            <p style="font-size: 13px; color: #7f8c8d;"><i class="fas fa-location-dot"></i> Việt Nam</p>

            <div class="social-icons">
                <a href="https://facebook.com/hung.madding" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://tiktok.com/@hung_md3" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://github.com/hungmadding" target="_blank"><i class="fab fa-github"></i></a>
            </div>

            <div class="music-player">
                <div class="play-btn" id="playBtn"><i class="fas fa-play"></i></div>
                <div>
                    <p style="font-size: 12px; font-weight: bold;">Ân Tình Sang Trang</p>
                    <p style="font-size: 10px; color: #7f8c8d;">Remix Audio</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            if(audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        });

        // TUYẾT TRẮNG/XANH NHẠT CHO TÔNG SÁNG
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<60; i++) {
                dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*3+1, v: Math.random()*0.5+0.2 });
            }
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 168, 255, 0.3)";
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI*2); ctx.fill();
                d.y += d.v; if(d.y > canvas.height) d.y = -10;
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
