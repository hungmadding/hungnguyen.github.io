<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Profile</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077;
            --pink-dark: #cc005f;
            --glass: rgba(15, 10, 15, 0.15);
            --glass-border: rgba(255, 77, 148, 0.25);
            --bg-dark: #050505;
            --text-main: #ffffff;
            --verified-color: #ff5ca1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { height: 100dvh; width: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg-dark); overflow: hidden; color: var(--text-main); }

        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0; filter: brightness(0.8) contrast(1.1);
        }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-foreground { z-index: 10001; }

        #overlay {
            position: fixed; inset: 0;
            z-index: 99999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
            background: #000; overflow: hidden;
        }

        #overlay.fade-out { opacity: 0; transform: scale(1.3); pointer-events: none; }

        .loading-bg-full {
            position: absolute; inset: 0;
            background: url('anhcho.jpg') no-repeat center center;
            background-size: cover; z-index: -1; filter: brightness(0.5); 
        }

        .loading-content { 
            position: relative; z-index: 2; display: flex; 
            flex-direction: column; align-items: center; width: 90%; 
            background: rgba(0,0,0,0.2); padding: 40px 0; border-radius: 20px;
        }

        .loading-name { 
            font-family: 'Fira Code', monospace; 
            font-size: clamp(24px, 8vw, 32px); 
            font-weight: 700; letter-spacing: 10px; 
            text-shadow: 0 0 30px var(--pink-glow); margin-bottom: 25px; color: #fff; 
        }

        .loader-container { width: 85%; max-width: 350px; transition: opacity 0.5s; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 20px var(--pink); transition: width 0.2s; }
        .status-box { display: flex; justify-content: space-between; font-family: 'Fira Code', monospace; font-size: 10px; color: var(--pink); font-weight: bold; }

        .enter-btn { 
            position: relative; overflow: hidden;
            display: none; background: rgba(0,0,0,0.6); border: 2.5px solid var(--pink); 
            color: var(--pink); padding: 15px 40px; font-family: 'Fira Code', monospace; 
            font-weight: 700; font-size: 14px; letter-spacing: 3px; border-radius: 15px; 
            cursor: pointer; text-transform: uppercase; transition: all 0.4s; 
            margin-top: -10px; backdrop-filter: blur(5px);
        }

        .main-wrapper { 
            position: relative; height: 100dvh; width: 100%; display: flex; 
            justify-content: center; align-items: center; z-index: 10; 
            opacity: 0; visibility: hidden; perspective: 2000px; padding: 20px; 
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            transform: scale(0.8) translateY(30px); filter: blur(10px);
            will-change: transform, opacity;
        }

        .main-wrapper.active { 
            opacity: 1; visibility: visible; 
            transform: scale(1) translateY(0); filter: blur(0);
        }

        .card > * { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .main-wrapper.active .card > * { opacity: 1; transform: translateY(0); }
        .main-wrapper.active .avatar-box { transition-delay: 0.3s; }
        .main-wrapper.active .waviy { transition-delay: 0.5s; }
        .main-wrapper.active .info-status { transition-delay: 0.6s; }
        .main-wrapper.active .typewriter { transition-delay: 0.7s; }
        .main-wrapper.active .links-container { transition-delay: 0.9s; }

        .card { 
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-radius: 40px; width: 100%; max-width: 360px; padding: 40px 25px; 
            text-align: center; border: 1px solid var(--glass-border); position: relative; 
            overflow: hidden; z-index: 1;
        }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, var(--pink), transparent, transparent); animation: rotateLED 4s linear infinite; z-index: -1; }
        .card::after { content: ''; position: absolute; inset: 2px; background: #0a050a; border-radius: 38px; z-index: -1; }
        
        .avatar-box { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--pink); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--pink-glow); }
        .avatar-box span { color: var(--pink); font-size: 45px; font-weight: 900; }
        
        .waviy { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; margin-bottom: 5px; font-size: clamp(18px, 5vw, 22px); font-weight: 700; line-height: 1.4; }
        .waviy span { position: relative; display: inline-block; animation: waviy 3s infinite; animation-delay: calc(.1s * var(--i)); color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px var(--pink-glow); }

        .verified-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 17px; height: 17px; background: var(--verified-color);
            border-radius: 50%; color: #fff; font-size: 9px; margin-left: 6px;
            box-shadow: 0 0 10px var(--verified-color); position: relative; top: -2px;
        }

        .info-status { 
            display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; 
            font-family: 'Fira Code', monospace; font-size: 12px; color: #ccc; 
        }
        .info-status span { display: flex; align-items: center; gap: 6px; }
        .info-status b { color: var(--pink); text-shadow: 0 0 8px var(--pink-glow); }
        .online-dot { animation: statusPulse 1.5s infinite; }
        @keyframes statusPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }

        .typewriter { font-family: 'Fira Code', monospace; font-size: 12px; color: var(--pink); min-height: 35px; margin-bottom: 20px; line-height: 1.4; }
        
        .link-item { 
            position: relative; overflow: hidden;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 77, 148, 0.2); 
            border-radius: 12px; padding: 12px 18px; color: #fff; text-decoration: none; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 12px; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); font-size: 14px; z-index: 1;
        }

        .link-item span { transition: all 0.3s ease; font-weight: 600; color: #fff; }
        .link-item i { font-size: 18px; transition: all 0.3s ease; }

        @keyframes glowPulseBlue { 0%, 100% { filter: drop-shadow(0 0 2px #1877f2) brightness(1); } 50% { filter: drop-shadow(0 0 12px #1877f2) brightness(1.6); } }
        @keyframes glowPulseWhite { 0%, 100% { filter: drop-shadow(0 0 2px #fff) brightness(1); } 50% { filter: drop-shadow(0 0 12px #fff) brightness(1.6); } }
        @keyframes glowPulsePink { 0%, 100% { filter: drop-shadow(0 0 2px var(--pink)) brightness(1); } 50% { filter: drop-shadow(0 0 12px var(--pink)) brightness(1.6); } }
        @keyframes glowPulseTikTok { 0%, 100% { filter: drop-shadow(-1.5px 0 0 #00f2ea) drop-shadow(1.5px 0 0 #ff0050) brightness(1); } 50% { filter: drop-shadow(-2.5px 0 0 #00f2ea) drop-shadow(2.5px 0 0 #ff0050) drop-shadow(0 0 12px #fff) brightness(1.6); } }

        .link-item i { animation-duration: 2s !important; animation-iteration-count: infinite !important; animation-timing-function: ease-in-out !important; }
        .link-item[href*="facebook"] i { color: #1877f2; animation: glowPulseBlue 2s infinite ease-in-out; }
        .link-item[href*="facebook"] span { text-shadow: 0 0 5px #fff, 0 0 10px #1877f2; }
        .link-item[href*="tiktok"] i { color: #fff; animation: glowPulseTikTok 2s infinite ease-in-out; font-size: 19px; }
        .link-item[href*="tiktok"] span { color: #fff; text-shadow: 0 0 5px #fff, -1px 0 2px #00f2ea, 1px 0 2px #ff0050; }
        .link-item[href*="github"] i { color: #fff; animation: glowPulseWhite 2s infinite ease-in-out; }
        .link-item[href*="github"] span { text-shadow: 0 0 5px #fff, 0 0 10px #fff; }
        .link-item.about-me i { color: var(--pink); animation: glowPulsePink 2s infinite ease-in-out; font-size: 19px; }
        .link-item.about-me span { text-shadow: 0 0 5px #fff, 0 0 10px var(--pink); }

        .link-item:hover { background: rgba(255, 255, 255, 0.08); border-color: #fff; transform: translateY(-2px); cursor: pointer; }
        .link-item:hover span { transform: translateX(5px); }
        .link-item:hover i { transform: scale(1.2); filter: brightness(1.5) !important; }

        .system-time { position: fixed; top: 15px; left: 15px; z-index: 10005; font-family: 'Fira Code', monospace; color: var(--pink); text-shadow: 0 0 15px var(--pink-glow); display: none; }

        /* --- PLAYER WIDGET --- */
        .music-player {
            position: fixed; top: 20px; right: 20px; width: 280px;
            background: rgba(10, 10, 10, 0.85); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; z-index: 10005;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; font-family: 'Fira Code', monospace;
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.2);
        }
        .music-icon-floating {
            position: absolute; top: -10px; right: -10px;
            background: var(--pink); color: #000;
            width: 25px; height: 25px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; box-shadow: 0 0 10px var(--pink-glow);
        }

        #playlist-menu { display: none; max-height: 150px; overflow-y: auto; margin-bottom: 10px; padding-right: 5px; }
        #playlist-menu::-webkit-scrollbar { width: 3px; }
        #playlist-menu::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }
        .track-item { padding: 8px; margin-bottom: 5px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; color: #ccc; }
        .track-item:hover { background: rgba(255, 77, 148, 0.1); border-color: var(--pink); color: #fff; }
        .track-item.active { background: rgba(255, 77, 148, 0.2); color: var(--pink); border-color: var(--pink); font-weight: bold; }

        .song-info { margin-bottom: 12px; }
        .song-title { color: var(--pink); font-size: 13px; font-weight: bold; text-shadow: 0 0 10px var(--pink-glow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { color: #888; font-size: 10px; margin-top: 4px; }
        .progress-container { flex-grow: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; cursor: pointer; margin: 10px 0; }
        .progress-bar-music { height: 100%; background: var(--pink); width: 0%; border-radius: 2px; box-shadow: 0 0 8px var(--pink-glow); }
        .time-display { font-size: 9px; color: #666; display: flex; justify-content: space-between; }
        .player-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .play-btns { display: flex; gap: 15px; align-items: center; }
        .play-btns i { color: #fff; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .play-btns i:hover { color: var(--pink); transform: scale(1.2); filter: brightness(1.5); }
        #mainPlayBtn { font-size: 18px; color: var(--pink); }

        #greeting-toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 77, 148, 0.3); border: 1px solid var(--pink);
            padding: 10px 20px; border-radius: 20px; backdrop-filter: blur(10px);
            color: #fff; font-weight: 600; font-size: 12px; z-index: 10006;
            opacity: 0; visibility: hidden; transition: all 0.8s;
            text-align: center; width: 80%; max-width: 300px;
        }
        #greeting-toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 8px; opacity: 0.4; font-family: 'Fira Code'; }
        
        @keyframes waviy { 0%, 40%, 100% { transform: translateY(0); } 20% { transform: translateY(-4px); } }
        @keyframes rotateLED { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 15px var(--pink-glow); } 50% { box-shadow: 0 0 30px var(--pink-glow); } 100% { box-shadow: 0 0 15px var(--pink-glow); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 0.5; } 100% { width: 500px; height: 500px; opacity: 0; } }

        @media (max-width: 768px) {
            .card { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
            .music-player { width: 220px; right: 10px; top: 70px; }
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div class="system-time" id="sysTime">
        <div id="real-clock">00:00:00</div>
        <div id="real-date">...</div>
    </div>

    <div id="greeting-toast">Chào mừng bạn!</div>
    
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div id="overlay">
        <div class="loading-bg-full"></div> 
        <div class="loading-content">
            <div class="loading-name">HUNG MADDING</div>
            <div id="loaderUI" class="loader-container">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div class="status-box"><span id="loadStatus">Initializing...</span><span id="loadPercent">0%</span></div>
            </div>
            <button id="enterBtn" class="enter-btn" onclick="initSystem()">Bấm để vô nhoa :3</button>
        </div>
    </div>

    <div id="music-player" class="music-player">
        <div class="music-icon-floating" id="disc-icon"><i class="fas fa-compact-disc"></i></div>
        
        <div id="player-main-view">
            <div class="song-info">
                <div class="song-title" id="display-title">Người Đầu Tiên</div>
                <div class="artist-name" id="display-artist">Anh Tú</div>
            </div>
            <div class="progress-container" onclick="seek(event)">
                <div class="progress-bar-music" id="musicProgress"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div id="playlist-menu"></div>

        <div class="player-controls">
            <div class="play-btns">
                <i class="fas fa-bars" id="menuBtn" onclick="toggleMenu()" style="color: var(--pink); font-size: 12px; margin-right: 5px;"></i>
                <i class="fas fa-backward" onclick="prevTrack()"></i>
                <i class="fas fa-play" id="mainPlayBtn" onclick="toggleMusic()"></i>
                <i class="fas fa-forward" onclick="nextTrack()"></i>
            </div>
            <i class="fas fa-volume-up" style="font-size: 10px; color: var(--pink);"></i>
        </div>
    </div>

    <audio id="mainAudio" loop preload="auto"><source id="audioSource" src="nguoidautien.mp3" type="audio/mpeg"></audio>

    <main id="mainUI" class="main-wrapper">
        <div id="tiltCard" class="card">
            <div class="avatar-box"><span>H</span></div>
            <h1 class="waviy">
                <span style="--i:1">N</span><span style="--i:2">g</span><span style="--i:3">u</span><span style="--i:4">y</span><span style="--i:5">ễ</span><span style="--i:6">n</span><span>&nbsp;</span><span style="--i:7">M</span><span style="--i:8">ạ</span><span style="--i:9">n</span><span style="--i:10">h</span><span>&nbsp;</span><span style="--i:11">H</span><span style="--i:12">ù</span><span style="--i:13">n</span><span style="--i:14">g</span>
                <div class="verified-badge"><i class="fas fa-check"></i></div>
            </h1>

            <div class="info-status">
                <span><i class="fas fa-location-dot"></i> <b>TAM DƯƠNG</b></span>
                <span><i class="fas fa-bolt"></i> <b>Lvl:siêu tuất</b></span>
                <span><i class="fas fa-circle online-dot" style="color: #00ff00; font-size: 8px;"></i> <b>Online</b></span>
            </div>

            <div id="typewriter" class="typewriter"></div>
            <div class="links-container">
                <a href="https://www.facebook.com/hung.madding" target="_blank" class="link-item"><span>Facebook</span><i class="fab fa-facebook"></i></a>
                <a href="https://www.tiktok.com/@hung_md3" target="_blank" class="link-item"><span>TikTok Channel</span><i class="fab fa-tiktok"></i></a>
                <a href="https://github.com/hungmadding" target="_blank" class="link-item"><span>Github Projects</span><i class="fab fa-github"></i></a>
                
                <div onclick="alert('Cảm ơn bạn đã quan tâm đến mìn<3')" class="link-item about-me">
                    <span>About me</span>
                    <i class="fas fa-heart"></i>
                </div>
            </div>
        </div>
    </main>

    <div class="footer">welcome :3</div>

    <script>
        const audio = document.getElementById('mainAudio');
        const fill = document.getElementById('progressFill');
        const percentTxt = document.getElementById('loadPercent');
        const statusTxt = document.getElementById('loadStatus');
        const enterBtn = document.getElementById('enterBtn');
        const loaderUI = document.getElementById('loaderUI');
        
        // --- DATA PLAYLIST: "Người Đầu Tiên" đã lên đầu ---
        const playlist = [
            { title: "Người Đầu Tiên", artist: "Anh Tú", src: "nguoidautien.mp3" },
            { title: "one of the girls", artist: "Hưng Madding Edition", src: "music.mp3" },
            { title: "Tháng Mấy Em Nhớ Anh", artist: "Hà Anh Tuấn", src: "track3.mp3" }
        ];
        let currentTrackIndex = 0;

        let currentProgress = 0;
        const loaderTask = setInterval(() => {
            if (currentProgress >= 100) {
                currentProgress = 100;
                clearInterval(loaderTask);
                setTimeout(() => {
                    loaderUI.style.opacity = "0";
                    setTimeout(() => {
                        loaderUI.style.display = "none";
                        enterBtn.style.display = "block";
                        enterBtn.style.animation = "fadeIn 0.8s forwards, pulse 2s infinite";
                    }, 500);
                }, 500);
            } else {
                currentProgress += Math.random() * 3;
                if (currentProgress > 100) currentProgress = 100;
                fill.style.width = currentProgress + "%";
                percentTxt.innerText = Math.floor(currentProgress) + "%";
                if(currentProgress > 80) statusTxt.innerText = "System Ready!";
                else if(currentProgress > 40) statusTxt.innerText = "Processing...";
            }
        }, 40);

        function updateSystemTime() {
            const now = new Date();
            document.getElementById('real-clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('real-date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function showGreeting() {
            const hours = new Date().getHours();
            const toast = document.getElementById('greeting-toast');
            let msg = (hours >= 5 && hours < 11) ? "Chào buổi sáng! Chúc bạn ngày mới tốt lành nha☀️" :
                      (hours >= 11 && hours < 14) ? "Chào buổi trưa! Nhớ nghỉ ngơi nha🍱" :
                      (hours >= 14 && hours < 18) ? "Chào buổi chiều! Chúc cậu vui vẻ nha☕" :
                      (hours >= 18 && hours < 22) ? "Chào buổi tối! Chúc bạn ấm áp ✨" : "Đã khuya rồi! Ngủ ngon nha bạn iu<3 🌙";
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 8000); 
        }

        function initSystem() {
            const overlay = document.getElementById('overlay');
            const mainUI = document.getElementById('mainUI');
            overlay.classList.add('fade-out');
            
            renderPlaylist();

            setTimeout(() => {
                mainUI.classList.add('active'); 
                document.getElementById('music-player').style.display = "block";
                document.getElementById('sysTime').style.display = "block";
                
                // PHÁT NHẠC NGAY KHI CLICK
                audio.play();
                document.getElementById('mainPlayBtn').classList.replace('fa-play', 'fa-pause');
                document.getElementById('disc-icon').style.animation = "rotateCD 3s linear infinite";

                updateSystemTime();
                setInterval(updateSystemTime, 1000);
                setTimeout(showGreeting, 2000); 
                setTimeout(startTypeWriter, 1200);
            }, 600);

            setTimeout(() => { overlay.style.display = "none"; }, 1500);
        }

        function startTypeWriter() {
            const text = "> cám ơn bạn gì đó trai xinh gái đẹp đã ghé thăm nha!";
            let i = 0;
            const target = document.getElementById('typewriter');
            target.innerHTML = "";
            function type() {
                if (i < text.length) { 
                    target.innerHTML += text.charAt(i); 
                    i++; setTimeout(type, 40); 
                }
            }
            type();
        }

        function renderPlaylist() {
            const menu = document.getElementById('playlist-menu');
            menu.innerHTML = "";
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `${index + 1}. ${track.title}`;
                item.onclick = () => selectTrack(index);
                menu.appendChild(item);
            });
        }

        function toggleMenu() {
            const menu = document.getElementById('playlist-menu');
            const mainView = document.getElementById('player-main-view');
            const btn = document.getElementById('menuBtn');

            if (menu.style.display === "none" || menu.style.display === "") {
                menu.style.display = "block";
                mainView.style.display = "none";
                btn.classList.replace('fa-bars', 'fa-times');
            } else {
                menu.style.display = "none";
                mainView.style.display = "block";
                btn.classList.replace('fa-times', 'fa-bars');
            }
        }

        function selectTrack(index) {
            currentTrackIndex = index;
            const track = playlist[index];
            
            document.getElementById('display-title').innerText = track.title;
            document.getElementById('display-artist').innerText = track.artist;
            audio.src = track.src;
            
            renderPlaylist(); 
            audio.play();
            document.getElementById('mainPlayBtn').classList.replace('fa-play', 'fa-pause');
            document.getElementById('disc-icon').style.animation = "rotateCD 3s linear infinite";
            
            if (document.getElementById('playlist-menu').style.display === "block") {
                toggleMenu(); 
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            selectTrack(currentTrackIndex);
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            selectTrack(currentTrackIndex);
        }

        function toggleMusic() {
            const btn = document.getElementById('mainPlayBtn');
            const disc = document.getElementById('disc-icon');
            if (audio.paused) { 
                audio.play(); 
                btn.classList.replace('fa-play', 'fa-pause');
                disc.style.animation = "rotateCD 3s linear infinite";
                disc.style.animationPlayState = "running";
            } else { 
                audio.pause(); 
                btn.classList.replace('fa-pause', 'fa-play');
                disc.style.animationPlayState = "paused";
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('musicProgress').style.width = progress + "%";
                
                let curMins = Math.floor(audio.currentTime / 60);
                let curSecs = Math.floor(audio.currentTime - curMins * 60);
                let durMins = Math.floor(audio.duration / 60);
                let durSecs = Math.floor(audio.duration - durMins * 60);
                
                if(curSecs < 10) curSecs = "0" + curSecs;
                if(durSecs < 10) durSecs = "0" + durSecs;
                
                document.getElementById('currentTime').innerText = curMins + ":" + curSecs;
                document.getElementById('duration').innerText = durMins + ":" + durSecs;
            }
        });

        function seek(event) {
            const pContainer = document.querySelector('.progress-container');
            const width = pContainer.clientWidth;
            const clickX = event.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        }

        // --- SNOW ENGINE & TILT CARD ---
        class SnowEngine {
            constructor(canvasId, count, config) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.count = count; this.particles = []; this.config = config; this.init();
            }
            init() { 
                this.resize(); 
                window.addEventListener('resize', () => this.resize()); 
                for (let i = 0; i < this.count; i++) this.particles.push(this.createParticle()); 
                this.animate(); 
            }
            resize() { 
                this.canvas.width = window.innerWidth; 
                this.canvas.height = window.innerHeight; 
            }
            createParticle() { 
                return { 
                    x: Math.random() * this.canvas.width, 
                    y: Math.random() * this.canvas.height, 
                    r: Math.random() * this.config.size + 1, 
                    v: Math.random() * this.config.speed + 0.3, 
                    o: Math.random() * 0.5 + this.config.opacity 
                }; 
            }
            draw() { 
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); 
                this.ctx.fillStyle = "white";
                this.particles.forEach(p => { 
                    this.ctx.globalAlpha = p.o;
                    this.ctx.beginPath(); 
                    this.ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); 
                    this.ctx.fill(); 
                }); 
                this.update(); 
            }
            update() { 
                this.particles.forEach(p => { 
                    p.y += p.v; 
                    if (p.y > this.canvas.height) p.y = -10; 
                }); 
            }
            animate() { 
                this.draw(); 
                requestAnimationFrame(() => this.animate()); 
            }
        }
        
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
        new SnowEngine('canvas-bg', isMobile ? 15 : 60, { size: 1, speed: 0.3, opacity: 0.1 });
        new SnowEngine('canvas-mid', isMobile ? 10 : 40, { size: 2, speed: 0.7, opacity: 0.2 });
        new SnowEngine('canvas-foreground', isMobile ? 5 : 15, { size: 4, speed: 1.2, opacity: 0.4 });

        const card = document.getElementById('tiltCard');
        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                let x = (window.innerWidth / 2 - e.clientX) / 35;
                let y = (window.innerHeight / 2 - e.clientY) / 35;
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
        }

        document.querySelectorAll('.link-item, .enter-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                let ripple = document.createElement('span');
                ripple.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:2px; height:2px; background:white; opacity:0.5; border-radius:50%; transform:translate(-50%, -50%); animation:ripple 0.6s linear; pointer-events:none;`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
