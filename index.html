<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Nguyễn | @kolomoo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-accent: #ff79c6; /* Màu hồng đặc trưng của bạn */
            --glass-bg: rgba(0, 0, 0, 0.6);
            --border-white: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('https://cur.cursors-4u.net/others/oth-9/oth822.cur'), auto;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- BACKGROUND SECTION --- */
        .video-bg {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2;
            filter: brightness(0.4) blur(2px); /* Làm tối nền để nổi bật card */
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* --- MAIN CARD --- */
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-white);
            border-radius: 15px;
            padding: 50px 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite; /* Hiệu ứng lơ lửng */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- AVATAR & INFO --- */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--primary-accent);
            padding: 3px;
            margin-bottom: 15px;
            transition: 0.5s;
        }

        .avatar:hover {
            transform: rotate(360deg);
            border-color: #fff;
        }

        h1 {
            font-size: 26px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-accent);
            margin-bottom: 5px;
        }

        .typewriter {
            color: var(--primary-accent);
            font-size: 14px;
            letter-spacing: 2px;
            height: 20px;
            margin-bottom: 25px;
        }

        /* --- LINKS ARRANGEMENT --- */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .link-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-white);
            padding: 12px;
