<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nguyễn Mạnh Hùng | Bio-OS v3.22</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077;
            --glass: rgba(10, 5, 10, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; font-family: 'Quicksand', sans-serif; background: #000; overflow: hidden; }

        /* --- GIỮ NGUYÊN BACKGROUND & SNOW --- */
        #bg-image {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0;
        }
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-foreground { z-index: 10001; }

        /* --- LOADING MODULE (CHỈ THÊM CSS HIỂN THỊ ẢNH) --- */
        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: opacity 1.5s ease-in-out;
        }
        
        .loading-content { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        /* Nâng cấp khung ảnh để hiện viền hồng rực */
        .loading-img-box {
            width: 280px; height: 400px; border-radius: 35px; 
            border: 2px solid var(--pink);
            box-shadow: 0 0 60px var(--pink-glow), inset 0 0 20px var(--pink-glow);
            overflow: hidden; animation: float 4s ease-in-out infinite;
            margin-bottom: 30px; z-index: 10000;
        }
        .loading-img-box img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Thêm Text Brand & % theo yêu cầu nâng cấp */
        .loading-name {
            color: #fff; font-family: 'Fira Code'; font-size: 32px; font-weight: 700;
            letter-spacing: 12px; text-shadow: 0 0 25px var(--pink-glow);
            margin-bottom: 40px; text-transform: uppercase;
        }

        .loader-container { width: 320px; text-align: center; }
        .progress-bar {
            width: 100%; height: 6px; background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 77, 148, 0.2);
            margin-bottom: 15px;
        }
        .progress-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 20px var(--pink); transition: width 0.1s linear; }
        
        .status-box { font-family: 'Fira Code'; font-size: 12px; color: var(--pink); letter-spacing: 2px; }
        #percentage { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 5px; }

        /* GIỮ NGUYÊN NÚT ENTER CŨ */
        .enter-btn { 
            display: none; border: 2px solid var(--pink); padding: 15px 45px; 
            cursor: pointer; background: transparent; color: var(--pink); 
            letter-spacing: 5px; font-weight: 700; font-family: 'Fira Code';
            text-transform: uppercase; transition: 0.5s; 
            box-shadow: 0 0 20px var(--pink); border-radius: 8px;
        }
        .enter-btn:hover { background: var(--pink); color: #000; box-shadow: 0 0 40px var(--pink); }

        /* --- TRANG 2: GIỮ NGUYÊN 100% HIỆU ỨNG CŨ --- */
        .main-wrapper { 
            height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; perspective: 2000px; transition: 2s ease; z-index: 10; visibility: hidden;
        }
        .main-wrapper.active { opacity: 1; visibility: visible; }
        
        .card {
            background: var(--glass); backdrop-filter: blur(30px);
            border-radius: 50px; padding: 60px 40px; width: 90%; max-width: 380px;
            text-align: center; border: 1px solid rgba(255, 77, 148, 0.2);
            position: relative; overflow: hidden; transform-style: preserve-3d;
        }
        /* Hiệu ứng LED xoay vĩnh cửu */
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--pink), transparent);
            animation: rotateLED 4s linear infinite; z-index: -1;
        }
        .card::after { content: ''; position: absolute; inset: 4px; background: #0a050a; border-radius: 46px; z-index: -1; }

        .avatar-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--pink); margin: 0 auto 30px; box-shadow: 0 0 35px var(--pink); display: flex; align-items: center; justify-content: center; }
        .avatar-box span { color: var(--pink); font-size: 50px; font-weight: 900; }
        
        h1 { color: #fff; font-size: 28px; text-shadow: 0 0 20px var(--pink); margin-bottom: 15px; }
        .typewriter { height: 25px; color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 40px; font-family: 'Fira Code'; }
        
        /* HIỆU ỨNG HOVER LINK-ITEM CỦA ÔNG */
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link-item { 
            background: rgba(255, 255, 255, 0.05); padding: 18px 25px; color: #fff; 
            text-decoration: none; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; transition: 0.4s; transform-style: preserve-3d;
        }
        .link-item:hover { 
            background: rgba(255, 77, 148, 0.2); border-color: var(--pink); 
            transform: translateZ(50px) scale(1.05); box-shadow: 0 10px 30px rgba(255, 77, 148, 0.3);
        }
        .link-item i { font-size: 22px; color: var(--pink); filter: drop-shadow(0 0 5px var(--pink)); }
        
        #music-btn { position: fixed; top: 30px; right: 30px; z-index: 10005; width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--pink); color: var(--pink); display: none; justify-content: center; align-items: center; cursor: pointer; background: rgba(0,0,0,0.6); }

        @keyframes rotateLED { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div id="overlay">
        <div class="loading-content">
            <div class="loading-img-box">
                <img src="ảnh chờ.jpg" alt="Deep Madding Art">
            </div>
            <div class="loading-name">HUNG MADDING</div>
            <div id="loader" class="loader-container">
                <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
                <div class="status-box">
                    <div id="status">INITIALIZING...</div>
                    <div id="percentage">0%</div>
                </div>
            </div>
            <button id="enterBtn" class="enter-btn" onclick="start()">ENTER BIO-OS</button>
        </div>
    </div>

    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-compact-disc"></i></div>
    <audio id="audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main" class="main-wrapper">
        <div id="card" class="card">
            <div class="avatar-box"><span>H</span></div>
            <h1>Nguyễn Mạnh Hùng</h1>
            <div id="tw" class="typewriter"></div>
            <div class="links">
                <a href="https://facebook.com/m.hung.11.02" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://tiktok.com/@hung_madding" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        const percentage = document.getElementById('percentage');
        let prog = 0;

        // Giữ nguyên logic loading cũ
        const loadingInterval = setInterval(function() {
            if (prog >= 100) {
                clearInterval(loadingInterval);
                status.innerText = "SYSTEM READY!";
                percentage.innerText = "100%";
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('enterBtn').style.display = 'block';
                }, 600);
            } else {
                prog += Math.random() * 2;
                if(prog > 100) prog = 100;
                fill.style.width = prog + '%';
                percentage.innerText = Math.floor(prog) + "%";
                status.innerText = "INITIALIZING... ";
            }
        }, 50);

        function start() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play().catch(() => {});
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main').classList.add('active');
                document.getElementById('music-btn').style.display = 'flex';
                document.getElementById('music-btn').style.animation = 'rotateCD 3s linear infinite';
                runTypeWriter();
            }, 1500);
        }

        function runTypeWriter() {
            const msg = "> Access Granted. Welcome, Hùng Madding.";
            let i = 0;
            function write() {
                if(i < msg.length) {
                    document.getElementById('tw').innerHTML += msg.charAt(i++);
                    setTimeout(write, 70);
                }
            }
            write();
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('music-btn').style.animation = 'rotateCD 3s linear infinite'; }
            else { audio.pause(); document.getElementById('music-btn').style.animation = 'none'; }
        }

        // Giữ nguyên toàn bộ logic Snow
        function createSnow(id, count, size, speed, opacity) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = [];
            for(let i=0; i<count; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*size+1, d: Math.random()*count});
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = `rgba(255,255,255,${opacity})`;
                ctx.beginPath();
                for(let i=0; i<count; i++) { ctx.moveTo(p[i].x, p[i].y); ctx.arc(p[i].x, p[i].y, p[i].r, 0, Math.PI*2, true); }
                ctx.fill();
                for(let i=0; i<count; i++) { p[i].y += speed; if(p[i].y > canvas.height) p[i].y = -10; }
                requestAnimationFrame(draw);
            }
            draw();
        }
        createSnow('canvas-bg', 60, 1, 0.5, 0.2);
        createSnow('canvas-mid', 40, 2.5, 1.2, 0.4);
        createSnow('canvas-foreground', 15, 5, 2.5, 0.7);

        // Giữ nguyên hiệu ứng Tilt 3D
        if (!/Android|iPhone/i.test(navigator.userAgent)) {
            const cardElement = document.getElementById('card');
            window.addEventListener('mousemove', function(e) {
                let x = (window.innerWidth / 2 - e.clientX) / 25;
                let y = (window.innerHeight / 2 - e.clientY) / 25;
                cardElement.style.transform = "rotateY(" + x + "deg) rotateX(" + y + "deg)";
            });
        }
    </script>
</body>
</html>
