<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hùng Madding</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { --pink:#ff4d94; }

*{margin:0;padding:0;box-sizing:border-box;cursor:none}

body{
height:100vh;
overflow:hidden;
font-family:sans-serif;
}

/* 🎥 VIDEO (ĐÃ FIX CLICK) */
#bg-video{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;

filter:brightness(0.45) contrast(1.2) saturate(1.4);

/* 🔥 QUAN TRỌNG NHẤT */
pointer-events:none;
}

/* overlay */
#overlay{
position:fixed;
inset:0;
background:#000;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
color:var(--pink);
}

.enter{
padding:15px 40px;
border:1px solid var(--pink);
}

/* card */
.wrapper{
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
}

.card{
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
text-align:center;
}

/* links */
.link{
display:block;
padding:12px;
margin:10px;
background:#222;
color:#fff;
text-decoration:none;
border-radius:10px;
}

.link:hover{
background:var(--pink);
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="bg-video">
<source src="https://cdn.coverr.co/videos/coverr-sunset-sky-6942/1080p.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div id="overlay" onclick="start()">
<div class="enter">ENTER</div>
</div>

<!-- CONTENT -->
<div class="wrapper" id="content">
<div class="card">

<h2 style="color:white;">Hùng Madding</h2>

<a href="https://www.facebook.com/hung.madding" target="_blank" class="link">
Facebook
</a>

<a href="#" class="link">TikTok</a>
<a href="#" class="link">GitHub</a>

</div>
</div>

<script>
function start(){
document.getElementById("overlay").style.display="none";
document.getElementById("content").style.opacity=1;
}
</script>

</body>
</html>
