<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Ultimate Visual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --glass: rgba(10, 10, 15, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; } /* Ẩn chuột mặc định */
        
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* --- CHUỘT CUSTOM ĐỔI MÀU NEON --- */
        #cursor { 
            position: fixed; width: 12px; height: 12px; border-radius: 50%; 
            pointer-events: none; z-index: 10001; background: #fff;
            animation: cursorColor 5s linear infinite;
            transform: translate(-50%, -50%); /* Căn giữa con trỏ */
            transition: width 0.2s, height 0.2s;
        }

        @keyframes cursorColor {
            0%   { box-shadow: 0 0 15px #ff4d94, 0 0 30px #ff4d94; }
            25%  { box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff; }
            50%  { box-shadow: 0 0 15px #ffff00, 0 0 30px #ffff00; }
            75%  { box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00; }
            100% { box-shadow: 0 0 15px #ff4d94, 0 0 30px #ff4d94; }
        }

        /* --- MÀN HÌNH CHỜ --- */
        #overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 1s; }
        #overlay i { font-size: 80px; color: var(--pink); filter: drop-shadow(0 0 20px var(--pink)); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* NỀN VÀ TUYẾT */
        .bg-overlay { position: fixed; inset: 0; z-index: -2; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.pinimg.com/originals/a0/0c/33/a00c33a948e7b9b1e9b1e9b1e9b1e9b1.jpg'); background-size: cover; background-position: center; }
        #particles { position: fixed; inset: 0; z-index: -1; }

        /* --- CARD VIP - DỌC - KÍNH MỜ - VIỀN ĐÈN LED --- */
        .container { perspective: 1000px; display: none; opacity: 0; transition: 1s; z-index: 10; }
        .card {
            background: var(--glass); backdrop-filter: blur(20px); border-radius: 35px;
            padding: 50px 40px; width: 380px; text-align: center; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }
        
        /* Hiệu ứng viền phát sáng chạy quanh (RGB Border) */
        .card::before {
            content: ''; position: absolute; inset: -2px;
            background: linear-gradient(45deg, #ff4d94, #00ffff, #ff00ff, #ff4d94);
            background-size: 400%; z-index: -1; border-radius: 38px;
            animation: steam 15s linear infinite; opacity: 0.7;
        }
        
        /* Hiệu ứng bóng đổ phát sáng (Glow) */
        .card::after { content: ''; position: absolute; inset: -2px; background: linear-gradient(45deg, #ff4d94, #00ffff, #ff00ff, #ff4d94); background-size: 400%; z-index: -1; border-radius: 38px; animation: steam 15s linear infinite; filter: blur(15px); opacity: 0.7; }

        @keyframes steam { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

        /* AVATAR DẬP DỀNH 3D */
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 30px var(--pink); margin-bottom: 20px; object-fit: cover; animation: floatAvatar 4s ease-in-out infinite; transform: translateZ(60px); }
        @keyframes floatAvatar { 0%, 100% { transform: translateY(0) translateZ(60px); } 50% { transform: translateY(-10px) translateZ(60px); } }
        
        h1 { font-size: 28px; color: #fff; text-shadow: 0 0 20px var(--pink); margin-bottom: 5px; transform: translateZ(50px); }
        .tagline { color: var(--pink); font-weight: bold; margin-bottom: 30px; font-size: 12px; letter-spacing: 3px; transform: translateZ(40px); }

        /* LINK ITEMS */
        .links { display: flex; flex-direction: column; gap: 12px; transform-style: preserve-3d; }
        .link-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 77, 148, 0.2);
            padding: 18px; border-radius: 20px; color: #fff; text-decoration: none; font-weight: 700;
            display: flex; align-items: center; justify-content: space-between; 
            transition: 0.3s; transform: translateZ(30px);
        }
        .link-item:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; transform: scale(1.05) translateZ(50px); }
        .link-item i { font-size: 18px; }
