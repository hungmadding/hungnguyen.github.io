<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime MAX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
:root{
--pink:#ff7ac6;
--blue:#8be9fd;
--bg:#0a0a14;
}

*{margin:0;padding:0;box-sizing:border-box;cursor:none}

body{
height:100vh;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at 20% 30%, rgba(255,122,198,0.3), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(139,233,253,0.25), transparent 40%),
#0a0a14;
}

/* glow layer */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(120deg,#ff7ac6,#8be9fd,#a78bfa);
filter:blur(120px);
opacity:.15;
}

/* cursor */
#cursor{
position:fixed;
width:14px;height:14px;
border-radius:50%;
background:var(--pink);
box-shadow:0 0 20px var(--pink),0 0 40px var(--blue);
pointer-events:none;
z-index:9999;
}

/* canvas layers */
canvas{position:fixed;inset:0}

/* card */
.wrapper{
height:100%;
display:flex;
justify-content:center;
align-items:center;
perspective:1200px;
}

.card{
width:360px;
padding:45px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
transform-style:preserve-3d;
box-shadow:0 0 50px rgba(255,122,198,0.2);
transition:.3s;
}

/* light follow */
.card::before{
content:"";
position:absolute;
inset:0;
border-radius:inherit;
background:radial-gradient(circle at var(--x) var(--y),
rgba(255,255,255,0.25),
transparent 40%);
}

/* avatar */
.avatar{
width:110px;height:110px;
border-radius:50%;
border:3px solid var(--pink);
margin-bottom:20px;
box-shadow:0 0 30px var(--pink),0 0 60px var(--blue);
}

/* text */
h1{color:white;margin-bottom:10px}
.type{color:var(--pink);font-size:12px;margin-bottom:25px}

/* links */
.link{
display:block;
padding:14px;
margin-bottom:12px;
border-radius:14px;
background:rgba(255,255,255,0.05);
text-decoration:none;
color:#ddd;
transition:.3s;
}
.link:hover{
background:linear-gradient(90deg,var(--pink),var(--blue));
color:#000;
transform:translateX(10px) scale(1.05);
}

/* overlay */
#overlay{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:100;
}
.enter{
padding:15px 40px;
border:1px solid var(--pink);
color:white;
letter-spacing:4px;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,122,198,0.4)}
70%{box-shadow:0 0 0 25px rgba(255,122,198,0)}
}

/* visualizer */
#bars{
position:fixed;
bottom:0;
width:100%;
height:60px;
display:flex;
justify-content:center;
gap:4px;
}
.bar{
width:4px;
background:linear-gradient(var(--pink),var(--blue));
animation:beat 1s infinite;
}
@keyframes beat{
0%,100%{height:10px}
50%{height:50px}
}
</style>
</head>

<body onclick="ripple(event)">

<div id="overlay" onclick="start()">
<div class="enter">ENTER ANIME</div>
</div>

<div id="cursor"></div>
<canvas id="sakura"></canvas>
<canvas id="stars"></canvas>

<div class="wrapper">
<div class="card" id="card">
<img src="https://i.imgur.com/uIKY94v.png" class="avatar">
<h1>Hùng Madding</h1>
<div class="type" id="type"></div>

<a href="#" class="link">Facebook</a>
<a href="#" class="link">TikTok</a>
<a href="#" class="link">GitHub</a>
</div>
</div>

<!-- visualizer -->
<div id="bars"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const cursor=document.getElementById("cursor");
const card=document.getElementById("card");

/* cursor + tilt */
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

let x=(innerWidth/2-e.clientX)/25;
let y=(innerHeight/2-e.clientY)/25;

card.style.transform=`rotateX(${y}deg) rotateY(${-x}deg)`;
card.style.setProperty("--x",e.clientX+"px");
card.style.setProperty("--y",e.clientY+"px");
});

/* type */
let txt="ANIME MAX | DREAM WORLD";
let i=0;
function type(){
if(i<txt.length){
typeEl.innerHTML+=txt[i];
i++;
setTimeout(type,50);
}
}

/* start */
function start(){
overlay.style.display="none";
music.play().catch(()=>{});
type();
}

/* ripple */
function ripple(e){
let r=document.createElement("div");
r.style.position="fixed";
r.style.border="2px solid pink";
r.style.borderRadius="50%";
r.style.left=e.clientX+"px";
r.style.top=e.clientY+"px";
r.style.transform="translate(-50%,-50%)";
r.style.animation="r 0.6s forwards";
document.body.appendChild(r);
setTimeout(()=>r.remove(),600);
}

/* sakura */
let c=document.getElementById("sakura");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let petals=[];
for(let i=0;i<40;i++){
petals.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*6+4,
speed:Math.random()*1+0.5,
angle:Math.random()*Math.PI
});
}

function drawSakura(){
ctx.clearRect(0,0,c.width,c.height);
petals.forEach(p=>{
p.y+=p.speed;
p.x+=Math.sin(p.angle)*0.5;
p.angle+=0.01;

if(p.y>c.height){p.y=0;p.x=Math.random()*c.width}

ctx.beginPath();
ctx.fillStyle="rgba(255,182,193,0.8)";
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawSakura);
}
drawSakura();

/* stars */
let s=document.getElementById("stars");
let stx=s.getContext("2d");
s.width=innerWidth;
s.height=innerHeight;

let stars=[];
for(let i=0;i<60;i++){
stars.push({x:Math.random()*s.width,y:Math.random()*s.height,r:Math.random()*2});
}

function drawStars(){
stx.clearRect(0,0,s.width,s.height);
stars.forEach(st=>{
stx.beginPath();
stx.arc(st.x,st.y,st.r,0,Math.PI*2);
stx.fillStyle="white";
stx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

/* visualizer bars */
let bars=document.getElementById("bars");
for(let i=0;i<40;i++){
let b=document.createElement("div");
b.className="bar";
b.style.animationDelay=(Math.random())+"s";
bars.appendChild(b);
}
</script>

</body>
</html>
