<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Bio-OS v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; --pink-glow: #ff0077; --pink-dark: #cc3a73;
            --bg: #0a0a0a; --glass: rgba(255,255,255,0.03); --text: rgba(255,255,255,0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg); overflow: hidden; }
        
        #cursor { 
            position: fixed; width: 25px; height: 25px; background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 10002; transform: translate(-50%, -50%);
            box-shadow: 0 0 30px var(--pink-glow); display: none; transition: width 0.3s, height 0.3s;
        }

        #overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg) 0%, #1a0a1a 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .logo { font-size: 3rem; font-weight: 700; margin-bottom: 2rem; animation: logoFloat 3s infinite; font-family: 'Fira Code', monospace; text-shadow: 0 0 25px var(--pink); }
        .loading-bar { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 2rem; }
        .loading-progress { height: 100%; background: var(--pink); width: 0%; animation: load 2.5s forwards; box-shadow: 0 0 20px var(--pink); }
        .enter-btn { border: 2px solid var(--pink); padding: 18px 40px; letter-spacing: 6px; cursor: pointer; text-transform: uppercase; font-weight: 600; transition: 0.3s; background: transparent; color: var(--pink); margin-top: 2rem; }
        .enter-btn:hover { background: var(--pink); color: white; box-shadow: 0 0 40px var(--pink); transform: scale(1.05); }

        @keyframes logoFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-20px);} }
        @keyframes load { to { width: 100%; } }

        #canvas-particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .main-wrapper { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            opacity: 0; 
            perspective: 1200px; 
            perspective-origin: center center;
            transform: scale(0.9);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 10; 
            position: relative; 
            pointer-events: none;
            padding: 20px; /* Thêm padding để card không chạm mép màn hình */
        }
        .main-wrapper.active { opacity: 1; transform: scale(1); pointer-events: all; }

        .card {
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(30px) saturate(180%);
            border-radius: 40px; 
            padding: 35px 50px; /* Giảm padding trên dưới để card ngắn lại */
            width: 400px; /* Thu hẹp chiều ngang một chút */
            max-height: 90vh; /* Đảm bảo card không bao giờ vượt quá chiều cao màn hình */
            text-align: center;
            border: 1px solid rgba(255, 77, 148, 0.3); box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            transform-style: preserve-3d; 
            transition: transform 0.3s ease-out;
            will-change: transform;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--pink); margin: 0 auto 20px; object-fit: cover; box-shadow: 0 0 40px var(--pink); transform: translateZ(60px); }
        
        h1 { color: #fff; font-size: 26px; margin-bottom: 8px; text-shadow: 0 0 15px #fff, 0 0 30px var(--pink); transform: translateZ(40px); }
        .subtitle { color: #fff; font-size: 15px; margin-bottom: 20px; font-family: 'Fira Code'; font-weight: 600; text-shadow: 0 0 8px #fff, 0 0 20px var(--pink); transform: translateZ(30px); }
        .typewriter { height: 18px; color: #aaa; font-size: 12px; margin-bottom: 25px; font-family: 'Fira Code'; transform: translateZ(20px); }

        .links { display: flex; flex-direction: column; gap: 12px; transform: translateZ(25px); }
        .link-item {
            background: rgba(255,255,255,0.04); padding: 14px 25px; border-radius: 18px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.08); transition: all 0.4s ease;
            cursor: pointer; font-size: 14px;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.25); border-color: var(--pink); transform: translateX(10px); box-shadow: 0 0 20px rgba(255, 77, 148, 0.2); }

        .stats { position: fixed; bottom: 15px; right: 20px; color: var(--pink); font-family: 'Fira Code'; font-size: 10px; z-index: 100; opacity: 0.6; }
        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-150px); background: rgba(255, 77, 148, 0.95); color: #fff; padding: 15px 30px; border-radius: 50px; z-index: 10005; opacity: 0; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 600; min-width: 320px; text-align: center; border: 1px solid #fff; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo">HUNG MADDING</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <button class="enter-btn" onclick="startExperience()">ENTER TERMINAL</button>
    </div>

    <div id="cursor"></div>
    <canvas id="canvas-particles"></canvas>

    <div class="main-wrapper" id="mainContent">
        <div class="card" id="profileCard">
            <img src="https://i.imgur.com/uIKY94v.png" class="avatar" alt="Avatar Hùng">
            <h1>Hùng Madding</h1>
            <div class="subtitle">Nguyễn Mạnh Hùng</div>
            <div class="typewriter" id="typewriter"></div>
            
            <div class="links">
                <a href="#" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="#" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <div class="link-item" onclick="showAboutMe()">
                    <span>Đôi nét về bản thân tôi</span><i class="fas fa-heart"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="stats">BIO-OS v3.0 | SECURE SHELL ACTIVE</div>
    <div id="toast" class="toast">Ôi bạn quan tâm đến tôi ư cảm ơn nhiều nhé ❤️</div>

    <script>
        const canvas = document.getElementById('canvas-particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const card = document.getElementById('profileCard');

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<120; i++) {
                const size = Math.random()*2+0.5;
                particles.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    size: size,
                    speedY: size*0.3+0.2, 
                    speedX: Math.random()*0.2-0.1, 
                    opacity: Math.random()*0.5+0.1,
                    twinkleSpeed: Math.random()*0.02+0.005,
                    twinklePhase: Math.random()*Math.PI*2,
                });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;
                if(p.y > canvas.height) p.y = -10;
                p.twinklePhase += p.twinkleSpeed;
                const currentOpacity = p.opacity + Math.sin(p.twinklePhase)*0.1;
                ctx.save();
                ctx.globalAlpha = Math.max(0.05, Math.min(0.7, currentOpacity));
                ctx.fillStyle = "#FFF";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            });
            requestAnimationFrame(draw);
        }

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                document.getElementById('cursor').style.display = 'block';
                typeWriter();
            }, 800);
        }

        function typeWriter() {
            const text = "> Booting Bio-OS Terminal v3.0... Success!";
            let i = 0;
            const target = document.getElementById('typewriter');
            function type() {
                if (i < text.length) {
                    target.innerHTML += text.charAt(i++);
                    setTimeout(type, 50);
                }
            }
            type();
        }

        function showAboutMe() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        window.addEventListener('mousemove', (e) => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Hiệu ứng nghiêng nhẹ khi di chuột
            const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
