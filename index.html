<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS v3.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; --pink-glow: #ff0077; 
            --bg: #0a0a0a; --glass: rgba(255,255,255,0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg); overflow: hidden; touch-action: none; }
        
        /* HIỆU ỨNG CON TRỎ (ẨN TRÊN MOBILE) */
        #cursor { 
            position: fixed; width: 25px; height: 25px; background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 10002; transform: translate(-50%, -50%);
            box-shadow: 0 0 30px var(--pink-glow); display: none; 
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: opacity 0.8s ease;
        }
        .logo { font-size: 2.5rem; font-weight: 700; font-family: 'Fira Code', monospace; text-shadow: 0 0 20px var(--pink); }

        /* CANVAS LAYERS */
        #canvas-bg, #canvas-mid, #canvas-foreground { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #canvas-foreground { z-index: 10001; }

        /* CONTAINER TỐI ƯU MOBILE */
        .main-wrapper { 
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; perspective: 1000px; transition: all 1s ease; z-index: 10; position: relative;
            padding: 15px; /* Giảm padding để tận dụng không gian điện thoại */
        }
        .main-wrapper.active { opacity: 1; }

        .card {
            background: rgba(15, 15, 25, 0.8); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 30px 25px;
            width: 100%; max-width: 380px; /* Tối ưu chiều rộng mobile */
            border: 1px solid rgba(255, 77, 148, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d; transition: transform 0.1s;
            text-align: center;
        }

        /* AVATAR MẶC ĐỊNH */
        .avatar { 
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--pink); 
            margin: 0 auto 15px; object-fit: cover; box-shadow: 0 0 30px var(--pink);
            transform: translateZ(50px);
        }
        
        h1 { color: #fff; font-size: 24px; text-shadow: 0 0 15px var(--pink); transform: translateZ(40px); }
        .subtitle { color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 15px; transform: translateZ(30px); }
        .typewriter { height: 16px; color: #888; font-size: 11px; margin-bottom: 20px; font-family: 'Fira Code'; transform: translateZ(20px); }

        .links { display: flex; flex-direction: column; gap: 10px; transform: translateZ(25px); }
        .link-item {
            background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 15px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); font-size: 14px; transition: 0.3s;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.2); border-color: var(--pink); }

        .stats { position: fixed; bottom: 10px; width: 100%; text-align: center; color: var(--pink); font-size: 9px; opacity: 0.5; z-index: 100; }

        /* TỐI ƯU CHO MÀN HÌNH NHỎ (IPHONE SE, ANDROID CŨ) */
        @media (max-height: 650px) {
            .card { padding: 20px; }
            .avatar { width: 80px; height: 80px; }
            h1 { font-size: 20px; }
            .links { gap: 8px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo">HUNG MADDING</div>
        <button style="margin-top:20px; background:none; border:1px solid var(--pink); color:var(--pink); padding:10px 20px; cursor:pointer;" onclick="startExperience()">ENTER</button>
    </div>

    <div id="cursor"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div class="main-wrapper" id="mainContent">
        <div class="card" id="profileCard">
            <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" class="avatar" alt="Avatar">
            <h1>Hùng Madding</h1>
            <div class="subtitle">Nguyễn Mạnh Hùng</div>
            <div class="typewriter" id="typewriter"></div>
            
            <div class="links">
                <a href="#" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="#" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <a href="#" class="link-item"><span>Email</span><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </div>

    <div class="stats">BIO-OS v3.5 | MOBILE OPTIMIZED</div>

    <script>
        const canvasB = document.getElementById('canvas-bg'), canvasM = document.getElementById('canvas-mid'), canvasF = document.getElementById('canvas-foreground');
        const ctxB = canvasB.getContext('2d'), ctxM = canvasM.getContext('2d'), ctxF = canvasF.getContext('2d');
        let stars = [], midParticles = [], frontSnow = [];

        class Snowflake {
            constructor(canvas, depth) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.depth = depth;
                this.reset();
            }
            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.size = [Math.random()*1, Math.random()*2+1, Math.random()*4+2][this.depth];
                this.speed = [0.2, 0.6, 1.2][this.depth];
                this.opacity = [0.2, 0.4, 0.6][this.depth];
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y * 0.01) * 0.3;
                if (this.y > this.canvas.height) this.y = -10;
            }
            draw() {
                this.ctx.globalAlpha = this.opacity;
                this.ctx.fillStyle = "#FFF";
                this.ctx.beginPath();
                this.ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                this.ctx.fill();
            }
        }

        function init() {
            canvasB.width = canvasM.width = canvasF.width = window.innerWidth;
            canvasB.height = canvasM.height = canvasF.height = window.innerHeight;
            stars = Array.from({length: 80}, () => new Snowflake(canvasB, 0));
            midParticles = Array.from({length: 50}, () => new Snowflake(canvasM, 1));
            frontSnow = Array.from({length: 15}, () => new Snowflake(canvasF, 2));
        }

        function animate() {
            ctxB.clearRect(0,0,canvasB.width, canvasB.height);
            ctxM.clearRect(0,0,canvasM.width, canvasM.height);
            ctxF.clearRect(0,0,canvasF.width, canvasF.height);
            [stars, midParticles, frontSnow].forEach(group => group.forEach(p => { p.update(); p.draw(); }));
            requestAnimationFrame(animate);
        }

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                if(!('ontouchstart' in window)) document.getElementById('cursor').style.display = 'block';
                typeWriter();
            }, 800);
        }

        function typeWriter() {
            const text = "> Booting Bio-OS... Success!";
            let i = 0; const target = document.getElementById('typewriter');
            function type() { if (i < text.length) { target.innerHTML += text.charAt(i++); setTimeout(type, 50); } }
            type();
        }

        window.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 30;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 30;
            document.getElementById('profileCard').style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });

        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
