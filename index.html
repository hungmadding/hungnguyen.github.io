<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS v3.22</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --pink-glow: #ff0077; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        #bg-image {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0;
        }

        /* SNOW SYSTEM */
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-fg { z-index: 10001; }

        /* --- FIX LỖI: LOADING SCREEN CHUẨN TỪNG PIXEL --- */
        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.5s ease;
        }

        .loading-art-container {
            position: relative;
            width: 280px; height: 420px; /* Tỉ lệ chuẩn cho ảnh của Hùng */
            border-radius: 35px;
            border: 2px solid var(--pink);
            box-shadow: 0 0 50px var(--pink-glow);
            overflow: hidden;
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
        }
        .loading-art-container img { width: 100%; height: 100%; object-fit: cover; }

        .madding-brand {
            font-family: 'Fira Code', monospace;
            font-size: 32px; font-weight: 700;
            color: var(--pink); letter-spacing: 10px;
            text-shadow: 0 0 20px var(--pink-glow);
            margin-bottom: 40px;
        }

        .loader-ui { width: 300px; text-align: center; }
        .progress-track {
            width: 100%; height: 4px; background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 77, 148, 0.2);
        }
        .progress-bar { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 15px var(--pink); }
        .status-msg { font-family: 'Fira Code'; font-size: 11px; color: var(--pink); margin-top: 15px; letter-spacing: 2px; }

        .btn-access { 
            display: none; border: 2px solid var(--pink); padding: 12px 35px; 
            cursor: pointer; background: transparent; color: var(--pink); 
            font-family: 'Fira Code'; border-radius: 5px; margin-top: 20px;
            box-shadow: 0 0 10px var(--pink);
        }

        /* --- MAIN UI --- */
        .main-wrapper { 
            height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; visibility: hidden; transition: 2s; z-index: 10;
        }
        .main-wrapper.active { opacity: 1; visibility: visible; }

        .profile-card {
            background: rgba(10, 5, 10, 0.9); backdrop-filter: blur(25px);
            border-radius: 45px; padding: 50px 30px; width: 350px;
            text-align: center; position: relative; overflow: hidden;
            border: 1px solid rgba(255, 77, 148, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        /* NEON ROTATE BORDER */
        .profile-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--pink), transparent);
            animation: rotateLED 4s linear infinite; z-index: -1;
        }
        .profile-card::after { content: ''; position: absolute; inset: 3px; background: #0a050a; border-radius: 42px; z-index: -1; }

        .avatar-box {
            width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--pink); 
            margin: 0 auto 20px; box-shadow: 0 0 25px var(--pink);
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-box span { color: var(--pink); font-size: 45px; font-weight: 900; }

        .link-item {
            background: rgba(255, 255, 255, 0.03); padding: 15px 20px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; margin-bottom: 12px; transition: 0.3s;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.15); border-color: var(--pink); transform: translateY(-3px); }

        #music-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 10005;
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; background: rgba(0,0,0,0.5); box-shadow: 0 0 15px var(--pink);
        }

        @keyframes rotateLED { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-fg"></canvas>

    <div id="overlay">
        <div class="loading-art-container">
            <img id="loadImg" src="" alt="Deep Madding">
        </div>
        <div class="madding-brand">HUNG MADDING</div>
        <div id="loader" class="loader-ui">
            <div class="progress-track"><div id="bar" class="progress-bar"></div></div>
            <div id="status" class="status-msg">SYSTEM INITIALIZING... 0%</div>
        </div>
        <button id="btn" class="btn-access" onclick="access()">ACCESS SYSTEM</button>
    </div>

    <div id="music-toggle" onclick="toggle()"><i class="fas fa-compact-disc"></i></div>
    <audio id="audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main" class="main-wrapper">
        <div class="profile-card">
            <div class="avatar-box"><span>H</span></div>
            <h1 style="margin-bottom:10px;">Nguyễn Mạnh Hùng</h1>
            <p id="tw" style="height:20px; color:rgba(255,255,255,0.6); font-size:13px; margin-bottom:30px; font-family:'Fira Code';"></p>
            <div class="links">
                <a href="https://facebook.com/m.hung.11.02" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://tiktok.com/@hung_madding" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loadImg').src = decodeURIComponent('%E1%BA%A3nh%20ch%E1%BB%9D.jpg');
        
        let p = 0;
        const bar = document.getElementById('bar');
        const st = document.getElementById('status');
        const audio = document.getElementById('audio');

        const loading = setInterval(() => {
            if (p >= 100) {
                clearInterval(loading);
                st.innerText = "READY TO ACCESS! 100%";
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('btn').style.display = 'block';
                }, 500);
            } else {
                p += Math.random() * 1.5;
                if(p > 100) p = 100;
                bar.style.width = p + '%';
                st.innerText = (p < 50 ? "INJECTING SAKURA.GIF... " : "BOOTING BIO-OS... ") + Math.floor(p) + "%";
            }
        }, 40);

        function access() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play();
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main').classList.add('active');
                document.getElementById('music-toggle').style.display = 'flex';
                document.getElementById('music-toggle').style.animation = 'rotateCD 3s linear infinite';
                type();
            }, 1000);
        }

        function type() {
            const t = "> System Booted. Welcome back, Hùng Madding.";
            let i = 0;
            function run() {
                if(i < t.length) {
                    document.getElementById('tw').innerHTML += t.charAt(i++);
                    setTimeout(run, 50);
                }
            }
            run();
        }

        function toggle() {
            if (audio.paused) { audio.play(); document.getElementById('music-toggle').style.animation = 'rotateCD 3s linear infinite'; }
            else { audio.pause(); document.getElementById('music-toggle').style.animation = 'none'; }
        }

        function snow(id, n, s, sp, o) {
            const c = document.getElementById(id); const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let parts = Array.from({length: n}, () => ({x: Math.random()*c.width, y: Math.random()*c.height, r: Math.random()*s+0.5}));
            function draw() {
                ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = `rgba(255,255,255,${o})`;
                ctx.beginPath(); parts.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); }); ctx.fill();
                parts.forEach(p => { p.y += sp; if(p.y > c.height) p.y = -10; }); requestAnimationFrame(draw);
            }
            draw();
        }
        snow('canvas-bg', 60, 1, 0.5, 0.2); snow('canvas-mid', 40, 2, 1, 0.4); snow('canvas-fg', 15, 4, 1.8, 0.6);
    </script>
</body>
</html>
