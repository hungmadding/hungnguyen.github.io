<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff4d94; --pink-glow: #ff0077; --pink-dark: #cc005f; --glass: rgba(15, 10, 15, 0.15); --glass-border: rgba(255, 77, 148, 0.25); --bg-dark: #050505; --text-main: #ffffff; --verified-color: #ff5ca1; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { height: 100dvh; width: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg-dark); overflow: hidden; color: var(--text-main); }
        #bg-image { position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center/cover; z-index: 0; filter: brightness(0.8) contrast(1.1); }
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #canvas-bg { z-index: 1; } #canvas-mid { z-index: 2; } #canvas-foreground { z-index: 10001; }
        #overlay { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1); background: #000; }
        #overlay.fade-out { opacity: 0; transform: scale(1.3); pointer-events: none; }
        .loading-bg-full { position: absolute; inset: 0; background: url('anhcho.jpg') no-repeat center center/cover; z-index: -1; filter: brightness(0.5); }
        .loading-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 90%; background: rgba(0,0,0,0.2); padding: 40px 0; border-radius: 20px; }
        .loading-name { font-family: 'Fira Code', monospace; font-size: clamp(24px, 8vw, 32px); font-weight: 700; letter-spacing: 10px; text-shadow: 0 0 30px var(--pink-glow); margin-bottom: 25px; color: #fff; }
        .loader-container { width: 85%; max-width: 350px; transition: opacity 0.5s; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 20px var(--pink); transition: width 0.2s; }
        .status-box { display: flex; justify-content: space-between; font-family: 'Fira Code', monospace; font-size: 10px; color: var(--pink); font-weight: bold; }
        .enter-btn { display: none; background: rgba(0,0,0,0.6); border: 2.5px solid var(--pink); color: var(--pink); padding: 15px 40px; font-family: 'Fira Code', monospace; font-weight: 700; border-radius: 15px; cursor: pointer; text-transform: uppercase; transition: all 0.4s; backdrop-filter: blur(5px); }
        .main-wrapper { position: relative; height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; opacity: 0; visibility: hidden; perspective: 2000px; padding: 20px; transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1); transform: scale(0.8) translateY(30px); filter: blur(10px); }
        .main-wrapper.active { opacity: 1; visibility: visible; transform: scale(1) translateY(0); filter: blur(0); }
        .card { background: var(--glass); backdrop-filter: blur(25px); border-radius: 40px; width: 100%; max-width: 360px; padding: 40px 25px; text-align: center; border: 1px solid var(--glass-border); position: relative; overflow: hidden; z-index: 1; }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, var(--pink), transparent, transparent); animation: rotateLED 4s linear infinite; z-index: -1; }
        .card::after { content: ''; position: absolute; inset: 2px; background: #0a050a; border-radius: 38px; z-index: -1; }
        .avatar-box { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--pink); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--pink-glow); }
        .waviy { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 5px; font-size: clamp(18px, 5vw, 22px); font-weight: 700; }
        .waviy span { animation: waviy 3s infinite; animation-delay: calc(.1s * var(--i)); color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px var(--pink-glow); }
        .verified-badge { display: inline-flex; align-items: center; justify-content: center; width: 17px; height: 17px; background: var(--verified-color); border-radius: 50%; color: #fff; font-size: 9px; margin-left: 6px; box-shadow: 0 0 10px var(--verified-color); position: relative; top: -2px; }
        .info-status { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-family: 'Fira Code', monospace; font-size: 12px; color: #ccc; }
        .info-status b { color: var(--pink); text-shadow: 0 0 8px var(--pink-glow); }
        .online-dot { animation: statusPulse 1.5s infinite; color: #00ff00; font-size: 8px; }
        .typewriter { font-family: 'Fira Code', monospace; font-size: 12px; color: var(--pink); min-height: 35px; margin-bottom: 20px; }
        .link-item { position: relative; background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 77, 148, 0.2); border-radius: 12px; padding: 12px 18px; color: #fff; text-decoration: none; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.4s; font-size: 14px; }
        .link-item:hover { background: rgba(255, 255, 255, 0.08); border-color: #fff; transform: translateY(-2px); }
        .system-time { position: fixed; top: 15px; left: 15px; z-index: 10005; font-family: 'Fira Code', monospace; color: var(--pink); text-shadow: 0 0 15px var(--pink-glow); display: none; }
        .music-player { position: fixed; top: 20px; right: 20px; width: 280px; background: rgba(10, 10, 10, 0.85); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; z-index: 10005; backdrop-filter: blur(15px); display: none; font-family: 'Fira Code', monospace; box-shadow: 0 0 20px rgba(255, 77, 148, 0.2); }
        .music-icon-floating { position: absolute; top: -10px; right: -10px; background: var(--pink); color: #000; width: 25px; height: 25px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; }
        #playlist-menu { display: none; max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
        .track-item { padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; color: #ccc; }
        .track-item.active { background: rgba(255, 77, 148, 0.2); color: var(--pink); border: 1px solid var(--pink); }
        .progress-container { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 10px 0; cursor: pointer; }
        .progress-bar-music { height: 100%; background: var(--pink); width: 0%; box-shadow: 0 0 8px var(--pink-glow); }
        .player-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .play-btns { display: flex; gap: 15px; align-items: center; }
        .play-btns i { color: #fff; cursor: pointer; transition: 0.3s; }
        #greeting-toast, #instruction-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(255, 77, 148, 0.3); border: 1px solid var(--pink); padding: 10px 20px; border-radius: 20px; color: #fff; z-index: 10006; opacity: 0; visibility: hidden; transition: 0.8s; text-align: center; width: 80%; max-width: 300px; backdrop-filter: blur(10px); }
        #greeting-toast.show, #instruction-toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .ok-btn { margin-top: 10px; background: var(--pink); border: none; color: #000; padding: 5px 15px; border-radius: 10px; font-family: 'Fira Code'; font-weight: bold; cursor: pointer; font-size: 10px; }
        .footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 8px; opacity: 0.4; font-family: 'Fira Code'; }
        @keyframes waviy { 0%, 40%, 100% { transform: translateY(0); } 20% { transform: translateY(-4px); } }
        @keyframes rotateLED { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 768px) { .music-player { width: 220px; right: 10px; top: 70px; } }
    </style>
</head>
<body>
    <div id="bg-image"></div>
    <div class="system-time" id="sysTime"><div id="real-clock">00:00:00</div><div id="real-date">...</div></div>
    
    <div id="greeting-toast">Chào mừng bạn!</div>
    <div id="instruction-toast">
        <div>bấm vào bài nhạc bạn thích để nghe nha!</div>
        <button class="ok-btn" onclick="closeInstruction()">OK</button>
    </div>

    <canvas id="canvas-bg"></canvas><canvas id="canvas-mid"></canvas><canvas id="canvas-foreground"></canvas>
    <div id="overlay">
        <div class="loading-bg-full"></div> 
        <div class="loading-content">
            <div class="loading-name">HUNG MADDING</div>
            <div id="loaderUI" class="loader-container">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div class="status-box"><span id="loadStatus">Initializing...</span><span id="loadPercent">0%</span></div>
            </div>
            <button id="enterBtn" class="enter-btn" onclick="initSystem()">Bấm để vô nhoa :3</button>
        </div>
    </div>
    <div id="music-player" class="music-player">
        <div class="music-icon-floating" id="disc-icon"><i class="fas fa-compact-disc"></i></div>
        <div id="player-main-view" style="display: none;">
            <div class="song-info">
                <div class="song-title" id="display-title">Người Đầu Tiên</div>
                <div class="artist-name" id="display-artist">Anh Tú</div>
            </div>
            <div class="progress-container" onclick="seek(event)"><div class="progress-bar-music" id="musicProgress"></div></div>
            <div class="time-display" style="font-size: 9px; color: #666; display: flex; justify-content: space-between;">
                <span id="currentTime">0:00</span><span id="duration">0:00</span>
            </div>
        </div>
        <div id="playlist-menu" style="display: block;"></div>
        <div class="player-controls">
            <div class="play-btns">
                <i class="fas fa-times" id="menuBtn" onclick="toggleMenu()" style="color: var(--pink); font-size: 12px; margin-right: 5px;"></i>
                <i class="fas fa-backward" onclick="prevTrack()"></i>
                <i class="fas fa-play" id="mainPlayBtn" onclick="toggleMusic()"></i>
                <i class="fas fa-forward" onclick="nextTrack()"></i>
            </div>
            <i class="fas fa-volume-up" style="font-size: 10px; color: var(--pink);"></i>
        </div>
    </div>
    <audio id="mainAudio" loop><source id="audioSource" src="nguoidautien.mp3" type="audio/mpeg"></audio>
    <main id="mainUI" class="main-wrapper">
        <div id="tiltCard" class="card">
            <div class="avatar-box"><span>H</span></div>
            <h1 class="waviy">
                <span style="--i:1">N</span><span style="--i:2">g</span><span style="--i:3">u</span><span style="--i:4">y</span><span style="--i:5">ễ</span><span style="--i:6">n</span><span>&nbsp;</span><span style="--i:7">M</span><span style="--i:8">ạ</span><span style="--i:9">n</span><span style="--i:10">h</span><span>&nbsp;</span><span style="--i:11">H</span><span style="--i:12">ù</span><span style="--i:13">n</span><span style="--i:14">g</span>
                <div class="verified-badge"><i class="fas fa-check"></i></div>
            </h1>
            <div class="info-status">
                <span><i class="fas fa-location-dot"></i> <b>TAM DƯƠNG</b></span>
                <span><i class="fas fa-bolt"></i> <b>Lvl:siêu tuất</b></span>
                <span><i class="fas fa-circle online-dot"></i> <b>Online</b></span>
            </div>
            <div id="typewriter" class="typewriter"></div>
            <div class="links-container">
                <a href="https://www.facebook.com/hung.madding" target="_blank" class="link-item"><span>Facebook</span><i class="fab fa-facebook"></i></a>
                <a href="https://www.tiktok.com/@hung_md3" target="_blank" class="link-item"><span>TikTok Channel</span><i class="fab fa-tiktok"></i></a>
                <a href="https://github.com/hungmadding" target="_blank" class="link-item"><span>Github Projects</span><i class="fab fa-github"></i></a>
                <div onclick="alert('Cảm ơn bạn đã quan tâm đến mìn<3')" class="link-item about-me"><span>About me</span><i class="fas fa-heart"></i></div>
            </div>
        </div>
    </main>
    <div class="footer">welcome :3</div>

    <script>
        const audio = document.getElementById('mainAudio');
        const fill = document.getElementById('progressFill'), percentTxt = document.getElementById('loadPercent'), statusTxt = document.getElementById('loadStatus');
        const enterBtn = document.getElementById('enterBtn'), loaderUI = document.getElementById('loaderUI');
        const playlist = [
            { title: "Người Đầu Tiên", artist: "Anh Tú", src: "nguoidautien.mp3" },
            { title: "one of the girls", artist: "Hưng Madding Edition", src: "music.mp3" },
            { title: "ex 'hate me", artist: "Hà Anh Tuấn", src: "track3.mp3" }
        ];
        let currentTrackIndex = 0;

        let currentProgress = 0;
        const loaderTask = setInterval(() => {
            if (currentProgress >= 100) {
                clearInterval(loaderTask);
                setTimeout(() => {
                    loaderUI.style.opacity = "0";
                    setTimeout(() => { loaderUI.style.display = "none"; enterBtn.style.display = "block"; enterBtn.style.animation = "fadeIn 0.8s forwards"; }, 500);
                }, 500);
            } else {
                currentProgress += Math.random() * 3;
                if (currentProgress > 100) currentProgress = 100;
                fill.style.width = currentProgress + "%";
                percentTxt.innerText = Math.floor(currentProgress) + "%";
                statusTxt.innerText = currentProgress > 80 ? "System Ready!" : (currentProgress > 40 ? "Processing..." : "Initializing...");
            }
        }, 40);

        function initSystem() {
            const overlay = document.getElementById('overlay');
            overlay.classList.add('fade-out');
            renderPlaylist();
            setTimeout(() => {
                document.getElementById('mainUI').classList.add('active');
                document.getElementById('music-player').style.display = "block";
                document.getElementById('sysTime').style.display = "block";
                setInterval(updateSystemTime, 1000);
                showGreeting(); 
                startTypeWriter();
                setTimeout(() => { overlay.style.display = "none"; }, 1200);
            }, 600);
        }

        function updateSystemTime() {
            const now = new Date();
            document.getElementById('real-clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('real-date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function showGreeting() {
            const h = new Date().getHours(), t = document.getElementById('greeting-toast');
            t.innerText = h<11 ? "Chào buổi sáng! ☀️" : h<14 ? "Chào buổi trưa!🍱" : h<18 ? "Chào buổi chiều!☕" : h<22 ? "Chào buổi tối!✨" : "Khuya rồi, ngủ ngon!🌙";
            t.classList.add('show'); 
            
            // Đợi 4 giây cho thông báo đầu tiên, sau đó ẩn đi và hiện thông báo thứ hai
            setTimeout(() => { 
                t.classList.remove('show');
                setTimeout(() => {
                    document.getElementById('instruction-toast').classList.add('show');
                }, 800);
            }, 4000);
        }

        function closeInstruction() {
            document.getElementById('instruction-toast').classList.remove('show');
        }

        function startTypeWriter() {
            const text = "> cám ơn bạn gì đó trai xinh gái đẹp đã ghé thăm nha!";
            let i = 0; const target = document.getElementById('typewriter');
            (function type() { if(i < text.length) { target.innerHTML += text.charAt(i++); setTimeout(type, 40); } })();
        }

        function renderPlaylist() {
            const menu = document.getElementById('playlist-menu'); menu.innerHTML = "";
            playlist.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = `track-item ${i === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `${i + 1}. ${t.title}`;
                item.onclick = () => selectTrack(i);
                menu.appendChild(item);
            });
        }

        function toggleMenu() {
            const m = document.getElementById('playlist-menu'), v = document.getElementById('player-main-view'), b = document.getElementById('menuBtn');
            const isNone = m.style.display === "none" || m.style.display === "";
            m.style.display = isNone ? "block" : "none"; v.style.display = isNone ? "none" : "block";
            b.classList.replace(isNone ? 'fa-bars' : 'fa-times', isNone ? 'fa-times' : 'fa-bars');
        }

        function selectTrack(i) {
            currentTrackIndex = i; audio.src = playlist[i].src;
            document.getElementById('display-title').innerText = playlist[i].title;
            document.getElementById('display-artist').innerText = playlist[i].artist;
            renderPlaylist(); audio.play();
            document.getElementById('mainPlayBtn').classList.replace('fa-play', 'fa-pause');
            document.getElementById('disc-icon').style.animation = "rotateCD 3s linear infinite";
            document.getElementById('disc-icon').style.animationPlayState = "running";
            if(document.getElementById('playlist-menu').style.display === "block") toggleMenu();
        }

        function nextTrack() { selectTrack((currentTrackIndex + 1) % playlist.length); }
        function prevTrack() { selectTrack((currentTrackIndex - 1 + playlist.length) % playlist.length); }
        function toggleMusic() {
            const b = document.getElementById('mainPlayBtn'), d = document.getElementById('disc-icon');
            if (audio.paused) { audio.play(); b.classList.replace('fa-play', 'fa-pause'); d.style.animationPlayState = "running"; }
            else { audio.pause(); b.classList.replace('fa-pause', 'fa-play'); d.style.animationPlayState = "paused"; }
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                document.getElementById('musicProgress').style.width = (audio.currentTime/audio.duration)*100 + "%";
                const fmt = s => Math.floor(s/60) + ":" + ("0" + Math.floor(s%60)).slice(-2);
                document.getElementById('currentTime').innerText = fmt(audio.currentTime);
                document.getElementById('duration').innerText = fmt(audio.duration);
            }
        });

        function seek(e) { audio.currentTime = (e.offsetX / document.querySelector('.progress-container').clientWidth) * audio.duration; }

        class SnowEngine {
            constructor(id, count, conf) {
                this.c = document.getElementById(id); this.ctx = this.c.getContext('2d');
                this.particles = Array.from({length: count}, () => ({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, r: Math.random()*conf.size+1, v: Math.random()*conf.speed+0.3, o: Math.random()*0.5+conf.opacity }));
                window.addEventListener('resize', () => { this.c.width = window.innerWidth; this.c.height = window.innerHeight; });
                this.c.width = window.innerWidth; this.c.height = window.innerHeight; this.animate();
            }
            animate() {
                this.ctx.clearRect(0,0,this.c.width,this.c.height); this.ctx.fillStyle = "white";
                this.particles.forEach(p => { this.ctx.globalAlpha = p.o; this.ctx.beginPath(); this.ctx.arc(p.x, p.y+=p.v, p.r, 0, 7); this.ctx.fill(); if(p.y > this.c.height) p.y = -10; });
                requestAnimationFrame(() => this.animate());
            }
        }
        const isMob = /Android|iPhone/i.test(navigator.userAgent);
        new SnowEngine('canvas-bg', isMob?15:60, {size:1, speed:0.3, opacity:0.1});
        new SnowEngine('canvas-mid', isMob?10:40, {size:2, speed:0.7, opacity:0.2});
        new SnowEngine('canvas-foreground', isMob?5:15, {size:4, speed:1.2, opacity:0.4});

        if(!isMob) document.addEventListener('mousemove', e => {
            const x = (window.innerWidth/2 - e.clientX)/35, y = (window.innerHeight/2 - e.clientY)/35;
            document.getElementById('tiltCard').style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
