<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS v5.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --pink-glow: #ff0077; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        /* --- BACKGROUND LAYER --- */
        #bg-image {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('image_3ebd81.jpg') no-repeat center center;
            background-size: cover; z-index: 0;
        }

        /* --- SNOW SYSTEM (GIỮ Y NGUYÊN 3 LỚP) --- */
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

        /* --- LỚP PHỦ LOADING (NÂNG CẤP TỪ ẢNH 3F2647) --- */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease, transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), visibility 1s;
        }
        #loading-overlay.exit { opacity: 0; visibility: hidden; transform: scale(1.1); }

        .loading-card-box {
            position: relative; width: 280px; height: 420px;
            border-radius: 35px; border: 3px solid var(--pink);
            box-shadow: 0 0 50px var(--pink-glow), 0 0 100px rgba(255, 77, 148, 0.2);
            overflow: hidden; margin-bottom: 25px;
            animation: float 4s ease-in-out infinite;
        }
        .loading-card-box img { width: 100%; height: 100%; object-fit: cover; }

        .brand-name {
            font-family: 'Fira Code', monospace; font-size: 32px; font-weight: 700;
            color: var(--pink); letter-spacing: 12px; text-transform: uppercase;
            text-shadow: 0 0 20px var(--pink-glow); margin-bottom: 30px;
        }

        .loader-wrapper { width: 280px; text-align: center; }
        .bar-bg { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 77, 148, 0.2); }
        .bar-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 15px var(--pink); }
        .status-text { font-family: 'Fira Code'; font-size: 10px; color: var(--pink); margin-top: 15px; letter-spacing: 2px; }

        .access-btn { 
            display: none; border: 2px solid var(--pink); padding: 15px 45px; 
            cursor: pointer; background: transparent; color: var(--pink); 
            font-family: 'Fira Code'; font-weight: 700; border-radius: 8px; margin-top: 20px;
            box-shadow: 0 0 20px var(--pink); transition: 0.3s;
        }

        /* --- MAIN UI (GIỮ NGUYÊN TÍNH NĂNG VÀ BỐ CỤC CŨ) --- */
        .main-wrapper { 
            height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; visibility: hidden; transition: 2s ease-in-out; z-index: 10;
        }
        .main-wrapper.active { opacity: 1; visibility: visible; }

        .profile-card {
            background: rgba(10, 5, 10, 0.9); backdrop-filter: blur(25px);
            border-radius: 45px; padding: 45px 30px; width: 360px;
            text-align: center; position: relative; overflow: hidden;
            border: 1px solid rgba(255, 77, 148, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        /* LED VIỀN QUAY - GIỮ NGUYÊN */
        .profile-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, var(--pink), transparent); animation: rotateLED 4s linear infinite; z-index: -1; }
        .profile-card::after { content: ''; position: absolute; inset: 4px; background: #0a050a; border-radius: 42px; z-index: -1; }

        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--pink); margin: 0 auto 20px; box-shadow: 0 0 25px var(--pink); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: var(--pink); }

        .typewriter-text { height: 20px; color: var(--pink); font-size: 13px; margin-bottom: 25px; font-family: 'Fira Code'; }

        /* GIỮ NGUYÊN ABOUT ME */
        .about-me-section {
            background: rgba(255, 255, 255, 0.03); border-radius: 15px; padding: 15px;
            margin-bottom: 20px; border: 1px solid rgba(255, 77, 148, 0.1); text-align: left;
        }
        .about-me-section h3 { font-size: 12px; color: var(--pink); margin-bottom: 5px; text-transform: uppercase; }
        .about-me-section p { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; }

        /* GIỮ NGUYÊN CÁC NÚT MẠNG XÃ HỘI */
        .links-container { display: flex; flex-direction: column; gap: 12px; }
        .link-card {
            background: rgba(255, 255, 255, 0.03); padding: 15px 20px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; transition: 0.3s;
        }
        .link-card:hover { background: rgba(255, 77, 148, 0.15); border-color: var(--pink); transform: translateY(-3px); }

        #music-btn {
            position: fixed; top: 25px; right: 25px; z-index: 10005;
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; background: rgba(0,0,0,0.5); box-shadow: 0 0 15px var(--pink);
        }

        @keyframes rotateLED { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="canvas-snow"></canvas>

    <div id="loading-overlay">
        <div class="loading-card-box">
            <img src="image_3f2647.jpg" alt="Madding Art">
        </div>
        <div class="brand-name">HUNG MADDING</div>
        <div id="loader-ui" class="loader-wrapper">
            <div class="bar-bg"><div id="fill" class="bar-fill"></div></div>
            <div id="status" class="status-text">INITIALIZING BIO-OS... 0%</div>
        </div>
        <button id="access-btn" class="access-btn" onclick="startSystem()">ACCESS SYSTEM</button>
    </div>

    <div id="music-btn" onclick="controlMusic()"><i class="fas fa-compact-disc"></i></div>
    <audio id="bg-audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main-ui" class="main-wrapper">
        <div class="profile-card">
            <div class="avatar">H</div>
            <h1 style="font-size: 24px; margin-bottom: 5px;">Nguyễn Mạnh Hùng</h1>
            <div id="tw" class="typewriter-text"></div>
            
            <div class="about-me-section">
                <h3>About Me</h3>
                <p>Đam mê lập trình Python, Automation và Web Design. Chào mừng ông đến với thế giới của Hùng Madding!</p>
            </div>

            <div class="links-container">
                <a href="https://facebook.com/m.hung.11.02" class="link-card"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="link-card"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://tiktok.com/@hung_madding" class="link-card"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        let progress = 0;

        // LOADING LOGIC - KHÔNG ĐỔI
        const loading = setInterval(() => {
            if (progress >= 100) {
                clearInterval(loading);
                document.getElementById('status').innerText = "SYSTEM READY!";
                setTimeout(() => {
                    document.getElementById('loader-ui').style.display = 'none';
                    document.getElementById('access-btn').style.display = 'block';
                }, 500);
            } else {
                progress += Math.random() * 2;
                if(progress > 100) progress = 100;
                document.getElementById('fill').style.width = progress + '%';
                document.getElementById('status').innerText = "LOADING... " + Math.floor(progress) + "%";
            }
        }, 50);

        function startSystem() {
            // HIỆU ỨNG BIẾN MẤT CỦA LỚP PHỦ
            document.getElementById('loading-overlay').classList.add('exit');
            audio.play();
            setTimeout(() => {
                document.getElementById('main-ui').classList.add('active');
                document.getElementById('music-btn').style.display = 'flex';
                document.getElementById('music-btn').style.animation = 'rotateCD 3s linear infinite';
                typeWriter();
            }, 1000);
        }

        function typeWriter() {
            const text = "> Access Granted. Welcome back, Hùng Madding...";
            let i = 0;
            function run() {
                if(i < text.length) {
                    document.getElementById('tw').innerHTML += text.charAt(i++);
                    setTimeout(run, 50);
                }
            }
            run();
        }

        function controlMusic() {
            if (audio.paused) { audio.play(); document.getElementById('music-btn').style.animation = 'rotateCD 3s linear infinite'; }
            else { audio.pause(); document.getElementById('music-btn').style.animation = 'none'; }
        }

        // SNOW SYSTEM - GIỮ NGUYÊN
        const c = document.getElementById('canvas-snow');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let flakes = Array.from({length: 80}, () => ({x: Math.random()*c.width, y: Math.random()*c.height, r: Math.random()*2+1, s: Math.random()*0.8+0.2}));
        function draw() {
            ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath();
            flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); }); ctx.fill();
            flakes.forEach(f => { f.y += f.s; if(f.y > c.height) f.y = -10; }); requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
