<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Bio Link</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --glass: rgba(10, 10, 15, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* MÀN HÌNH CHỜ */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer; transition: 0.8s ease;
        }
        #overlay i { font-size: 60px; color: var(--pink); margin-bottom: 20px; animation: pulse 1.5s infinite; }
        #overlay p { color: white; letter-spacing: 5px; font-weight: 700; font-size: 14px; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* NỀN PINTEREST */
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.pinimg.com/originals/a0/0c/33/a00c33a948e7b9b1e9b1e9b1e9b1e9b1.jpg'); background-size: cover; background-position: center; }
        #particles { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* CARD BIO */
        .container { perspective: 1000px; display: none; opacity: 0; transition: 1s; }
        .card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 50px 40px; width: 380px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); transform-style: preserve-3d;
        }

        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 20px var(--pink); margin-bottom: 25px; object-fit: cover; transform: translateZ(50px); }
        h1 { font-size: 28px; color: white; text-shadow: 0 0 15px var(--pink); margin-bottom: 10px; transform: translateZ(40px); }
        .tagline { color: var(--pink); font-weight: 700; font-size: 12px; letter-spacing: 2px; margin-bottom: 35px; text-transform: uppercase; transform: translateZ(30px); }

        .link-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px; border-radius: 18px; color: white; text-decoration: none; font-weight: 700;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; transition: 0.3s; transform: translateZ(20px);
        }
        .link-item:hover { background: white; color: black; transform: scale(1.05) translateZ(30px); }
        .link-item i { font-size: 18px; color: var(--pink); }

        .music-btn { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(255, 255, 255, 0.1); border-radius: 12px; display: none; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

    <div id="overlay">
        <i class="fas fa-play"></i>
        <p>CLICK TO ENTER</p>
    </div>

    <div class="bg-overlay"></div>
    <canvas id="particles"></canvas>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    
    <div class="music-btn" id="musicToggle"><i class="fas fa-music"></i></div>

    <div class="container" id="mainApp">
        <div class="card" id="card">
            <img src="https://i.imgur.com/uIKY94v.png" class="avatar" alt="Hùng Madding">
            <h1>Hùng Madding</h1>
            <div class="tagline">Python Developer | Pink Vibe</div>
            <a href="https://facebook.com/hung.madding" class="link-item"><span>Facebook</span> <i class="fab fa-facebook"></i></a>
            <a href="https://tiktok.com/@hung_md3" class="link-item"><span>TikTok</span> <i class="fab fa-tiktok"></i></a>
            <a href="https://github.com/hungmadding" class="link-item"><span>GitHub</span> <i class="fab fa-github"></i></a>
            <a href="#" class="link-item"><span>Discord</span> <i class="fab fa-discord"></i></a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const overlay = document.getElementById('overlay');
        const app = document.getElementById('mainApp');
        const card = document.getElementById('card');
        const mBtn = document.getElementById('musicToggle');

        // Bắt đầu ứng dụng khi click vào overlay
        overlay.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                app.style.display = 'block';
                setTimeout(() => { app.style.opacity = '1'; }, 50);
                mBtn.style.display = 'flex';
                initParticles();
                drawParticles();
                audio.play().catch(() => { console.log("Cần click để phát nhạc"); });
            }, 800);
        });

        // Tuyết hồng lấp lánh
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function initParticles() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i = 0; i < 70; i++) {
                dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, v: Math.random()*0.5+0.2 });
            }
        }
        function drawParticles() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#ff4d94";
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI*2); ctx.fill();
                d.y -= d.v; if(d.y < 0) d.y = canvas.height;
            });
            requestAnimationFrame(drawParticles);
        }

        // Hiệu ứng lắc 3D
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Nút nhạc
        mBtn.addEventListener('click', () => {
            if(audio.paused) { audio.play(); mBtn.innerHTML = '<i class="fas fa-volume-up"></i>'; }
            else { audio.pause(); mBtn.innerHTML = '<i class="fas fa-volume-mute"></i>'; }
        });
    </script>
</body>
</html>
