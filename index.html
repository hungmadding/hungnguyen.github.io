<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077;
            --glass: rgba(10, 5, 10, 0.1);
            --black: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        /* --- BACKGROUND MODULE --- */
        #bg-image {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0;
        }
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-fg { z-index: 10001; }

        /* --- LOADING SCREEN (FIXED FOR DEEP MADDING PHOTO) --- */
        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-container {
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; height: 100%; justify-content: space-evenly; /* Tự động phân bổ khoảng cách */
        }

        /* --- SỬA LỖI: HIỂN THỊ TRỌN VẸN CARD ẢNH CỦA HÙNG --- */
        .card-madding-box {
            width: 90%; max-width: 300px; /* To ra cho PC, thu nhỏ cho Phone */
            height: 450px; /* Đảm bảo chiều cao không bị cắt */
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            animation: float 4s ease-in-out infinite;
            
            /* DÙNG CHÍNH CÁI VIỀN HỒNG CỦA ẢNH HÙNG NHƯNG TĂNG SÁNG */
            box-shadow: 0 0 50px rgba(255, 77, 148, 0.3);
        }
        .card-madding-box img { width: 100%; height: 100%; object-fit: cover; }

        .brand-neon {
            font-family: 'Fira Code', monospace;
            font-size: 36px; font-weight: 700;
            color: var(--pink); letter-spacing: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 25px var(--pink-glow);
            margin-top: -80px; /* Đẩy text lên gần Card hơn (vì dùng space-evenly) */
        }

        .loader-ui { width: 280px; text-align: center; }
        .bar-container {
            width: 100%; height: 5px; background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 77, 148, 0.1);
        }
        .bar-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 20px var(--pink); transition: 0.1s; }
        
        .status-log { font-family: 'Fira Code'; font-size: 10px; color: var(--pink); margin-top: 15px; letter-spacing: 2px; }
        .percent-num { font-family: 'Fira Code'; font-size: 16px; color: var(--pink); margin-top: 5px; }

        .btn-access { 
            display: none; border: 2px solid var(--pink); padding: 15px 45px; 
            cursor: pointer; background: transparent; color: var(--pink); 
            font-family: 'Fira Code'; font-weight: 700; letter-spacing: 3px;
            border-radius: 10px; margin-top: 20px; transition: 0.5s;
            box-shadow: 0 0 20px var(--pink);
        }
        .btn-access:hover { background: var(--pink); color: #000; box-shadow: 0 0 40px var(--pink); }

        /* --- MAIN UI MODULE --- */
        .main-wrapper { 
            height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; visibility: hidden; transition: 2.5s; z-index: 10;
        }
        .main-wrapper.active { opacity: 1; visibility: visible; }

        .madding-profile {
            background: rgba(10, 5, 10, 0.85); backdrop-filter: blur(25px);
            border-radius: 50px; padding: 60px 40px; width: 360px;
            text-align: center; position: relative; overflow: hidden;
            border: 1px solid rgba(255, 77, 148, 0.2);
            box-shadow: 0 35px 70px rgba(0,0,0,0.9);
        }

        /* LED VIỀN QUAY */
        .madding-profile::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--pink), transparent);
            animation: rotateLED 4s linear infinite; z-index: -1;
        }
        .madding-profile::after { content: ''; position: absolute; inset: 4px; background: #0a050a; border-radius: 46px; z-index: -1; }

        .avatar-box {
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--pink); 
            margin: 0 auto 30px; box-shadow: 0 0 35px var(--pink);
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-box span { color: var(--pink); font-size: 50px; font-weight: 900; }

        .type-line { height: 25px; color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 40px; font-family: 'Fira Code'; }

        .link-group { display: flex; flex-direction: column; gap: 14px; }
        .link-item {
            background: rgba(255, 255, 255, 0.03); padding: 18px 22px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 20px; transition: 0.3s;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.15); border-color: var(--pink); transform: translateY(-3px); }
        .link-item i { font-size: 20px; color: var(--pink); }

        /* MUSIC UI */
        #music-disc {
            position: fixed; top: 30px; right: 30px; z-index: 10005;
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            box-shadow: 0 0 20px var(--pink);
        }

        @keyframes rotateLED { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .sys-log { position: fixed; bottom: 25px; right: 30px; font-size: 11px; color: rgba(255,255,255,0.2); font-family: 'Fira Code'; }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-fg"></canvas>

    <div id="overlay">
        <div class="loading-container">
            <div class="card-madding-box">
                <img id="maddingSource" src="" alt="Deep Madding Art">
            </div>
            <div class="brand-neon">HUNG MADDING</div>
            <div id="loader-box" class="loader-ui">
                <div class="bar-container"><div id="fill-bar" class="bar-fill"></div></div>
                <div id="status-text" class="status-log">INITIALIZING BIO-OS...</div>
                <div id="percent-num" class="percent-num">0%</div>
            </div>
            <button id="startBtn" class="btn-access" onclick="launchOS()">ENTER BIO-OS</button>
        </div>
    </div>

    <div id="music-disc" onclick="toggleM()"><i class="fas fa-compact-disc"></i></div>
    <audio id="os-audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main-ui" class="main-wrapper">
        <div class="madding-profile" id="tilt-card">
            <div class="avatar-box"><span>H</span></div>
            <h1 style="margin-bottom:10px;">Nguyễn Mạnh Hùng</h1>
            <div id="typewriter" class="type-line"></div>
            <div class="link-group">
                <a href="https://facebook.com/m.hung.11.02" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://tiktok.com/@hung_madding" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <div class="link-item" style="cursor:help;"><span>Bio-OS v3.22</span><i class="fas fa-microchip"></i></div>
            </div>
        </div>
    </div>

    <div class="sys-log">SYSTEM_ID: MADDING_OS_11A6</div>

    <script>
        // Load kiệt tác của ông
        document.getElementById('maddingSource').src = decodeURIComponent('%E1%BA%A3nh%20ch%E1%BB%9D.jpg');
        
        const audio = document.getElementById('os-audio');
        const fill = document.getElementById('fill-bar');
        const percent = document.getElementById('percent-num');
        const status = document.getElementById('status-text');
        let progVal = 0;
        const messages = ["INJECTING SAKURA.GIF...", "LOADING NEON ASSETS...", "BOOTING BIO-OS...", "READY!"];

        // Xử lý Loading
        const loadProcess = setInterval(() => {
            if (progVal >= 100) {
                clearInterval(loadProcess);
                status.innerText = messages[3];
                percent.innerText = "100%";
                setTimeout(() => {
                    document.getElementById('loader-box').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'block';
                }, 600);
            } else {
                progVal += Math.random() * 1.8;
                if(progVal > 100) progVal = 100;
                fill.style.width = progVal + '%';
                percent.innerText = Math.floor(progVal) + "%";
                if(progVal < 35) status.innerText = messages[0];
                else if(progVal < 75) status.innerText = messages[1];
                else status.innerText = messages[2];
            }
        }, 40);

        function launchOS() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play().catch(e => console.log("Audio play deferred"));
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-ui').classList.add('active');
                document.getElementById('music-disc').style.display = 'flex';
                document.getElementById('music-disc').style.animation = 'rotateCD 3s linear infinite';
                runTypeWriter();
            }, 1200);
        }

        function runTypeWriter() {
            const txt = "> Booting Madding System... Access Granted.";
            let i = 0;
            const target = document.getElementById('typewriter');
            function run() {
                if(i < txt.length) {
                    target.innerHTML += txt.charAt(i++);
                    setTimeout(run, 60);
                }
            }
            run();
        }

        function toggleM() {
            if (audio.paused) { 
                audio.play(); 
                document.getElementById('music-disc').style.animation = 'rotateCD 3s linear infinite';
            } else { 
                audio.pause(); 
                document.getElementById('music-disc').style.animation = 'none';
            }
        }

        // --- SNOW SYSTEM (3 LAYER V3) ---
        function startSnow(id, count, size, speed, opac) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let flakes = Array.from({length: count}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                r: Math.random() * size + 0.5, d: Math.random() * count
            }));
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = `rgba(255, 255, 255, ${opac})`;
                ctx.beginPath();
                flakes.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); });
                ctx.fill();
                flakes.forEach(p => {
                    p.y += speed; p.x += Math.sin(0.1);
                    if(p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
        startSnow('canvas-bg', 55, 1, 0.5, 0.2);
        startSnow('canvas-mid', 35, 2.5, 1.3, 0.4);
        startSnow('canvas-fg', 15, 5, 2.5, 0.6);

        // 3D TILT EFFECT
        if (!/Android|iPhone/i.test(navigator.userAgent)) {
            const cardElement = document.getElementById('tilt-card');
            window.addEventListener('mousemove', (e) => {
                let x = (window.innerWidth / 2 - e.clientX) / 25;
                let y = (window.innerHeight / 2 - e.clientY) / 25;
                cardElement.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
        }
    </script>
</body>
</html>
