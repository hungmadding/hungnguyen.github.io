<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Elegant Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --soft-glow: rgba(255, 77, 148, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: #0a0a0a; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* CHUỘT ICON VÒNG TRÒN NEON */
        #cursor { 
            position: fixed; width: 25px; height: 25px; border: 2px solid var(--pink); border-radius: 50%; 
            pointer-events: none; z-index: 10001; transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out; box-shadow: 0 0 15px var(--pink);
        }

        #canvas-snow { position: fixed; inset: 0; z-index: -1; }

        /* CARD VỚI LED CHUYỂN MÀU NHẸ */
        .container { perspective: 1000px; z-index: 10; }
        .card {
            background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(15px); border-radius: 35px;
            padding: 50px 40px; width: 380px; text-align: center; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1); transform-style: preserve-3d;
        }
        
        /* Hiệu ứng LED viền nhẹ nhàng */
        .card::before {
            content: ''; position: absolute; inset: -1px;
            background: linear-gradient(45deg, #ff4d94, #7000ff, #ff4d94);
            background-size: 200% 200%; z-index: -1; border-radius: 36px;
            animation: soft-glow 6s ease infinite; opacity: 0.5;
        }
        @keyframes soft-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 0 20px var(--soft-glow); margin-bottom: 25px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h1 { color: #fff; font-size: 26px; margin-bottom: 5px; }
        .tagline { color: var(--pink); font-size: 11px; letter-spacing: 2px; margin-bottom: 35px; opacity: 0.8; }

        .link-item {
            background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 18px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.1); border-color: var(--pink); transform: scale(1.02); }

        .music-btn { position: fixed; bottom: 30px; right: 30px; color: #fff; opacity: 0.5; transition: 0.3s; }
        .music-btn:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <canvas id="canvas-snow"></canvas>
    <audio id="bgm" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <div class="music-btn" id="mToggle" onclick="toggleMusic()"><i class="fas fa-music"></i></div>

    <div class="container">
        <div class="card" id="card">
            <img src="https://i.imgur.com/uIKY94v.png" class="avatar">
            <h1>Hùng Madding</h1>
            <p class="tagline">PYTHON DEVELOPER | PINK VIBE</p>
            <div class="links">
                <a href="https://facebook.com/hung.madding" target="_blank" class="link-item"><span>Facebook</span><i class="fab fa-facebook"></i></a>
                <a href="https://tiktok.com/@hung_md3" target="_blank" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <a href="https://github.com/hungmadding" target="_blank" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const card = document.getElementById('card');
        
        // Chuột và 3D
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            let x = (window.innerWidth / 2 - e.pageX) / 30;
            let y = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        // Tuyết bông to lãng mạn
        let flakes = [];
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            flakes = [];
            for(let i=0; i<45; i++) {
                flakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*15+8, v: Math.random()*0.8+0.4, o: Math.random()*0.4+0.1 });
            }
        }
        function drawSnow() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            flakes.forEach(f => {
                ctx.fillStyle = `rgba(255, 77, 148, ${f.o})`;
                ctx.font = `${f.s}px Arial`;
                ctx.fillText("❄", f.x, f.y);
                f.y += f.v; if(f.y > canvas.height) f.y = -20;
            });
            requestAnimationFrame(drawSnow);
        }
        window.addEventListener('resize', initSnow);
        initSnow(); drawSnow();

        function toggleMusic() {
            const a = document.getElementById('bgm');
            if(a.paused) a.play(); else a.pause();
        }
    </script>
</body>
</html>
