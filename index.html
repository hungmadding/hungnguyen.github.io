<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS v3.8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; --pink-glow: #ff0077; --pink-dark: #cc3a73;
            --bg: #0a0a0a; --glass: rgba(255,255,255,0.03); --text: rgba(255,255,255,0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg); overflow: hidden; touch-action: none; }
        
        #cursor { 
            position: fixed; width: 25px; height: 25px; background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 10002; transform: translate(-50%, -50%);
            box-shadow: 0 0 30px var(--pink-glow); display: none; transition: width 0.3s, height 0.3s;
        }

        #overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg) 0%, #1a0a1a 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .logo { font-size: 3rem; font-weight: 700; margin-bottom: 2rem; animation: logoFloat 3s infinite; font-family: 'Fira Code', monospace; text-shadow: 0 0 25px var(--pink); }
        .loading-bar { width: 250px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .loading-progress { height: 100%; background: var(--pink); width: 0%; animation: load 2.5s forwards; box-shadow: 0 0 20px var(--pink); }
        .enter-btn { border: 2px solid var(--pink); padding: 15px 35px; letter-spacing: 5px; cursor: pointer; text-transform: uppercase; font-weight: 600; transition: 0.3s; background: transparent; color: var(--pink); margin-top: 2rem; }
        .enter-btn:hover { background: var(--pink); color: white; box-shadow: 0 0 40px var(--pink); transform: scale(1.05); }

        @keyframes logoFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-150px);} }
        @keyframes load { to { width: 100%; } }

        /* HỆ THỐNG CANVAS 3 LỚP XỊN NHẤT */
        #canvas-bg, #canvas-mid, #canvas-foreground { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #canvas-foreground { z-index: 10001; } 

        .main-wrapper { 
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; perspective: 1200px; perspective-origin: center center;
            transform: scale(0.9); transition: all 1s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 10; position: relative; padding: 20px;
        }
        .main-wrapper.active { opacity: 1; transform: scale(1); pointer-events: all; }

        .card {
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(30px) saturate(180%);
            border-radius: 40px; padding: 40px 50px; width: 400px; 
            max-height: 85vh; /* Đảm bảo không bị Taskbar che */
            text-align: center; border: 1px solid rgba(255, 77, 148, 0.3);
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            transform-style: preserve-3d; transition: transform 0.2s ease-out;
            will-change: transform; display: flex; flex-direction: column; justify-content: center;
        }

        /* AVATAR THEO Ý BẠN */
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--pink); margin: 0 auto 25px; object-fit: cover; box-shadow: 0 0 40px var(--pink); transform: translateZ(60px); }
        
        h1 { color: #fff; font-size: 28px; margin-bottom: 8px; text-shadow: 0 0 15px #fff, 0 0 30px var(--pink); transform: translateZ(40px); }
        .subtitle { color: #fff; font-size: 15px; margin-bottom: 25px; font-family: 'Fira Code'; font-weight: 600; text-shadow: 0 0 8px #fff, 0 0 20px var(--pink); transform: translateZ(30px); }
        .typewriter { height: 20px; color: #aaa; font-size: 13px; margin-bottom: 30px; font-family: 'Fira Code'; transform: translateZ(20px); }

        .links { display: flex; flex-direction: column; gap: 15px; transform: translateZ(25px); }
        .link-item {
            background: rgba(255,255,255,0.04); padding: 15px 25px; border-radius: 20px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.08); transition: all 0.4s ease; cursor: pointer;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.25); border-color: var(--pink); transform: translateX(10px); box-shadow: 0 0 20px rgba(255, 77, 148, 0.2); }

        .stats { position: fixed; bottom: 15px; right: 20px; color: var(--pink); font-family: 'Fira Code'; font-size: 10px; z-index: 100; opacity: 0.6; }

        /* RESPONSIVE CHO ĐIỆN THOẠI */
        @media (max-width: 480px) {
            .card { width: 90%; padding: 30px 25px; border-radius: 30px; }
            .avatar { width: 100px; height: 100px; }
            h1 { font-size: 22px; }
            .subtitle { font-size: 13px; }
            .link-item { padding: 12px 20px; font-size: 14px; }
            .stats { bottom: 10px; right: 10px; font-size: 8px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo">HUNG MADDING</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <button class="enter-btn" onclick="startExperience()">ENTER TERMINAL</button>
    </div>

    <div id="cursor"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div class="main-wrapper" id="mainContent">
        <div class="card" id="profileCard">
            <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" class="avatar" alt="Avatar">
            <h1>Hùng Madding</h1>
            <div class="subtitle">Nguyễn Mạnh Hùng</div>
            <div class="typewriter" id="typewriter"></div>
            
            <div class="links">
                <a href="#" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="#" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <div class="link-item" onclick="alert('Cảm ơn bạn đã quan tâm! ❤️')">
                    <span>Đôi nét về bản thân</span><i class="fas fa-heart"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="stats">BIO-OS v3.8 | SECURE SHELL ACTIVE</div>

    <script>
        const canvasB = document.getElementById('canvas-bg'), canvasM = document.getElementById('canvas-mid'), canvasF = document.getElementById('canvas-foreground');
        const ctxB = canvasB.getContext('2d'), ctxM = canvasM.getContext('2d'), ctxF = canvasF.getContext('2d');
        let stars = [], midParticles = [], frontSnow = [];

        class Snowflake {
            constructor(canvas, depth) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.depth = depth;
                this.reset();
            }
            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height - 50;
                this.size = [Math.random()*1+0.5, Math.random()*2+1, Math.random()*4+2][this.depth];
                this.speed = [Math.random()*0.2+0.1, Math.random()*0.6+0.3, Math.random()*1.2+0.7][this.depth];
                this.opacity = [Math.random()*0.3+0.1, Math.random()*0.5+0.2, Math.random()*0.7+0.3][this.depth];
                this.twinklePhase = Math.random() * Math.PI * 2;
            }
            update() {
                this.y += this.speed; this.x += Math.sin(this.y * 0.01) * 0.2;
                if (this.y > this.canvas.height) this.y = -10;
                this.twinklePhase += 0.02;
            }
            draw() {
                const currentOpacity = this.opacity + Math.sin(this.twinklePhase) * 0.05;
                this.ctx.save();
                this.ctx.globalAlpha = Math.max(0.05, currentOpacity);
                this.ctx.shadowBlur = this.depth === 2 ? 6 : 2;
                this.ctx.shadowColor = "#FFF";
                this.ctx.fillStyle = "#FFF";
                this.ctx.beginPath(); this.ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); this.ctx.fill();
                this.ctx.restore();
            }
        }

        function init() {
            canvasB.width = canvasM.width = canvasF.width = window.innerWidth;
            canvasB.height = canvasM.height = canvasF.height = window.innerHeight;
            stars = Array.from({length: 100}, () => new Snowflake(canvasB, 0));
            midParticles = Array.from({length: 60}, () => new Snowflake(canvasM, 1));
            frontSnow = Array.from({length: 20}, () => new Snowflake(canvasF, 2));
        }

        function draw() {
            ctxB.clearRect(0,0,canvasB.width, canvasB.height);
            ctxM.clearRect(0,0,canvasM.width, canvasM.height);
            ctxF.clearRect(0,0,canvasF.width, canvasF.height);
            [stars, midParticles, frontSnow].forEach(g => g.forEach(p => { p.update(); p.draw(); }));
            requestAnimationFrame(draw);
        }

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                if(!('ontouchstart' in window)) document.getElementById('cursor').style.display = 'block';
                typeWriter();
            }, 800);
        }

        function typeWriter() {
            const text = "> Booting Bio-OS Terminal v3.8... Success!";
            let i = 0; const target = document.getElementById('typewriter');
            function type() { if (i < text.length) { target.innerHTML += text.charAt(i++); setTimeout(type, 50); } }
            type();
        }

        window.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            document.getElementById('profileCard').style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
