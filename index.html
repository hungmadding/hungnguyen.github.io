<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hùng Madding | GOD MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">

<style>
:root{
    --pink:#ff4d94;
    --bg:#040404;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    cursor:none;
}

body{
    height:100vh;
    font-family:'Quicksand',sans-serif;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,77,148,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,77,148,0.1), transparent 40%),
        #040404;
    overflow:hidden;
}

/* NOISE OVERLAY */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url('https://grainy-gradients.vercel.app/noise.svg');
    opacity:0.05;
    pointer-events:none;
}

/* CURSOR */
#cursor{
    position:fixed;
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--pink);
    pointer-events:none;
    z-index:9999;
    transition:0.15s;
    box-shadow:0 0 20px var(--pink);
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:999;
    transition:1s;
}

.enter{
    padding:15px 40px;
    border:1px solid var(--pink);
    letter-spacing:4px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,77,148,0.4)}
    70%{box-shadow:0 0 0 25px rgba(255,77,148,0)}
}

/* MAIN */
.wrapper{
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1200px;
    opacity:0;
    transform:scale(.9);
    transition:1.2s;
}

/* CARD */
.card{
    width:360px;
    padding:50px;
    border-radius:30px;
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,77,148,0.2);
    text-align:center;
    transform-style:preserve-3d;
    transition:.3s;
}

/* LIGHT FOLLOW */
.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at var(--x) var(--y),
        rgba(255,77,148,0.25),
        transparent 40%);
    border-radius:inherit;
    pointer-events:none;
}

/* AVATAR */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid var(--pink);
    margin-bottom:20px;
    box-shadow:0 0 25px var(--pink);
}

/* NAME */
h1{
    color:#fff;
    margin-bottom:10px;
}

/* TYPE */
.type{
    color:var(--pink);
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:30px;
}

/* LINKS */
.link{
    display:block;
    padding:14px;
    border-radius:12px;
    margin-bottom:12px;
    text-decoration:none;
    color:#ccc;
    background:rgba(255,255,255,0.04);
    transition:.25s;
}

.link:hover{
    color:#fff;
    background:rgba(255,77,148,0.25);
    transform:translateX(8px) scale(1.03);
}

/* SNOW */
canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}
</style>
</head>

<body onclick="ripple(event)">

<div id="overlay" onclick="start()">
    <div class="enter">ENTER</div>
</div>

<div id="cursor"></div>
<canvas id="snow"></canvas>

<div class="wrapper" id="main">
    <div class="card" id="card">
        <img src="https://i.imgur.com/uIKY94v.png" class="avatar">
        <h1>Hùng Madding</h1>
        <div class="type" id="type"></div>

        <a href="#" class="link">Facebook</a>
        <a href="#" class="link">TikTok</a>
        <a href="#" class="link">GitHub</a>
    </div>
</div>

<script>
const cursor=document.getElementById("cursor");
const card=document.getElementById("card");

/* CURSOR SMOOTH */
document.addEventListener("mousemove",e=>{
    cursor.style.left=e.clientX+"px";
    cursor.style.top=e.clientY+"px";

    let x=(window.innerWidth/2-e.clientX)/20;
    let y=(window.innerHeight/2-e.clientY)/20;

    card.style.transform=`rotateX(${y}deg) rotateY(${-x}deg)`;

    card.style.setProperty("--x",e.clientX+"px");
    card.style.setProperty("--y",e.clientY+"px");
});

/* TYPEWRITER SMOOTH */
let txt="FULLSTACK DEV | CINEMATIC UI";
let i=0;
function type(){
    if(i<txt.length){
        document.getElementById("type").innerHTML+=txt[i];
        i++;
        setTimeout(type,50);
    }
}

/* START */
function start(){
    overlay.style.opacity=0;
    setTimeout(()=>{
        overlay.style.display="none";
        main.style.opacity=1;
        main.style.transform="scale(1)";
        type();
    },800);
}

/* RIPPLE */
function ripple(e){
    let r=document.createElement("div");
    r.style.position="fixed";
    r.style.border="2px solid pink";
    r.style.borderRadius="50%";
    r.style.left=e.clientX+"px";
    r.style.top=e.clientY+"px";
    r.style.transform="translate(-50%,-50%)";
    r.style.animation="r 0.6s forwards";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),600);
}

/* SNOW ULTRA SMOOTH */
let c=document.getElementById("snow");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let arr=[];
for(let i=0;i<100;i++){
    arr.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function snow(){
    ctx.clearRect(0,0,c.width,c.height);
    arr.forEach(p=>{
        p.y+=0.3;
        if(p.y>c.height)p.y=0;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,77,148,0.6)";
        ctx.fill();
    });
    requestAnimationFrame(snow);
}
snow();
</script>

</body>
</html>
