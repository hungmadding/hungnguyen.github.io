<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hùng Nguyễn</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    z-index: 999;
    cursor: pointer;
}

/* nền blur */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #111, #000);
    z-index: -1;
}

/* avatar */
.avatar {
    width: 110px;
    border-radius: 50%;
    margin-top: 100px;
    box-shadow: 0 0 25px rgba(0,255,200,0.3);
}

/* tên */
h1 {
    margin-top: 15px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* bio */
p {
    color: #aaa;
}

/* button */
.links a {
    display: block;
    margin: 12px auto;
    padding: 14px;
    width: 220px;
    border-radius: 14px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.links a:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 20px rgba(0,255,200,0.3);
}

/* particles */
.particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.5;
    animation: move 10s linear infinite;
}

@keyframes move {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div id="intro">click to enter</div>
<div class="bg"></div>

<img class="avatar" src="https://i.imgur.com/youravatar.jpg">

<h1>Hùng Nguyễn</h1>
<p>Welcome to my bio</p>

<div class="links">
    <a href="https://www.facebook.com/hung.madding" target="_blank">Facebook</a>
    <a href="#">TikTok</a>
    <a href="#">Discord</a>
</div>

<script>
document.getElementById("intro").onclick = function() {
    this.style.display = "none";
};

/* particles */
for(let i=0;i<30;i++){
    let p = document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
