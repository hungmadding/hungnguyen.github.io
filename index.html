<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS v3.22</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; --pink-glow: #ff0077;
            --bg: #0a0a0a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg); overflow: hidden; touch-action: none; }
        
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-foreground { z-index: 10001; }

        /* MÀN HÌNH CHỜ & THANH LOAD */
        #overlay {
            position: fixed; inset: 0; background: #0a0a0a;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: opacity 1s ease;
        }
        .logo-enter { 
            font-size: 3rem; font-weight: 700; margin-bottom: 2rem; 
            font-family: 'Fira Code'; text-shadow: 0 0 25px var(--pink);
            letter-spacing: 5px;
        }

        .loader-container { width: 300px; text-align: center; margin-top: 20px; }
        .progress-bar {
            width: 100%; height: 12px; background: rgba(255, 77, 148, 0.1);
            border: 1px solid var(--pink); border-radius: 6px; overflow: hidden;
            position: relative; box-shadow: 0 0 15px rgba(255, 77, 148, 0.3);
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--pink);
            box-shadow: 0 0 20px var(--pink); transition: width 0.1s linear;
        }
        .load-text { font-family: 'Fira Code'; font-size: 12px; margin-top: 10px; letter-spacing: 1px; }

        .enter-btn { 
            display: none; border: 2px solid var(--pink); padding: 15px 45px; 
            cursor: pointer; text-transform: uppercase; font-weight: 600; 
            background: transparent; color: var(--pink); transition: 0.3s; 
            letter-spacing: 5px; animation: fadeIn 0.8s forwards;
        }
        .enter-btn:hover { background: var(--pink); color: white; box-shadow: 0 0 40px var(--pink); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* GIAO DIỆN CHÍNH */
        .main-wrapper { 
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; perspective: 1200px; transform: scale(0.9) translateY(30px); 
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1); z-index: 10;
        }
        .main-wrapper.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: all; }

        .card {
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(30px);
            border-radius: 40px; padding: 40px; width: 420px; min-height: 550px;
            text-align: center; border: 1px solid rgba(255, 77, 148, 0.3);
            box-shadow: 0 30px 70px rgba(0,0,0,0.9); transform-style: preserve-3d;
            transition: transform 0.2s ease-out; display: flex; flex-direction: column; align-items: center;
        }

        .avatar-container {
            width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--pink); 
            margin-bottom: 20px; box-shadow: 0 0 35px var(--pink); overflow: hidden;
            transform: translateZ(80px);
        }
        .avatar { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: #fff; font-size: 28px; text-shadow: 0 0 20px var(--pink); transform: translateZ(60px); }
        .subtitle { color: #fff; font-size: 15px; margin: 5px 0 20px; transform: translateZ(50px); }
        .typewriter { height: 20px; color: #bbb; font-size: 13px; margin-bottom: 25px; font-family: 'Fira Code'; }

        .links { width: 100%; display: flex; flex-direction: column; gap: 12px; transform: translateZ(50px); }
        .link-item {
            background: rgba(255,255,255,0.05); padding: 14px 22px; border-radius: 18px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s ease;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.25); transform: translateX(10px) translateZ(20px); }

        /* NÚT NHẠC */
        #music-btn {
            position: fixed; top: 25px; right: 25px; z-index: 10005;
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 0 20px var(--pink-glow);
        }
        #music-btn.playing i { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .footer-info { position: fixed; bottom: 15px; right: 20px; font-size: 10px; color: rgba(255, 77, 148, 0.6); font-family: 'Fira Code'; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-enter">HUNG MADDING</div>
        <div class="loader-container" id="loader">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <div class="load-text" id="status">INITIALIZING SYSTEM... 0%</div>
        </div>
        <button class="enter-btn" id="enterBtn" onclick="startExperience()">ENTER</button>
    </div>

    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-music"></i></div>
    
  <audio id="bg-audio" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div class="main-wrapper" id="mainContent">
        <div class="card" id="profileCard">
            <div class="avatar-container">
                <img src="https://ui-avatars.com/api/?name=H&background=0a0a1a&color=ff4d94" class="avatar">
            </div>
            <h1>Hùng Madding</h1>
            <div class="subtitle">Nguyễn Mạnh Hùng</div>
            <div class="typewriter" id="typewriter"></div>
            <div class="links">
                <a href="#" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="#" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <div class="link-item" onclick="alert('Chào bạn nhé! ❤️')"><span>Đôi nét về bản thân</span><i class="fas fa-heart"></i></div>
            </div>
        </div>
    </div>

    <div class="footer-info">BIO-OS v3.22 | SECURE SHELL ACTIVE</div>

    <script>
        const audio = document.getElementById('bg-audio');
        const btn = document.getElementById('music-btn');
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const enterBtn = document.getElementById('enterBtn');

        let width = 0;
        const loading = setInterval(() => {
            if (width >= 100) {
                clearInterval(loading);
                status.innerText = "SYSTEM READY TO BOOT";
                setTimeout(() => {
                    loader.style.display = 'none';
                    enterBtn.style.display = 'block';
                }, 500);
            } else {
                width++;
                fill.style.width = width + '%';
                status.innerText = `LOADING MUSIC & ASSETS... ${width}%`;
            }
        }, 35);

        function toggleMusic() {
            if (audio.paused) { audio.play(); btn.classList.add('playing'); }
            else { audio.pause(); btn.classList.remove('playing'); }
        }

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play().then(() => {
                btn.classList.add('playing');
            }).catch(e => console.log("Cần click để phát nhạc"));
            
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                btn.style.display = 'flex';
                typeWriter();
            }, 800);
        }

        function typeWriter() {
            const text = "> Booting Bio-OS Terminal v3.22... Success!";
            let i = 0; const target = document.getElementById('typewriter');
            function type() { if (i < text.length) { target.innerHTML += text.charAt(i++); setTimeout(type, 50); } }
            type();
        }

        const canvases = [document.getElementById('canvas-bg'), document.getElementById('canvas-mid'), document.getElementById('canvas-foreground')];
        const ctxs = canvases.map(c => c.getContext('2d'));
        let particles = [[], [], []];

        class Particle {
            constructor(idx) { this.idx = idx; this.reset(); }
            reset() {
                const c = canvases[this.idx];
                this.x = Math.random() * c.width;
                this.y = Math.random() * c.height;
                this.size = [1, 2.5, 5][this.idx];
                this.speed = [0.2, 0.6, 1.5][this.idx];
            }
            update() { this.y += this.speed; if (this.y > canvases[this.idx].height) this.y = -10; }
            draw() {
                const ctx = ctxs[this.idx];
                ctx.globalAlpha = [0.2, 0.4, 0.7][this.idx];
                ctx.fillStyle = "#FFF";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function init() {
            canvases.forEach(c => { c.width = window.innerWidth; c.height = window.innerHeight; });
            particles = [
                Array.from({length: 70}, () => new Particle(0)),
                Array.from({length: 40}, () => new Particle(1)),
                Array.from({length: 20}, () => new Particle(2))
            ];
        }

        function animate() {
            ctxs.forEach((ctx, i) => {
                ctx.clearRect(0, 0, canvases[i].width, canvases[i].height);
                particles[i].forEach(p => { p.update(); p.draw(); });
            });
            requestAnimationFrame(animate);
        }

       window.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            const card = document.getElementById('profileCard');
            if(card) card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        window.addEventListener('resize', init);
        init(); 
        animate();
    </script>
</body>
</html>
