<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding - Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --glow: #ff0077; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            font-family: 'Quicksand', sans-serif; 
            /* SỬ DỤNG FILE background.jpg TRÊN GITHUB CỦA BẠN */
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; 
        }
        
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

        #overlay {
            position: fixed; inset: 0; background: #0a0a0a;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: opacity 1s ease;
        }

        .enter-btn { 
            border: 2px solid var(--pink); padding: 12px 40px; cursor: pointer;
            background: transparent; color: var(--pink); font-weight: 700;
            letter-spacing: 4px; transition: 0.4s; margin-top: 20px;
            font-family: 'Fira Code';
        }
        .enter-btn:hover { background: var(--pink); color: #fff; box-shadow: 0 0 40px var(--pink); }

        .main-wrapper { 
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; perspective: 1200px; transition: all 1s ease; z-index: 10;
        }
        .main-wrapper.active { opacity: 1; }

        .card {
            background: rgba(15, 15, 25, 0.45); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; padding: 45px; width: 420px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }

        .avatar-container {
            width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--pink); 
            margin: 0 auto 20px; box-shadow: 0 0 30px var(--pink); overflow: hidden;
        }

        h1 { color: #fff; font-size: 28px; text-shadow: 0 0 15px var(--pink), 0 0 30px var(--pink); margin-bottom: 5px; }
        .subtitle { color: rgba(255,255,255,0.8); font-size: 15px; margin-bottom: 20px; font-weight: 500; }
        .typewriter { font-family: 'Fira Code'; font-size: 13px; color: #fff; text-shadow: 0 0 10px var(--pink); margin-bottom: 30px; min-height: 20px; }

        .links { display: flex; flex-direction: column; gap: 14px; }
        .link-item {
            background: rgba(255, 255, 255, 0.08); padding: 15px 22px; border-radius: 18px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px); font-weight: 700;
        }
        .link-item:hover { 
            background: rgba(255, 77, 148, 0.4); transform: translateX(10px) scale(1.02);
            border-color: var(--pink); box-shadow: 0 0 20px var(--pink);
        }

        #music-btn {
            position: fixed; top: 25px; right: 25px; z-index: 1000;
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            box-shadow: 0 0 20px var(--pink);
        }
        .footer { position: fixed; bottom: 15px; right: 20px; font-size: 10px; color: #fff; opacity: 0.7; font-family: 'Fira Code'; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 8px; font-family: 'Fira Code';">HUNG MADDING</h1>
        <button class="enter-btn" onclick="start()">ENTER SYSTEM</button>
    </div>

    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-music"></i></div>
    
    <audio id="bg-audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <canvas id="snow"></canvas>

    <div class="main-wrapper" id="content">
        <div class="card" id="card">
            <div class="avatar-container">
                <img src="https://ui-avatars.com/api/?name=H&background=0a0a1a&color=ff4d94" style="width:100%">
            </div>
            <h1>Hùng Madding</h1>
            <div class="subtitle">Nguyễn Mạnh Hùng</div>
            <div class="typewriter" id="tw"></div>
            <div class="links">
                <a href="https://facebook.com" class="link-item">Facebook <i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="link-item">GitHub <i class="fab fa-github"></i></a>
                <a href="https://tiktok.com" class="link-item">TikTok <i class="fab fa-tiktok"></i></a>
                <div class="link-item" onclick="alert('Chào bạn nhé! ❤️')">About me <i class="fas fa-heart"></i></div>
            </div>
        </div>
    </div>

    <div class="footer">NHÌN CÁI DB</div>

    <script>
        const audio = document.getElementById('bg-audio');
        const mBtn = document.getElementById('music-btn');

        function start() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play().catch(() => console.log("Music blocked by browser"));
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('content').classList.add('active');
                mBtn.style.display = 'flex';
                type();
            }, 800);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); mBtn.style.boxShadow = "0 0 20px var(--pink)"; } 
            else { audio.pause(); mBtn.style.boxShadow = "none"; }
        }

        function type() {
            const txt = "> Booting Bio-OS Terminal v3.22... Success!";
            let i = 0;
            function run() {
                if (i < txt.length) {
                    document.getElementById('tw').innerHTML += txt.charAt(i++);
                    setTimeout(run, 40);
                }
            }
            run();
        }

        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let flakes = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            flakes = Array.from({length: 120}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2 + 1,
                d: Math.random() * 1,
                s: Math.random() * 1.5 + 0.5
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                f.y += f.s;
                f.x += Math.sin(f.d += 0.01);
                if (f.y > canvas.height) f.y = -10;
                if (f.x > canvas.width) f.x = 0;
            });
            ctx.fill();
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.clientX) / 25;
            let y = (window.innerHeight / 2 - e.clientY) / 25;
            document.getElementById('card').style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
