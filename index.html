<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Bio Link</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff79c6;
            --pink-glow: rgba(255, 121, 198, 0.5);
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            /* NỀN HỒNG ĐEN MỜ ẢO */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 121, 198, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 121, 198, 0.1) 0%, transparent 40%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        .card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 121, 198, 0.2);
            border-radius: 30px;
            padding: 50px 30px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 121, 198, 0.1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* VIỀN HỒNG PHÁT SÁNG CỰC MẠNH */
        .avatar-wrapper {
            width: 110px; height: 110px;
            margin: 0 auto 20px;
            position: relative;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid var(--pink);
            box-shadow: 0 0 25px var(--pink);
            object-fit: cover;
            background: #222;
        }

        h1 { 
            font-size: 28px; margin: 0; 
            text-shadow: 0 0 10px var(--pink-glow);
            letter-spacing: 1px;
        }

        .bio { 
            color: var(--pink); 
            font-size: 14px; 
            margin: 10px 0 30px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 121, 198, 0.1);
            padding: 15px; border-radius: 15px;
            color: #eee; text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn:hover {
            background: var(--pink);
            color: #000;
            box-shadow: 0 0 30px var(--pink);
            transform: scale(1.05);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-wrapper">
            <img src="https://i.imgur.com/uIKY94v.png" class="avatar" alt="Avatar">
        </div>
        
        <h1>Hùng Madding</h1>
        <div class="bio">hungmadding pink vibe</div>

        <div class="links">
            <a href="https://facebook.com/hung.madding" class="btn"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://tiktok.com/@hung_md3" class="btn"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="https://github.com/hungmadding" class="btn"><i class="fab fa-github"></i> GitHub</a>
            <a href="#" class="btn"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </div>

</body>
</html>
