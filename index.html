<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Profile</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077;
            --pink-dark: #cc005f;
            --glass: rgba(15, 10, 15, 0.15);
            --glass-border: rgba(255, 77, 148, 0.25);
            --bg-dark: #050505;
            --text-main: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { height: 100dvh; width: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg-dark); overflow: hidden; color: var(--text-main); }

        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0; filter: brightness(0.8) contrast(1.1);
        }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-foreground { z-index: 10001; }

        #overlay {
            position: fixed; inset: 0;
            z-index: 99999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
            background: #000; overflow: hidden;
        }

        #overlay.fade-out { opacity: 0; transform: scale(1.3); pointer-events: none; }

        .loading-bg-full {
            position: absolute; inset: 0;
            background: url('anhcho.jpg') no-repeat center center;
            background-size: cover; z-index: -1; filter: brightness(0.5); 
        }

        .loading-content { 
            position: relative; z-index: 2; display: flex; 
            flex-direction: column; align-items: center; width: 90%; 
            background: rgba(0,0,0,0.2); padding: 40px 0; border-radius: 20px;
        }

        .loading-name { 
            font-family: 'Fira Code', monospace; 
            font-size: clamp(24px, 8vw, 32px); 
            font-weight: 700; letter-spacing: 10px; 
            text-shadow: 0 0 30px var(--pink-glow); margin-bottom: 25px; color: #fff; 
        }

        .loader-container { width: 85%; max-width: 350px; transition: opacity 0.5s; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 20px var(--pink); transition: width 0.2s; }
        .status-box { display: flex; justify-content: space-between; font-family: 'Fira Code', monospace; font-size: 10px; color: var(--pink); font-weight: bold; }

        .enter-btn { 
            position: relative; overflow: hidden;
            display: none; background: rgba(0,0,0,0.6); border: 2.5px solid var(--pink); 
            color: var(--pink); padding: 15px 40px; font-family: 'Fira Code', monospace; 
            font-weight: 700; font-size: 14px; letter-spacing: 3px; border-radius: 15px; 
            cursor: pointer; text-transform: uppercase; transition: all 0.4s; 
            margin-top: -10px; backdrop-filter: blur(5px);
        }

        .main-wrapper { 
            position: relative; height: 100dvh; width: 100%; display: flex; 
            justify-content: center; align-items: center; z-index: 10; 
            opacity: 0; visibility: hidden; perspective: 2000px; padding: 20px; 
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            transform: scale(0.8) translateY(30px); filter: blur(10px);
            will-change: transform, opacity; /* Tối ưu GPU */
        }

        .main-wrapper.active { 
            opacity: 1; visibility: visible; 
            transform: scale(1) translateY(0); filter: blur(0);
        }

        .card > * { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .main-wrapper.active .card > * { opacity: 1; transform: translateY(0); }
        .main-wrapper.active .avatar-box { transition-delay: 0.3s; }
        .main-wrapper.active .waviy { transition-delay: 0.5s; }
        .main-wrapper.active .typewriter { transition-delay: 0.7s; }
        .main-wrapper.active .links-container { transition-delay: 0.9s; }

        .card { 
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-radius: 40px; width: 100%; max-width: 360px; padding: 40px 25px; 
            text-align: center; border: 1px solid var(--glass-border); position: relative; 
            overflow: hidden; will-change: transform;
        }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, var(--pink), transparent, transparent); animation: rotateLED 4s linear infinite; z-index: -1; }
        .card::after { content: ''; position: absolute; inset: 2px; background: #0a050a; border-radius: 38px; z-index: -1; }
        
        .avatar-box { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--pink); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--pink-glow); }
        .avatar-box span { color: var(--pink); font-size: 45px; font-weight: 900; }
        
        .waviy { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; font-size: clamp(18px, 5vw, 22px); font-weight: 700; line-height: 1.4; }
        .waviy span { position: relative; display: inline-block; animation: waviy 3s infinite; animation-delay: calc(.1s * var(--i)); color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px var(--pink-glow); }
        
        .typewriter { font-family: 'Fira Code', monospace; font-size: 12px; color: var(--pink); min-height: 35px; margin-bottom: 20px; line-height: 1.4; }
        
       /* --- HIỆU ỨNG NEON SIÊU ĐẬM CHO CHỮ VÀ ICON --- */
        .link-item { 
            position: relative; overflow: hidden;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 77, 148, 0.2); 
            border-radius: 12px; padding: 12px 18px; color: #fff; text-decoration: none; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 12px; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); font-size: 14px; 
            z-index: 1;
        }

        .link-item span { transition: all 0.3s ease; font-weight: 600; color: #fff; }
        .link-item i { font-size: 18px; transition: all 0.3s ease; }

        /* 1. Facebook - Xanh dương Neon */
        .link-item[href*="facebook"] span { 
            text-shadow: 0 0 5px #fff, 0 0 10px #1877f2, 0 0 20px #1877f2, 0 0 30px #1877f2; 
        }
        .link-item[href*="facebook"] i { 
            color: #1877f2; 
            filter: drop-shadow(0 0 8px #1877f2) drop-shadow(0 0 15px #1877f2);
            animation: glowPulseBlue 2s infinite; 
        }

        /* 2. TikTok & Github - Trắng Neon rực rỡ */
        .link-item[href*="tiktok"] span, .link-item[href*="github"] span { 
            text-shadow: 0 0 5px #fff, 0 0 15px #fff, 0 0 25px #fff; 
        }
        .link-item[href*="tiktok"] i, .link-item[href*="github"] i { 
            color: #fff; 
            filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 15px #fff);
            animation: glowPulseWhite 2s infinite; 
        }

        /* 3. Work/Mail - Hồng Neon */
        .link-item[href*="mailto"] span { 
            text-shadow: 0 0 5px #fff, 0 0 10px var(--pink), 0 0 20px var(--pink), 0 0 30px var(--pink); 
        }
        .link-item[href*="mailto"] i { 
            color: var(--pink); 
            filter: drop-shadow(0 0 8px var(--pink)) drop-shadow(0 0 15px var(--pink));
            animation: glowPulsePink 2s infinite; 
        }

        /* Keyframes phát sáng nhịp thở (giúp hiệu ứng động đậy) */
        @keyframes glowPulseBlue { 
            0%, 100% { filter: drop-shadow(0 0 5px #1877f2) brightness(1); } 
            50% { filter: drop-shadow(0 0 15px #1877f2) brightness(1.5); } 
        }
        @keyframes glowPulseWhite { 
            0%, 100% { filter: drop-shadow(0 0 5px #fff) brightness(1); } 
            50% { filter: drop-shadow(0 0 15px #fff) brightness(1.5); } 
        }
        @keyframes glowPulsePink { 
            0%, 100% { filter: drop-shadow(0 0 5px var(--pink)) brightness(1); } 
            50% { filter: drop-shadow(0 0 15px var(--pink)) brightness(1.5); } 
        }

        /* Hiệu ứng khi Hover (Rê chuột/Chạm vào) */
        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: translateY(-2px);
        }
        .link-item:hover span {
            text-shadow: 0 0 15px currentColor;
            transform: translateX(5px);
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .link-item:hover i {
            transform: scale(1.2);
            filter: drop-shadow(0 0 15px currentColor) brightness(1.5) !important;
        }

        .link-item i { font-size: 18px; transition: all 0.4s ease; }
        .link-item span { transition: all 0.4s ease; font-weight: 500; }
        .link-item:hover span { transform: translateX(5px); text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .system-time { position: fixed; top: 15px; left: 15px; z-index: 10005; font-family: 'Fira Code', monospace; color: var(--pink); text-shadow: 0 0 15px var(--pink-glow); display: none; }
        #music-btn { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--pink); background: rgba(0,0,0,0.5); color: var(--pink); display: none; justify-content: center; align-items: center; cursor: pointer; z-index: 10005; box-shadow: 0 0 15px var(--pink-glow); }

        #greeting-toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 77, 148, 0.3); border: 1px solid var(--pink);
            padding: 10px 20px; border-radius: 20px; backdrop-filter: blur(10px);
            color: #fff; font-weight: 600; font-size: 12px; z-index: 10006;
            opacity: 0; visibility: hidden; transition: all 0.8s;
            text-align: center; width: 80%; max-width: 300px;
        }
        #greeting-toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 8px; opacity: 0.4; font-family: 'Fira Code'; }
        
        @keyframes waviy { 0%, 40%, 100% { transform: translateY(0); } 20% { transform: translateY(-4px); } }
        @keyframes rotateLED { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 15px var(--pink-glow); } 50% { box-shadow: 0 0 30px var(--pink-glow); } 100% { box-shadow: 0 0 15px var(--pink-glow); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 0.5; } 100% { width: 500px; height: 500px; opacity: 0; } }

        /* Tối ưu Mobile sâu hơn */
        @media (max-width: 768px) {
            .card { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
            .card::before { animation-duration: 6s; } /* Giảm tốc độ quay để mượt hơn */
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div class="system-time" id="sysTime">
        <div id="real-clock">00:00:00</div>
        <div id="real-date">...</div>
    </div>

    <div id="greeting-toast">Chào mừng bạn!</div>
    
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div id="overlay">
        <div class="loading-bg-full"></div> 
        <div class="loading-content">
            <div class="loading-name">HUNG MADDING</div>
            <div id="loaderUI" class="loader-container">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div class="status-box"><span id="loadStatus">Initializing...</span><span id="loadPercent">0%</span></div>
            </div>
            <button id="enterBtn" class="enter-btn" onclick="initSystem()">Bấm để vô nhoa :3</button>
        </div>
    </div>

    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-compact-disc"></i></div>
    <audio id="mainAudio" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

    <main id="mainUI" class="main-wrapper">
        <div id="tiltCard" class="card">
            <div class="avatar-box"><span>H</span></div>
            <h1 class="waviy">
                <span style="--i:1">N</span><span style="--i:2">g</span><span style="--i:3">u</span><span style="--i:4">y</span><span style="--i:5">ễ</span><span style="--i:6">n</span><span>&nbsp;</span><span style="--i:7">M</span><span style="--i:8">ạ</span><span style="--i:9">n</span><span style="--i:10">h</span><span>&nbsp;</span><span style="--i:11">H</span><span style="--i:12">ù</span><span style="--i:13">n</span><span style="--i:14">g</span>
            </h1>
            <div id="typewriter" class="typewriter"></div>
            <div class="links-container">
                <a href="https://www.facebook.com/hung.madding" target="_blank" class="link-item"><span>Facebook</span><i class="fab fa-facebook"></i></a>
                <a href="https://www.tiktok.com/@hung_md3" target="_blank" class="link-item"><span>TikTok Channel</span><i class="fab fa-tiktok"></i></a>
                <a href="https://github.com/hungmadding" target="_blank" class="link-item"><span>Github Projects</span><i class="fab fa-github"></i></a>
                <a href="mailto:contact@hungmadding.vn" class="link-item"><span>Work Inquiry</span><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </main>

    <div class="footer">welcome :3</div>

    <script>
        const audio = document.getElementById('mainAudio');
        const fill = document.getElementById('progressFill');
        const percentTxt = document.getElementById('loadPercent');
        const statusTxt = document.getElementById('loadStatus');
        const enterBtn = document.getElementById('enterBtn');
        const loaderUI = document.getElementById('loaderUI');
        
        let currentProgress = 0;
        const loaderTask = setInterval(() => {
            if (currentProgress >= 100) {
                currentProgress = 100;
                clearInterval(loaderTask);
                setTimeout(() => {
                    loaderUI.style.opacity = "0";
                    setTimeout(() => {
                        loaderUI.style.display = "none";
                        enterBtn.style.display = "block";
                        enterBtn.style.animation = "fadeIn 0.8s forwards, pulse 2s infinite";
                    }, 500);
                }, 500);
            } else {
                currentProgress += Math.random() * 3;
                if (currentProgress > 100) currentProgress = 100;
                fill.style.width = currentProgress + "%";
                percentTxt.innerText = Math.floor(currentProgress) + "%";
                if(currentProgress > 80) statusTxt.innerText = "System Ready!";
                else if(currentProgress > 40) statusTxt.innerText = "Processing...";
            }
        }, 40);

        function updateSystemTime() {
            const now = new Date();
            document.getElementById('real-clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('real-date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function showGreeting() {
            const hours = new Date().getHours();
            const toast = document.getElementById('greeting-toast');
            let msg = (hours >= 5 && hours < 11) ? "Chào buổi sáng! Chúc bạn ngày mới tốt lành nha bạn ☀️" :
                      (hours >= 11 && hours < 14) ? "Chào buổi trưa! Nhớ nghỉ ngơi nha cậu 🍱" :
                      (hours >= 14 && hours < 18) ? "Chào buổi chiều! Làm việc hiệu quả nhé cậu ☕" :
                      (hours >= 18 && hours < 22) ? "Chào buổi tối! Chúc bạn ấm áp ✨" : "Đã khuya rồi! Ngủ ngon nha bạn 🌙";
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 5000);
        }

        function initSystem() {
            const overlay = document.getElementById('overlay');
            const mainUI = document.getElementById('mainUI');
            overlay.classList.add('fade-out');
            audio.play().catch(e => console.log("Audio play blocked"));
            
            setTimeout(() => {
                mainUI.classList.add('active'); 
                document.getElementById('music-btn').style.display = "flex";
                document.getElementById('music-btn').style.animation = "rotateCD 4s linear infinite";
                document.getElementById('sysTime').style.display = "block";
                updateSystemTime();
                setInterval(updateSystemTime, 1000);
                showGreeting();
                setTimeout(startTypeWriter, 1200);
            }, 600);

            setTimeout(() => { overlay.style.display = "none"; }, 1500);
        }

        function startTypeWriter() {
            const text = "> cám ơn bạn gì đó trai xinh gái đẹp đã ghé thăm nha!";
            let i = 0;
            const target = document.getElementById('typewriter');
            target.innerHTML = "";
            function type() {
                if (i < text.length) { 
                    target.innerHTML += text.charAt(i); 
                    i++; setTimeout(type, 40); 
                }
            }
            type();
        }

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            if (audio.paused) { audio.play(); btn.style.animationPlayState = "running"; }
            else { audio.pause(); btn.style.animationPlayState = "paused"; }
        }

        class SnowEngine {
            constructor(canvasId, count, config) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.count = count; this.particles = []; this.config = config; this.init();
            }
            init() { 
                this.resize(); 
                window.addEventListener('resize', () => this.resize()); 
                for (let i = 0; i < this.count; i++) this.particles.push(this.createParticle()); 
                this.animate(); 
            }
            resize() { 
                this.canvas.width = window.innerWidth; 
                this.canvas.height = window.innerHeight; 
            }
            createParticle() { 
                return { 
                    x: Math.random() * this.canvas.width, 
                    y: Math.random() * this.canvas.height, 
                    r: Math.random() * this.config.size + 1, 
                    v: Math.random() * this.config.speed + 0.3, 
                    o: Math.random() * 0.5 + this.config.opacity 
                }; 
            }
            draw() { 
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); 
                this.ctx.fillStyle = "white";
                this.particles.forEach(p => { 
                    this.ctx.globalAlpha = p.o;
                    this.ctx.beginPath(); 
                    this.ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); 
                    this.ctx.fill(); 
                }); 
                this.update(); 
            }
            update() { 
                this.particles.forEach(p => { 
                    p.y += p.v; 
                    if (p.y > this.canvas.height) p.y = -10; 
                }); 
            }
            animate() { 
                this.draw(); 
                requestAnimationFrame(() => this.animate()); 
            }
        }
        
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
        // GIẢM SỐ LƯỢNG HẠT ĐỂ MOBILE MƯỢT HƠN
        new SnowEngine('canvas-bg', isMobile ? 15 : 60, { size: 1, speed: 0.3, opacity: 0.1 });
        new SnowEngine('canvas-mid', isMobile ? 10 : 40, { size: 2, speed: 0.7, opacity: 0.2 });
        new SnowEngine('canvas-foreground', isMobile ? 5 : 15, { size: 4, speed: 1.2, opacity: 0.4 });

        const card = document.getElementById('tiltCard');
        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                let x = (window.innerWidth / 2 - e.clientX) / 35;
                let y = (window.innerHeight / 2 - e.clientY) / 35;
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
        }

        document.querySelectorAll('.link-item, .enter-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                let ripple = document.createElement('span');
                ripple.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:2px; height:2px; background:white; opacity:0.5; border-radius:50%; transform:translate(-50%, -50%); animation:ripple 0.6s linear; pointer-events:none;`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
</html>
