<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Nguyễn | @Hungmadding</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 1. BACKGROUND ĐỘNG (Dùng GIF chất lượng cao) */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://i.pinimg.com/originals/91/92/79/9192790757d5904874b05b0a39a95786.gif');
            background-size: cover;
            background-position: center;
            filter: blur(3px); /* Làm mờ nhẹ nền để nổi bật card */
        }

        /* 2. CARD GLASSMORPHISM */
        .card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: floating 3s ease-in-out infinite; /* Hiệu ứng lơ lửng */
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 3. SẮP XẾP NỘI DUNG */
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { color: #fff; margin: 0; font-size: 24px; letter-spacing: 1px; }
        .username { color: #888; font-size: 14px; margin-bottom: 20px; display: block; }

        .links-list {
            display: flex; flex-direction: column; gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s all;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.03);
        }

        /* Hiệu ứng mờ ảo góc màn hình */
        .glow {
            position: absolute; width: 300px; height: 300px;
            background: #ff00ff; filter: blur(150px);
            opacity: 0.15; z-index: -1;
            bottom: -50px; right: -50px;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="glow"></div>

    <div class="card">
        <img src="https://i.imgur.com/uIKY94v.png" class="avatar" alt="Hùng Nguyễn">
        
        <h1>Hùng Nguyễn</h1>
        <span class="username">@kolomoo</span>

        <div class="links-list">
            <a href="https://www.facebook.com/hung.madding" class="btn" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
