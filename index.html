<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hungmadding</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { --pink:#ff4d94; }

*{margin:0;padding:0;box-sizing:border-box;cursor:none;}
body{
    background:black;
    font-family:'Quicksand',sans-serif;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* cursor */
#cursor{
    position:fixed;
    width:12px;height:12px;
    border-radius:50%;
    pointer-events:none;
    z-index:9999;
    transform:translate(-50%,-50%);
    animation:cursorGlow 5s linear infinite;
}
@keyframes cursorGlow{
    0%{box-shadow:0 0 15px #ff4d94}
    50%{box-shadow:0 0 15px cyan}
    100%{box-shadow:0 0 15px #ff4d94}
}

/* intro */
#overlay{
    position:fixed;inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    cursor:pointer;
}
#overlay i{
    font-size:70px;
    color:var(--pink);
    animation:pulse 1s infinite;
}
@keyframes pulse{
    50%{transform:scale(1.1)}
}

/* background */
canvas{position:fixed;inset:0;z-index:-1}

/* card */
.container{display:none;opacity:0;transition:1s;}
.card{
    width:350px;
    padding:40px;
    border-radius:30px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(20px);
    text-align:center;
    position:relative;
    transform-style:preserve-3d;
    will-change:transform;
}

/* border neon */
.card::before{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:35px;
    background:linear-gradient(45deg,#ff4d94,#ff00ff,#00ffff,#ff4d94);
    background-size:400%;
    animation:borderMove 10s linear infinite;
    z-index:-1;
}
.card::after{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:35px;
    background:inherit;
    filter:blur(25px);
    z-index:-1;
}
@keyframes borderMove{
    0%{background-position:0%}
    100%{background-position:400%}
}

/* avatar */
.avatar{
    width:110px;
    border-radius:50%;
    box-shadow:0 0 20px var(--pink);
    margin-bottom:15px;
}

/* text */
h1{text-shadow:0 0 15px var(--pink);}
.tag{color:var(--pink);margin-bottom:25px;}

/* links */
.link{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
    padding:14px;
    border-radius:15px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.05);
    transition:.3s;
}
.link:hover{
    transform:scale(1.07);
    background:white;
    color:black;
    box-shadow:0 0 20px white;
}

/* music btn */
.music{
    position:fixed;
    bottom:20px;
    right:20px;
    width:50px;height:50px;
    border-radius:50%;
    display:none;
    justify-content:center;
    align-items:center;
    background:black;
    border:1px solid var(--pink);
}

/* click effect */
@keyframes boom{
    to{transform:scale(6);opacity:0}
}
</style>
</head>

<body>

<div id="cursor"></div>

<div id="overlay" onclick="start()">
<i class="fas fa-play"></i>
<p>CLICK TO ENTER</p>
</div>

<canvas id="bg"></canvas>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="music" id="mBtn">🎵</div>

<div class="container" id="app">
<div class="card" id="card">

<img src="https://i.imgur.com/uIKY94v.png" class="avatar">

<h1>Hùng Madding</h1>
<div class="tag">Python Dev | Pink Vibe</div>

<a class="link" href="https://facebook.com/hung.madding" target="_blank">
Facebook <i class="fab fa-facebook"></i>
</a>

<a class="link" href="https://tiktok.com/@hung_md3" target="_blank">
TikTok <i class="fab fa-tiktok"></i>
</a>

<a class="link" href="https://github.com/hungmadding" target="_blank">
GitHub <i class="fab fa-github"></i>
</a>

</div>
</div>

<script>
const cursor=document.getElementById("cursor");
const card=document.getElementById("card");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

let x=(window.innerWidth/2-e.pageX)/25;
let y=(window.innerHeight/2-e.pageY)/25;
card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* start */
function start(){
document.getElementById("overlay").style.display="none";
document.getElementById("app").style.display="block";
setTimeout(()=>app.style.opacity=1,50);
music.play();
mBtn.style.display="flex";
}

/* music toggle */
let music=document.getElementById("music");
let mBtn=document.getElementById("mBtn");
mBtn.onclick=()=>music.paused?music.play():music.pause();

/* particles */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
let dots=[];
function init(){
c.width=innerWidth;c.height=innerHeight;
dots=[];
for(let i=0;i<80;i++){
dots.push({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*2+1,v:Math.random()*0.5+0.2});
}}
function draw(){
ctx.clearRect(0,0,c.width,c.height);
dots.forEach(d=>{
let g=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,d.s*4);
g.addColorStop(0,"#ff4d94");
g.addColorStop(1,"transparent");
ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(d.x,d.y,d.s,0,Math.PI*2);
ctx.fill();
d.y-=d.v;
if(d.y<0)d.y=c.height;
});
requestAnimationFrame(draw);
}
init();draw();

/* click effect */
document.addEventListener("click",e=>{
let c=document.createElement("div");
c.style.position="fixed";
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";
c.style.width="10px";
c.style.height="10px";
c.style.borderRadius="50%";
c.style.background="#ff4d94";
c.style.boxShadow="0 0 20px #ff4d94";
c.style.animation="boom 0.6s forwards";
document.body.appendChild(c);
setTimeout(()=>c.remove(),600);
});
</script>

</body>
</html>
