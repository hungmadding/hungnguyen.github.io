<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nguyễn Mạnh Hùng | Bio-OS v3.22 Ultimate</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. BIẾN HỆ THỐNG & RESET --- */
        :root { 
            --pink: #ff4d94; 
            --pink-glow: rgba(255, 77, 148, 0.8);
            --glass: rgba(15, 10, 15, 0.15);
            --bg-dark: #000000;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html { 
            height: 100%; 
            width: 100%;
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg-dark); 
            overflow: hidden; 
            touch-action: none; 
        }

        /* --- 2. NỀN & HIỆU ỨNG MÔI TRƯỜNG --- */
        #bg-image {
            position: fixed; 
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; 
            z-index: 0;
            transition: transform 2s ease;
        }

        canvas { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
        }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-foreground { z-index: 10001; }

        /* --- 3. MÀN HÌNH CHỜ (LOADING OVERLAY) --- */
        #overlay {
            position: fixed; 
            inset: 0; 
            z-index: 9999;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            background: #000;
            transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        
        .loading-content { 
            position: relative; 
            z-index: 2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 40px; 
        }
        
        /* ẢNH CHỜ MỜ ẢO ĐA LỚP (Ý ÔNG THÍCH) */
        .loading-img-box {
            width: 250px; 
            height: 350px; 
            border-radius: 30px; 
            border: 2px solid var(--pink); 
            box-shadow: 0 0 50px var(--pink-glow);
            overflow: hidden;
            position: relative;
            animation: waterFloat 4s ease-in-out infinite, pulseGlow 3s infinite;
        }

        .loading-img-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            /* Mask loang màu mờ dần ra cạnh */
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black 30%, rgba(0,0,0,0.6) 60%, transparent 95%);
            mask-image: radial-gradient(circle at 50% 50%, black 30%, rgba(0,0,0,0.6) 60%, transparent 95%);
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 77, 148, 0.4); }
            50% { box-shadow: 0 0 60px rgba(255, 77, 148, 0.8); }
        }

        .logo-enter { 
            font-size: 2.8rem; 
            font-weight: 700; 
            font-family: 'Fira Code'; 
            color: var(--pink); 
            text-shadow: 0 0 30px var(--pink);
            letter-spacing: 8px; 
            animation: waterFloat 3s ease-in-out infinite;
        }

        .loader-container { width: 320px; text-align: center; }
        .progress-bar {
            width: 100%; 
            height: 6px; 
            background: rgba(255, 77, 148, 0.1);
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 77, 148, 0.2);
            position: relative;
        }
        .progress-fill { 
            height: 100%; 
            width: 0%; 
            background: var(--pink); 
            box-shadow: 0 0 20px var(--pink); 
            transition: width 0.4s ease-out; 
        }
        .load-text { 
            font-family: 'Fira Code'; 
            font-size: 13px; 
            margin-top: 15px; 
            color: var(--pink); 
            letter-spacing: 2px; 
            font-weight: 500;
            text-transform: uppercase;
        }

        .enter-btn { 
            display: none; 
            border: 2px solid var(--pink); 
            padding: 18px 55px; 
            cursor: pointer; 
            background: transparent; 
            color: var(--pink); 
            letter-spacing: 6px;
            font-weight: 700; 
            font-family: 'Fira Code';
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--pink); 
        }
        .enter-btn:hover { 
            background: var(--pink); 
            color: #000; 
            box-shadow: 0 0 60px var(--pink); 
            transform: scale(1.1); 
        }

        /* --- 4. GIAO DIỆN CHÍNH - CARD KÍNH ANH ĐÀO --- */
        .main-wrapper { 
            height: 100vh; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            opacity: 0; 
            perspective: 2000px; 
            transition: all 2s ease; 
            z-index: 10; 
            visibility: hidden;
        }
        .main-wrapper.active { opacity: 1; visibility: visible; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px; 
            padding: 60px 45px; 
            width: 380px;
            text-align: center; 
            border: 1px solid rgba(255, 77, 148, 0.25);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), 
                        0 0 40px rgba(255, 77, 148, 0.1);
            transform-style: preserve-3d; 
            transition: transform 0.1s ease-out;
        }

        .avatar-box {
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 3px solid var(--pink); 
            margin: 0 auto 30px; 
            box-shadow: 0 0 45px var(--pink);
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #000; 
            animation: waterFloat 5s ease-in-out infinite;
        }
        .avatar-box span { 
            color: var(--pink); 
            font-size: 50px; 
            font-weight: 900; 
            text-shadow: 0 0 25px var(--pink); 
        }

        h1 { 
            color: #fff; 
            font-size: 32px; 
            font-weight: 700;
            text-shadow: 0 0 25px var(--pink); 
            margin-bottom: 15px; 
            animation: waterFloat 4s ease-in-out infinite; 
        }
        
        .typewriter { 
            height: 30px; 
            color: rgba(255,255,255,0.85); 
            font-size: 14px; 
            margin-bottom: 40px; 
            font-family: 'Fira Code';
        }

        .links { 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
        }
        .link-item {
            background: rgba(255, 255, 255, 0.05); 
            padding: 18px 30px; 
            color: #fff;
            text-decoration: none; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px;
            transition: all 0.4s ease;
        }
        .link-item i { 
            color: var(--pink); 
            font-size: 24px; 
            filter: drop-shadow(0 0 10px var(--pink)); 
        }
        .link-item:hover { 
            background: rgba(255, 77, 148, 0.3); 
            transform: translateZ(50px) scale(1.05); 
            border-color: var(--pink);
            box-shadow: 0 10px 30px rgba(255, 77, 148, 0.3);
        }

        #music-btn {
            position: fixed; 
            top: 40px; 
            right: 40px; 
            z-index: 10005;
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: 2px solid var(--pink);
            color: var(--pink); 
            display: none; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(10px);
            transition: 0.5s;
        }
        #music-btn:hover { transform: rotate(360deg) scale(1.1); box-shadow: 0 0 30px var(--pink); }

        @keyframes waterFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1.5deg); }
        }

        .footer-info { 
            position: fixed; 
            bottom: 25px; 
            right: 35px; 
            font-size: 12px; 
            color: rgba(255,255,255,0.2); 
            font-family: 'Fira Code'; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div id="overlay">
        <div class="loading-content">
            <div class="loading-img-box">
                <img id="mainLoadImg" src="" alt="Madding">
            </div>
            <div class="logo-enter">HUNG MADDING</div>
            <div class="loader-container" id="loader">
                <div class="progress-bar">
                    <div class="progress-fill" id="fill"></div>
                </div>
                <div class="load-text" id="status">ĐANG LOAD NÈ MÁ... 0%</div>
            </div>
            <button class="enter-btn" id="enterBtn" onclick="startExperience()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-compact-disc"></i></div>
    <audio id="bg-audio" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="main-wrapper" id="mainContent">
        <div class="card" id="profileCard">
            <div class="avatar-box"><span>H</span></div>
            <h1>Nguyễn Mạnh Hùng</h1>
            <div class="typewriter" id="typewriter"></div>
            <div class="links">
                <a href="https://facebook.com/m.hung.11.02" class="link-item">
                    <span>Facebook</span><i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://github.com/hungmadding" class="link-item">
                    <span>GitHub</span><i class="fab fa-github"></i>
                </a>
                <a href="https://tiktok.com/@hung_madding" class="link-item">
                    <span>TikTok</span><i class="fab fa-tiktok"></i>
                </a>
                <div class="link-item" style="cursor:pointer;" onclick="alert('Cảm ơn bạn đã ghé thăm Bio của Hùng nhé! ❤️')">
                    <span>About me</span><i class="fas fa-heart"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-info">NHÌN CÁI DB</div>

    <script>
        // Fix đường dẫn file ảnh chờ có dấu
        document.getElementById('mainLoadImg').src = decodeURIComponent('%E1%BA%A3nh%20ch%E1%BB%9D.jpg');

        const audio = document.getElementById('bg-audio');
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        const enterBtn = document.getElementById('enterBtn');
        const loader = document.getElementById('loader');

        // Logic Loading mượt mà
        let progress = 0;
        const loadingInterval = setInterval(() => {
            if (progress >= 100) {
                clearInterval(loadingInterval);
                status.innerText = "SYSTEM READY!";
                status.style.color = "#fff";
                status.style.textShadow = "0 0 10px var(--pink)";
                
                setTimeout(() => {
                    loader.style.opacity = '0';
                    loader.style.transform = 'translateY(20px)';
                    setTimeout(() => { 
                        loader.style.display = 'none'; 
                        enterBtn.style.display = 'block'; 
                        enterBtn.style.animation = 'waterFloat 2s infinite';
                    }, 600);
                }, 500);
            } else {
                let step = Math.random() * 2.5;
                progress += step;
                if(progress > 100) progress = 100;
                fill.style.width = progress + '%';
                status.innerText = `ĐANG LOAD NÈ MÁ... ${Math.floor(progress)}%`;
            }
        }, 45);

        // Khởi tạo hệ thống chính
        function startExperience() {
            const overlay = document.getElementById('overlay');
            overlay.style.transform = 'scale(2) rotate(5deg)';
            overlay.style.opacity = '0';
            overlay.style.filter = 'blur(20px)';
            
            audio.play().catch(e => console.log("Audio Error: ", e));
            
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                document.getElementById('music-btn').style.display = 'flex';
                document.getElementById('bg-image').style.transform = 'scale(1.1)';
                startTypewriter();
            }, 1200);
        }

        function startTypewriter() {
            const text = "> Booting Bio-OS Terminal v3.22... Success!";
            let index = 0;
            const container = document.getElementById('typewriter');
            function type() {
                if (index < text.length) {
                    container.innerHTML += text.charAt(index++);
                    setTimeout(type, 70);
                }
            }
            type();
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                document.getElementById('music-btn').style.animation = 'rotate 2s linear infinite';
            } else {
                audio.pause();
                document.getElementById('music-btn').style.animation = 'none';
            }
        }

        // HỆ THỐNG TUYẾT RƠI ĐA TẦNG (DETAILED SNOW)
        const canvases = [
            document.getElementById('canvas-bg'), 
            document.getElementById('canvas-mid'), 
            document.getElementById('canvas-foreground')
        ];
        const ctxs = canvases.map(c => c.getContext('2d'));
        let snowParticles = [[], [], []];

        class Particle {
            constructor(stage) {
                this.stage = stage;
                this.reset();
            }
            reset() {
                const canvas = canvases[this.stage];
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = [1.5, 3.5, 5.5][this.stage];
                this.velocity = [0.7, 1.5, 2.5][this.stage];
                this.opacity = [0.2, 0.45, 0.75][this.stage];
                this.wind = Math.random() * 1 - 0.5;
            }
            update() {
                this.y += this.velocity;
                this.x += this.wind;
                if (this.y > window.innerHeight) this.reset();
            }
            draw() {
                const ctx = ctxs[this.stage];
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initEnvironment() {
            canvases.forEach((c, i) => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
                const count = [80, 40, 20][i];
                snowParticles[i] = Array.from({length: count}, () => new Particle(i));
            });
        }

        function runAnimation() {
            ctxs.forEach((ctx, i) => {
                ctx.clearRect(0, 0, canvases[i].width, canvases[i].height);
                snowParticles[i].forEach(p => {
                    p.update();
                    p.draw();
                });
            });
            requestAnimationFrame(runAnimation);
        }

        // HIỆU ỨNG CARD 3D THEO CHUỘT
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 20;
            const y = (window.innerHeight / 2 - e.clientY) / 20;
            const card = document.getElementById('profileCard');
            if(card) {
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            }
        });

        window.addEventListener('resize', initEnvironment);
        initEnvironment();
        runAnimation();

        console.log("Bio-OS v3.22 Fully Loaded - Developed for Hung Madding");
    </script>
</body>
</html>
