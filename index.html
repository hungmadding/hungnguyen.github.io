<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hungmadding</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:black;
    font-family:'Inter',sans-serif;
    overflow:hidden;
    color:white;
}

/* canvas nền */
canvas{
    position:fixed;
    inset:0;
    z-index:-2;
}

/* overlay */
#overlay{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
    z-index:10;
}

/* card */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.card{
    width:320px;
    padding:30px;
    border-radius:25px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(30px);
    text-align:center;
    transition:0.2s;
}

/* glow border */
.card::before{
    content:'';
    position:absolute;
    inset:-2px;
    border-radius:25px;
    background:linear-gradient(45deg,#ff00cc,#00ffff,#ff00cc);
    background-size:300%;
    animation:border 8s linear infinite;
    z-index:-1;
}
@keyframes border{
    0%{background-position:0%}
    100%{background-position:300%}
}

/* avatar */
.avatar{
    width:90px;
    border-radius:50%;
    margin-bottom:10px;
    box-shadow:0 0 25px #ff00cc;
}

/* text */
h1{text-shadow:0 0 20px #ff00cc;}
.tag{color:#ff66cc;margin-bottom:20px}

/* links */
.link{
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.05);
    transition:0.3s;
}
.link:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #ff00cc;
}

/* music */
.music{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:10px;
    border-radius:50%;
    border:1px solid #ff00cc;
    cursor:pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="overlay" onclick="start()">
<h2>CLICK TO ENTER</h2>
</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="music" onclick="toggleMusic()">🎵</div>

<div class="container">
<div class="card" id="card">

<img src="https://i.imgur.com/uIKY94v.png" class="avatar">
<h1>Hùng Madding</h1>
<div class="tag">Pink God Level</div>

<a class="link" href="https://facebook.com/hung.madding">Facebook</a>
<a class="link" href="https://tiktok.com/@hung_md3">TikTok</a>
<a class="link" href="#">GitHub</a>

</div>
</div>

<script>
/* music */
let music=document.getElementById("music");
function start(){
overlay.style.display="none";
music.volume=0;
music.play();
let fade=setInterval(()=>{
if(music.volume<1) music.volume+=0.05;
else clearInterval(fade);
},100);
}
function toggleMusic(){
music.paused?music.play():music.pause();
}

/* 3D smooth tilt */
let card=document.getElementById("card");
let mx=0,my=0,tx=0,ty=0;

document.addEventListener("mousemove",e=>{
mx=(e.clientX-window.innerWidth/2)/30;
my=(e.clientY-window.innerHeight/2)/30;
});

function animate(){
tx+=(mx-tx)*0.1;
ty+=(my-ty)*0.1;
card.style.transform=`rotateY(${tx}deg) rotateX(${-ty}deg)`;
requestAnimationFrame(animate);
}
animate();

/* galaxy particles */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
let stars=[];

function init(){
c.width=innerWidth;
c.height=innerHeight;
stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
z:Math.random()*c.width
});
}
}

function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,c.width,c.height);

stars.forEach(s=>{
s.z-=1;
if(s.z<=0) s.z=c.width;

let k=128/s.z;
let px=s.x*k+c.width/2;
let py=s.y*k+c.height/2;

let size=(1-s.z/c.width)*3;

ctx.fillStyle="#ff4d94";
ctx.fillRect(px,py,size,size);
});

requestAnimationFrame(draw);
}

init();
draw();
</script>

</body>
</html>
