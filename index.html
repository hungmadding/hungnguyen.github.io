<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Python Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077; 
            --pink-dark: #cc3a73;
            --bg: #0a0a0a; 
            --glass: rgba(255,255,255,0.03);
            --text: rgba(255,255,255,0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        body, html { 
            height: 100%; 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            overflow: hidden;
        }

        /* LOADING SCREEN UPGRADED */
        #overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg) 0%, #1a0a1a 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .logo { font-size: 3rem; font-weight: 700; margin-bottom: 2rem; animation: logoFloat 3s ease-in-out infinite; }
        .loading-bar { 
            width: 300px; height: 4px; background: rgba(255,255,255,0.1); 
            border-radius: 2px; overflow: hidden; margin-top: 2rem;
        }
        .loading-progress {
            height: 100%; background: linear-gradient(90deg, var(--pink), var(--pink-glow));
            width: 0%; border-radius: 2px; animation: load 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            box-shadow: 0 0 20px var(--pink-glow);
        }
        .enter-btn { 
            border: 2px solid var(--pink); padding: 18px 40px; 
            letter-spacing: 6px; animation: neonPulse 2s infinite; 
            text-transform: uppercase; font-weight: 600; font-size: 1.1rem;
            backdrop-filter: blur(10px); background: var(--glass);
        }
        .enter-btn:hover { background: rgba(255,77,148,0.15); transform: scale(1.05); }

        @keyframes logoFloat { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-20px);} }
        @keyframes neonPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,77,148,0.7);} 50%{box-shadow:0 0 0 30px rgba(255,77,148,0);} }
        @keyframes load { to { width: 100%; } }

        /* RIPPLE EFFECT ENHANCED */
        .ripple {
            position: fixed; border: 2px solid var(--pink); border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%);
            animation: ripplePro 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            z-index: 10003;
        }
        @keyframes ripplePro {
            0% { width: 0; height: 0; opacity: 1; }
            50% { box-shadow: 0 0 0 20px rgba(255,77,148,0.3); }
            100% { width: 200px; height: 200px; opacity: 0; }
        }

        /* CURSOR SYSTEM PRO */
        #cursor { 
            position: fixed; width: 20px; height: 20px; 
            background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 10002;
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 25px var(--pink-glow), inset 0 0 10px rgba(255,255,255,0.2);
            transition: all 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #cursor.hover { width: 50px; height: 50px; opacity: 0.7; }
        #cursor.click { transform: translate(-50%, -50%) scale(0); animation: clickPulse 0.3s forwards; }
        @keyframes clickPulse { 0%{transform:translate(-50%,-50%) scale(0);} 50%{transform:translate(-50%,-50%) scale(1.2);} 100%{transform:translate(-50%,-50%) scale(1);} }

        /* SNOW SYSTEM ENHANCED (4 Layers + Stars) */
        #canvas-bg { position: fixed; inset: 0; z-index: 1; }
        #canvas-snow { position: fixed; inset: 0; z-index: 2; filter: drop-shadow(0 0 5px var(--pink)); mix-blend-mode: screen; }

        /* MAIN CONTAINER */
        .main-wrapper { 
            height: 100vh; display: flex; justify-content: center; align-items: center;
            perspective: 1500px; opacity: 0; transform: scale(0.8) rotateX(10deg);
            transition: all 2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .main-wrapper.active { opacity: 1; transform: scale(1) rotateX(0deg); }

        /* GLASS CARD ULTIMATE */
        .card {
            background: linear-gradient(145deg, rgba(20,20,30,0.8), rgba(10,10,20,0.9));
            backdrop-filter: blur(35px) saturate(180%);
            border-radius: 40px; padding: 60px 50px; width: 420px; text-align: center;
            position: relative; border: 1px solid rgba(255,77,148,0.2);
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            transform-style: preserve-3d; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card::before {
            content: ''; position: absolute; inset: 0; border-radius: 40px;
            padding: 2px; background: linear-gradient(45deg, var(--pink), var(--pink-glow), #ff69b4);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.3;
            z-index: -1;
        }

        /* AVATAR SYSTEM PRO */
        .avatar-container { 
            position: relative; width: 140px; height: 140px; margin: 0 auto 30px;
            animation: floatCard 6s ease-in-out infinite;
        }
        .avatar { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 4px solid transparent;
            background: linear-gradient(var(--pink), var(--pink-glow)) padding-box,
                        linear-gradient(45deg, var(--pink), #ff69b4) border-box;
            position: relative; z-index: 3; object-fit: cover;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 40px rgba(255,77,148,0.4);
        }
        .avatar-container:hover .avatar { transform: scale(1.05) rotate(5deg); }
        .avatar-glow-1, .avatar-glow-2 {
            position: absolute; inset: -12px; border-radius: 50%;
            filter: blur(25px); opacity: 0.25;
        }
        .avatar-glow-1 { background: radial-gradient(circle, var(--pink-glow), transparent); animation: glowPulse 3s infinite; }
        .avatar-glow-2 { background: radial-gradient(circle, var(--pink), transparent); animation: glowPulse 3s 1.5s infinite reverse; }

        @keyframes floatCard { 0%,100%{transform:translateY(0px) rotateX(0deg);} 50%{transform:translateY(-15px) rotateX(2deg);} }
        @keyframes glowPulse { 0%,100%{opacity:0.25; transform:scale(1);} 50%{opacity:0.5; transform:scale(1.2);} }

        /* TEXT EFFECTS */
        h1 { 
            color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, var(--pink) 50%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; text-shadow: 0 0 30px rgba(255,77,148,0.3);
        }
        .subtitle { color: var(--text); font-size: 14px; margin-bottom: 8px; opacity: 0.8; }

        /* TYPEWRITER UPGRADED */
        .typewriter {
            font-family: 'Fira Code', monospace; color: var(--pink);
            font-size: 12px; letter-spacing: 3px; height: 20px; margin: 30px 0;
            font-weight: 500; border-right: 2px solid var(--pink);
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,50%{border-color:var(--pink);} 51%,100%{border-color:transparent;} }

        /* LINKS SYSTEM PRO */
        .links { position: relative; }
        .link-item {
            background: var(--glass); padding: 20px 30px; border-radius: 20px;
            color: var(--text); text-decoration: none; display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 16px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative; overflow: hidden;
        }
        .link-item::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%); transition: transform 0.6s;
        }
        .link-item:hover::before { transform: translateX(100%); }
        .link-item:hover { 
            background: linear-gradient(135deg, rgba(255,77,148,0.25), rgba(255,77,148,0.15));
            color: #fff; border-color: var(--pink); 
            transform: translateX(12px) translateZ(50px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255,77,148,0.3), 0 0 30px rgba(255,77,148,0.2);
        }
        .link-item i { font-size: 1.2rem; opacity: 0.8; transition: all 0.3s ease; }
        .link-item:hover i { transform: scale(1.2) rotate(10deg); opacity: 1; }

        /* FLOATING ELEMENTS */
        .floating-elements {
            position: fixed; inset: 0; pointer-events: none; z-index: 3;
        }
        .float-item {
            position: absolute; color: var(--pink); font-size: 20px; opacity: 0.1;
            animation: floatUp 20s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* UI CONTROLS */
        .music-toggle, .stats {
            position: fixed; bottom: 25px; left: 25px; color: var(--pink); 
            font-size: 11px; font-family: 'Fira Code', monospace; opacity: 0.6;
            cursor: pointer; padding: 12px 20px; backdrop-filter: blur(20px);
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px; transition: all 0.3s ease; z-index: 100;
        }
        .music-toggle:hover, .stats:hover { opacity: 1; transform: scale(1.05); }
        .stats { left: auto; right: 25px; }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed; top: 30px; right: 30px; padding: 15px 25px;
            background: linear-gradient(135deg, var(--pink), var(--pink-glow));
            color: white; border-radius: 30px; font-weight: 500; z-index: 10004;
            transform: translateX(400px); opacity: 0; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .toast.show { transform: translateX(0); opacity: 1; }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .card { width: 90vw; padding: 45px 35px; margin: 15px; }
            .avatar-container { width: 110px; height: 110px; }
            h1 { font-size: 24px; }
            #cursor { display: none !important; }
            .main-wrapper { perspective: none; }
            .music-toggle, .stats { font-size: 10px; padding: 10px 15px; }
        }
    </style>
</head>
