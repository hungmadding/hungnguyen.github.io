<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nguyễn Mạnh Hùng | Bio-OS v3.22 Full</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077;
            --glass: rgba(10, 5, 10, 0.1);
            --neon-border: 2px solid var(--pink);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; width: 100%; 
            font-family: 'Quicksand', sans-serif; 
            background: #000; 
            overflow: hidden; 
        }

        /* --- BACKGROUND MODULE --- */
        #bg-image {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0;
        }

        /* --- SNOW SYSTEM (3 INDEPENDENT LAYERS) --- */
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-foreground { z-index: 10001; }

        /* --- LOADING MODULE (DEEP MADDING STYLE) --- */
        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: opacity 1.5s ease-in-out;
        }
        
        .loading-content { 
            display: flex; flex-direction: column; 
            align-items: center; gap: 40px; width: 100%; 
        }
        
        /* ẢNH CHỜ KIỆT TÁC CỦA HÙNG */
        .loading-img-box {
            width: 280px; height: 400px; 
            border-radius: 35px; 
            border: 2px solid var(--pink);
            box-shadow: 0 0 60px var(--pink-glow);
            overflow: hidden; 
            animation: float 4s ease-in-out infinite;
        }
        .loading-img-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: contrast(1.1) brightness(1.1);
        }

        .loader-container { width: 300px; text-align: center; }
        .progress-bar {
            width: 100%; height: 6px; 
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255, 77, 148, 0.2);
        }
        .progress-fill { 
            height: 100%; width: 0%; 
            background: var(--pink); 
            box-shadow: 0 0 20px var(--pink); 
        }
        .load-text { 
            font-family: 'Fira Code'; font-size: 13px; 
            margin-top: 20px; color: var(--pink); 
            letter-spacing: 3px; text-shadow: 0 0 10px var(--pink);
        }

        .enter-btn { 
            display: none; border: 2px solid var(--pink); padding: 15px 45px; 
            cursor: pointer; background: transparent; color: var(--pink); 
            letter-spacing: 5px; font-weight: 700; font-family: 'Fira Code';
            text-transform: uppercase; transition: 0.5s; 
            box-shadow: 0 0 20px var(--pink); border-radius: 8px;
        }
        .enter-btn:hover { background: var(--pink); color: #000; }

        /* --- MAIN UI MODULE --- */
        .main-wrapper { 
            height: 100dvh; width: 100%; 
            display: flex; justify-content: center; align-items: center; 
            opacity: 0; perspective: 2000px; 
            transition: 2s ease; z-index: 10; visibility: hidden;
        }
        .main-wrapper.active { opacity: 1; visibility: visible; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 50px; padding: 60px 40px; 
            width: 90%; max-width: 380px;
            text-align: center; border: 1px solid rgba(255, 77, 148, 0.2);
            position: relative; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
        }

        /* NEON LED ROTATING BORDER */
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--pink), transparent);
            animation: rotateLED 4s linear infinite; z-index: -1;
        }
        .card::after {
            content: ''; position: absolute; inset: 4px;
            background: #0a050a; border-radius: 46px; z-index: -1;
        }

        .avatar-box {
            width: 100px; height: 100px; border-radius: 50%; 
            border: 3px solid var(--pink); margin: 0 auto 30px; 
            box-shadow: 0 0 35px var(--pink);
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-box span { color: var(--pink); font-size: 50px; font-weight: 900; }

        h1 { color: #fff; font-size: 28px; text-shadow: 0 0 20px var(--pink); margin-bottom: 15px; }
        .typewriter { 
            height: 25px; color: rgba(255,255,255,0.8); 
            font-size: 14px; margin-bottom: 40px; 
            font-family: 'Fira Code'; 
        }

        /* SOCIAL LINKS */
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link-item {
            background: rgba(255, 255, 255, 0.05); padding: 18px 25px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; transition: 0.4s;
        }
        .link-item:hover { 
            background: rgba(255, 77, 148, 0.2); 
            border-color: var(--pink); 
            transform: translateZ(50px) scale(1.05); 
        }
        .link-item i { font-size: 22px; color: var(--pink); filter: drop-shadow(0 0 5px var(--pink)); }

        /* MUSIC PLAYER BUTTON */
        #music-btn {
            position: fixed; top: 30px; right: 30px; z-index: 10005;
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            box-shadow: 0 0 15px var(--pink);
        }

        /* KEYFRAMES */
        @keyframes rotateLED { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .footer-info { position: fixed; bottom: 25px; right: 30px; font-size: 11px; color: rgba(255,255,255,0.2); font-family: 'Fira Code'; }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div id="overlay">
        <div class="loading-content">
            <div class="loading-img-box">
                <img id="loadImg" src="" alt="Deep Madding">
            </div>
            <div id="loader" class="loader-container">
                <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
                <div id="status" class="load-text">INITIALIZING... 0%</div>
            </div>
            <button id="enterBtn" class="enter-btn" onclick="start()">ENTER BIO-OS</button>
        </div>
    </div>

    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-compact-disc"></i></div>
    <audio id="audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main" class="main-wrapper">
        <div id="card" class="card">
            <div class="avatar-box"><span>H</span></div>
            <h1>Nguyễn Mạnh Hùng</h1>
            <div id="tw" class="typewriter"></div>
            <div class="links">
                <a href="https://facebook.com/m.hung.11.02" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://tiktok.com/@hung_madding" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <div class="link-item" style="cursor:pointer;" onclick="alert('Cảm ơn đã ghé thăm!')"><span>About</span><i class="fas fa-user-astronaut"></i></div>
            </div>
        </div>
    </div>

    <div class="footer-info">BUILD BY HUNG MADDING v3.22</div>

    <script>
        // Load ảnh chờ
        document.getElementById('loadImg').src = decodeURIComponent('%E1%BA%A3nh%20ch%E1%BB%9D.jpg');
        
        const audio = document.getElementById('audio');
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        let prog = 0;

        // Xử lý tiến trình loading
        const loadingInterval = setInterval(function() {
            if (prog >= 100) {
                clearInterval(loadingInterval);
                status.innerText = "SYSTEM READY";
                setTimeout(function() {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('enterBtn').style.display = 'block';
                }, 600);
            } else {
                let randomStep = Math.random() * 1.8;
                prog += randomStep;
                if(prog > 100) prog = 100;
                fill.style.width = prog + '%';
                status.innerText = "INITIALIZING... " + Math.floor(prog) + "%";
            }
        }, 40);

        // Hàm bắt đầu vào hệ thống
        function start() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play().catch(function(e) { console.log("Autoplay blocked"); });
            
            setTimeout(function() {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main').classList.add('active');
                document.getElementById('music-btn').style.display = 'flex';
                document.getElementById('music-btn').style.animation = 'rotateCD 3s linear infinite';
                runTypeWriter();
            }, 1500);
        }

        // Hiệu ứng chữ chạy
        function runTypeWriter() {
            const message = "> Booting Deep Madding System... Success!";
            let index = 0;
            const target = document.getElementById('tw');
            function write() {
                if(index < message.length) {
                    target.innerHTML += message.charAt(index++);
                    setTimeout(write, 70);
                }
            }
            write();
        }

        // Bật tắt nhạc
        function toggleMusic() {
            if (audio.paused) { 
                audio.play(); 
                document.getElementById('music-btn').style.animation = 'rotateCD 3s linear infinite'; 
            } else { 
                audio.pause(); 
                document.getElementById('music-btn').style.animation = 'none'; 
            }
        }

        // --- SNOW SYSTEM LAYERS ---
        function createSnow(canvasId, count, size, speed, opacity) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            for(let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * size + 1,
                    d: Math.random() * count
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255, 255, 255, " + opacity + ")";
                ctx.beginPath();
                for(let i = 0; i < count; i++) {
                    let p = particles[i];
                    ctx.moveTo(p.x, p.y);
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
                }
                ctx.fill();
                update();
            }

            function update() {
                for(let i = 0; i < count; i++) {
                    let p = particles[i];
                    p.y += Math.cos(p.d) + 1 + speed;
                    p.x += Math.sin(0.1) * 1;
                    if(p.x > canvas.width + 5 || p.x < -5 || p.y > canvas.height) {
                        particles[i] = { x: Math.random() * canvas.width, y: -10, r: p.r, d: p.d };
                    }
                }
            }
            setInterval(draw, 33);
        }

        // Khởi tạo 3 lớp tuyết riêng biệt
        createSnow('canvas-bg', 60, 1, 0.5, 0.2);
        createSnow('canvas-mid', 40, 2.5, 1.2, 0.4);
        createSnow('canvas-foreground', 15, 5, 2.5, 0.7);

        window.addEventListener('resize', function() {
            location.reload(); // Reset lại tuyết khi xoay màn hình
        });

        // 3D TILT EFFECT
        if (!/Android|iPhone/i.test(navigator.userAgent)) {
            const cardElement = document.getElementById('card');
            window.addEventListener('mousemove', function(e) {
                let x = (window.innerWidth / 2 - e.clientX) / 25;
                let y = (window.innerHeight / 2 - e.clientY) / 25;
                cardElement.style.transform = "rotateY(" + x + "deg) rotateX(" + y + "deg)";
            });
        }
    </script>
</body>
</html>
