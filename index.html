<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nguyễn Mạnh Hùng | Bio-OS v3.17</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; --pink-glow: #ff0077;
            --bg: #0a0a0a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg); overflow: hidden; touch-action: none; }
        
        /* HỆ THỐNG CANVAS 3 LỚP ĐA CHIỀU */
        #canvas-bg, #canvas-mid, #canvas-foreground { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #canvas-foreground { z-index: 10001; } 

        /* ĐIỀU KHIỂN NHẠC */
        #music-btn {
            position: fixed; top: 25px; right: 25px; z-index: 10005;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); border: 2px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px var(--pink-glow);
        }
        #music-btn.playing i { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #overlay {
            position: fixed; inset: 0; background: #0a0a0a;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: all 1s ease;
        }
        .logo { font-size: 3rem; font-weight: 700; margin-bottom: 2rem; font-family: 'Fira Code'; text-shadow: 0 0 25px var(--pink); }
        .enter-btn { border: 2px solid var(--pink); padding: 15px 45px; cursor: pointer; text-transform: uppercase; font-weight: 600; background: transparent; color: var(--pink); transition: 0.3s; letter-spacing: 5px; }
        .enter-btn:hover { background: var(--pink); color: white; box-shadow: 0 0 50px var(--pink); }

        .main-wrapper { 
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; perspective: 1500px; perspective-origin: center center;
            transform: scale(0.9); transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 10; position: relative; padding: 20px;
        }
        .main-wrapper.active { opacity: 1; transform: scale(1); pointer-events: all; }

        .card {
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(35px) saturate(180%);
            border-radius: 40px; padding: 45px 50px; width: 400px; max-height: 85vh;
            text-align: center; border: 1px solid rgba(255, 77, 148, 0.3);
            box-shadow: 0 35px 80px rgba(0,0,0,0.9); transform-style: preserve-3d;
            transition: transform 0.2s ease-out; will-change: transform;
            display: flex; flex-direction: column; justify-content: center;
        }

        .avatar-container {
            width: 110px; height: 110px; border-radius: 50%; border: 3.5px solid var(--pink); 
            margin: 0 auto 20px; box-shadow: 0 0 35px var(--pink); overflow: hidden;
            display: flex; justify-content: center; align-items: center; transform: translateZ(80px);
            background: #111;
        }
        .avatar { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: #fff; font-size: 26px; margin-bottom: 5px; text-shadow: 0 0 15px var(--pink); transform: translateZ(60px); }
        .typewriter { height: 20px; color: #bbb; font-size: 13px; margin-bottom: 30px; font-family: 'Fira Code'; transform: translateZ(40px); }

        .links { display: flex; flex-direction: column; gap: 14px; transform: translateZ(50px); }
        .link-item {
            background: rgba(255,255,255,0.04); padding: 15px 25px; border-radius: 20px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.08); transition: 0.4s ease; cursor: pointer;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.25); border-color: var(--pink); transform: translateX(10px) translateZ(20px); }

        @media (max-width: 480px) {
            .card { width: 92%; padding: 35px 25px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo">HUNG MADDING</div>
        <button class="enter-btn" onclick="startExperience()">ENTER</button>
    </div>

    <div id="music-btn" onclick="toggleMusic()">
        <i class="fas fa-music"></i>
    </div>
    <audio id="bg-audio" loop>
        <source src="https://www.mboxdrive.com/lofi-chill.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-foreground"></canvas>

    <div class="main-wrapper" id="mainContent">
        <div class="card" id="profileCard">
            <div class="avatar-container">
                <img src="https://ui-avatars.com/api/?name=Hung+Madding&background=0a0a1a&color=fff&rounded=true&size=128" class="avatar" alt="Avatar">
            </div>

            <h1>Nguyễn Mạnh Hùng</h1>
            <div class="typewriter" id="typewriter"></div>
            
            <div class="links">
                <a href="https://www.facebook.com/profile.php" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://www.tiktok.com/" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                
                <div class="link-item" onclick="alert('Cảm ơn bạn đã quan tâm tớ! ❤️')">
                    <span>About me</span><i class="fas fa-heart"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const btn = document.getElementById('music-btn');
        const canvasB = document.getElementById('canvas-bg'), canvasM = document.getElementById('canvas-mid'), canvasF = document.getElementById('canvas-foreground');
        const ctxB = canvasB.getContext('2d'), ctxM = canvasM.getContext('2d'), ctxF = canvasF.getContext('2d');
        let stars = [], midParticles = [], frontSnow = [];

        function toggleMusic() {
            if (audio.paused) { audio.play(); btn.classList.add('playing'); }
            else { audio.pause(); btn.classList.remove('playing'); }
        }

        class Snowflake {
            constructor(canvas, depth) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.depth = depth;
                this.reset();
            }
            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                // Tuyết lớp Foreground (depth 2) sẽ to và rõ hơn
                this.size = [Math.random()*1, Math.random()*2+1, Math.random()*5+3][this.depth];
                this.speed = [Math.random()*0.2+0.1, Math.random()*0.6+0.3, Math.random()*1.5+1.0][this.depth];
                this.opacity = [0.2, 0.4, 0.7][this.depth];
            }
            update() {
                this.y += this.speed; if (this.y > this.canvas.height) this.y = -10;
            }
            draw() {
                this.ctx.globalAlpha = this.opacity;
                this.ctx.fillStyle = "#FFF";
                this.ctx.beginPath(); this.ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); this.ctx.fill();
            }
        }

        function init() {
            canvasB.width = canvasM.width = canvasF.width = window.innerWidth;
            canvasB.height = canvasM.height = canvasF.height = window.innerHeight;
            stars = Array.from({length: 80}, () => new Snowflake(canvasB, 0));
            midParticles = Array.from({length: 50}, () => new Snowflake(canvasM, 1));
            frontSnow = Array.from({length: 25}, () => new Snowflake(canvasF, 2));
        }

        function draw() {
            ctxB.clearRect(0,0,canvasB.width, canvasB.height); ctxM.clearRect(0,0,canvasM.width, canvasM.height); ctxF.clearRect(0,0,canvasF.width, canvasF.height);
            [stars, midParticles, frontSnow].forEach(g => g.forEach(p => { p.update(); p.draw(); }));
            requestAnimationFrame(draw);
        }

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play().catch(() => {});
            btn.classList.add('playing');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                btn.style.display = 'flex';
                typeWriter();
            }, 800);
        }

        function typeWriter() {
            const text = "> Booting Bio-OS Terminal v3.17... Success!";
            let i = 0; const target = document.getElementById('typewriter');
            function type() { if (i < text.length) { target.innerHTML += text.charAt(i++); setTimeout(type, 50); } }
            type();
        }

        window.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 20;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 20;
            document.getElementById('profileCard').style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
