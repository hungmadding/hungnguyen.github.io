<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hùng Nguyễn</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    color: white;
    text-align: center;
    background: black;
}

/* intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 25px;
    z-index: 999;
}

/* nền RGB */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, red, blue, cyan, lime);
    background-size: 400% 400%;
    animation: rgbBg 8s infinite;
    z-index: -1;
    opacity: 0.2;
}

@keyframes rgbBg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* glitch */
.glitch {
    position: relative;
    font-size: 30px;
}
.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
}
.glitch::before {
    color: red;
    animation: glitch1 1s infinite;
}
.glitch::after {
    color: cyan;
    animation: glitch2 1s infinite;
}

@keyframes glitch1 {
    0% {transform: translate(2px,0);}
    50% {transform: translate(-2px,0);}
    100% {transform: translate(2px,0);}
}
@keyframes glitch2 {
    0% {transform: translate(-2px,0);}
    50% {transform: translate(2px,0);}
    100% {transform: translate(-2px,0);}
}

/* avatar */
.avatar {
    width: 130px;
    border-radius: 50%;
    margin-top: 80px;
    animation: rgbShadow 3s infinite;
}

@keyframes rgbShadow {
    0% {box-shadow: 0 0 20px red;}
    50% {box-shadow: 0 0 20px cyan;}
    100% {box-shadow: 0 0 20px lime;}
}

/* link */
.links a {
    display: block;
    margin: 15px auto;
    padding: 14px;
    width: 230px;
    border-radius: 14px;
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.5);
    border: 1px solid white;
    transition: 0.3s;
}

.links a:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px cyan;
}

/* cursor */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    background: cyan;
    box-shadow: 0 0 20px cyan;
}
</style>
</head>

<body>

<div id="intro">Click để vào 😎</div>
<div class="bg"></div>
<div class="cursor" id="cursor"></div>

<img class="avatar" src="https://i.imgur.com/youravatar.jpg">

<h1 class="glitch" data-text="Hùng Nguyễn">Hùng Nguyễn</h1>
<p>🔥 Ultimate Bio</p>

<div class="links">
    <a href="https://www.facebook.com/hung.madding" target="_blank">Facebook</a>
    <a href="#">TikTok</a>
    <a href="#">Discord</a>
</div>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});

document.getElementById("intro").onclick = function() {
    this.style.display = "none";
};
</script>

</body>
</html>
