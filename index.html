<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | @hungmadding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --glass: rgba(10, 10, 15, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; color: white; perspective: 1000px; }

        /* MÀN HÌNH CHỜ */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.8s ease;
        }
        #overlay i { font-size: 60px; color: var(--pink); margin-bottom: 20px; animation: pulse 1.5s infinite; }
        #overlay p { letter-spacing: 5px; font-weight: 700; color: white; font-size: 14px; }

        /* NỀN PINTEREST */
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.pinimg.com/originals/a0/0c/33/a00c33a948e7b9b1e9b1e9b1e9b1e9b1.jpg'); background-size: cover; background-position: center; }
        
        #particles { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* CARD 3D - MẶC ĐỊNH ẨN */
        .card-container { display: none; perspective: 1000px; z-index: 10; width: 380px; }
        .card { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; 
            padding: 50px 40px; text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 20px var(--pink); margin-bottom: 25px; object-fit: cover; transform: translateZ(50px); }
        h1 { font-size: 28px; text-shadow: 0 0 15px var(--pink); margin-bottom: 10px; transform: translateZ(40px); }
        .tagline { color: var(--pink); font-weight: 700; font-size: 12px; letter-spacing: 2px; margin-bottom: 35px; text-transform: uppercase; transform: translateZ(30px); }

        .links-list { display: flex; flex-direction: column; gap: 12px; transform: translateZ(20px); }
        .link-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px; border-radius: 18px; color: white; text-decoration: none; font-weight: 700; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .link-item:hover { background: white; color: black; transform: scale(1.05); }
        .link-item i { font-size: 18px; color: var(--pink); }

        .music-btn { position: fixed; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; visibility: hidden; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startApp()">
        <i class="fas fa-play"></i>
        <p>CLICK TO ENTER</p>
    </div>

    <div class="bg-overlay"></div>
    <canvas id="particles"></canvas>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    
    <div class="music-btn" id="musicToggle"><i class="fas fa-music"></i></div>

    <div class="card-container" id="cardContainer">
        <div class="card" id="mainCard">
            <img src="https://i.imgur.com/uIKY94v.png" class="avatar" alt="Hùng Madding">
            <h1>Hùng Madding</h1>
            <div class="tagline">Python Developer | Pink Vibe</div>
            <div class="links-list">
                <a href="https://facebook.com/hung.madding" class="link-item"><span>Facebook</span> <i class="fab fa-facebook"></i></a>
                <a href="https://tiktok.com/@hung_md3" class="link-item"><span>TikTok</span> <i class="fab fa-tiktok"></i></a>
                <a href="https://github.com/hungmadding" class="link-item"><span>GitHub</span> <i class="fab fa-github"></i></a>
                <a href="#" class="link-item"><span>Discord</span> <i class="fab fa-discord"></i></a>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const overlay = document.getElementById('overlay');
        const cardContainer = document.getElementById('cardContainer');
        const card = document.getElementById('mainCard');
        const btn = document.getElementById('musicToggle');

        function startApp() {
            // 1. Tắt màn hình chờ
            overlay.style.opacity = '0';
            setTimeout(() => { 
                overlay.style.display = 'none';
                cardContainer.style.display = 'block';
                btn.style.visibility = 'visible';
                initParticles(); 
                drawParticles();
            }, 800);
            
            // 2. Phát nhạc (Nếu file music.mp3 tồn tại)
            audio.play().catch(() => console.log("Lỗi: Không tìm thấy file music.mp3"));
            btn.innerHTML = '<i class="fas fa-volume-up"></i>';
        }

        // --- TUYẾT HỒNG ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function initParticles() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i = 0; i < 60; i++) {
                dots.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, speed: Math.random() * 0.5 + 0.2, size: Math.random() * 2, op: Math.random() });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach(d => {
                ctx.fillStyle = `rgba(255, 77, 148, ${d.op})`;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2); ctx.fill();
                d.y -= d.speed; if(d.y < 0) d.y = canvas.height;
            });
            requestAnimationFrame(drawParticles);
        }

        // --- LẮC 3D (CHỈ CHẠY KHI ĐÃ VÀO TRANG) ---
        document.addEventListener("mousemove", (e) => {
            if(cardContainer.style.display === 'block') {
                let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // Nút nhạc
        btn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); btn.innerHTML = '<i class="fas fa-volume-up"></i>'; }
            else { audio.pause(); btn.innerHTML = '<i class="fas fa-volume-mute"></i>'; }
        });
    </script>
</body>
</html>
