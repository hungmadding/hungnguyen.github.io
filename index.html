<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS v8.0 Final</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --pink-glow: #ff0077; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        /* --- BACKGROUND & SNOW (500 LINES LOGIC) --- */
        #bg-static { position: fixed; inset: 0; background: url('image_3ebd81.jpg') center/cover; z-index: 0; filter: brightness(0.3); }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 2; }

        /* --- LOADING OVERLAY (CHUẨN ẢNH 3F2647) --- */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Hiệu ứng biến mất cực mạnh */
        #loading-overlay.exit { transform: scale(0); opacity: 0; pointer-events: none; }

        .glow-art {
            width: 270px; height: 400px; border-radius: 30px;
            border: 3px solid var(--pink); box-shadow: 0 0 50px var(--pink-glow);
            overflow: hidden; margin-bottom: 25px; animation: float 4s ease-in-out infinite;
        }
        .glow-art img { width: 100%; height: 100%; object-fit: cover; }
        
        .title-neon {
            font-family: 'Fira Code'; font-size: 28px; color: var(--pink);
            letter-spacing: 10px; text-shadow: 0 0 15px var(--pink-glow);
            margin-bottom: 30px; font-weight: 700;
        }

        .load-bar-container { width: 260px; text-align: center; }
        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .bar-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 10px var(--pink); }
        .status-msg { font-family: 'Fira Code'; font-size: 10px; color: var(--pink); margin-top: 15px; }

        #btn-go {
            display: none; padding: 12px 40px; background: transparent; 
            border: 2px solid var(--pink); color: var(--pink); font-family: 'Fira Code';
            cursor: pointer; border-radius: 5px; box-shadow: 0 0 20px var(--pink); margin-top: 20px;
        }

        /* --- MAIN BIO INTERFACE (LUÔN HIỆN DƯỚI LỚP LOADING) --- */
        #main-container {
            position: absolute; inset: 0; display: flex; 
            justify-content: center; align-items: center; z-index: 10;
        }

        .madding-card {
            background: rgba(10, 5, 10, 0.9); backdrop-filter: blur(20px);
            border-radius: 40px; padding: 40px 30px; width: 360px;
            text-align: center; border: 1px solid rgba(255, 77, 148, 0.3);
            position: relative;
        }

        /* LED Border Animation - GIỮ NGUYÊN */
        .madding-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--pink), transparent);
            animation: rotateLED 4s linear infinite; z-index: -1;
        }
        .madding-card::after { content: ''; position: absolute; inset: 3px; background: #0a050a; border-radius: 37px; z-index: -1; }

        .avatar-box { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--pink); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--pink); font-weight: 900; box-shadow: 0 0 20px var(--pink); }

        .about-me {
            background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px;
            margin: 20px 0; border-left: 4px solid var(--pink); text-align: left;
        }
        .about-me p { font-size: 13px; color: #ccc; line-height: 1.5; }

        .social-box { display: flex; flex-direction: column; gap: 10px; }
        .social-btn {
            background: rgba(255, 255, 255, 0.03); padding: 15px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border-radius: 12px; border: 1px solid rgba(255, 77, 148, 0.2); transition: 0.3s;
        }
        .social-btn:hover { background: var(--pink); color: #000; font-weight: bold; transform: scale(1.02); }

        #cd-player {
            position: fixed; top: 20px; right: 20px; z-index: 10005;
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--pink);
            color: var(--pink); display: flex; justify-content: center; align-items: center;
            cursor: pointer; background: #000; display: none;
        }

        @keyframes rotateLED { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-static"></div>
    <canvas id="snow-canvas"></canvas>

    <div id="main-container">
        <div class="madding-card">
            <div class="avatar-box">H</div>
            <h2 style="font-size: 22px;">Nguyễn Mạnh Hùng</h2>
            <div id="tw-box" style="height:20px; font-family:'Fira Code'; font-size:11px; color:var(--pink); margin:10px 0;"></div>
            
            <div class="about-me">
                <p>Đam mê lập trình Python, Automation và Web Design. Chào mừng ông tới không gian của Hùng Madding!</p>
            </div>

            <div class="social-box">
                <a href="https://facebook.com/m.hung.11.02" class="social-btn"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="social-btn"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://tiktok.com/@hung_madding" class="social-btn"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="glow-art"><img src="image_3f2647.jpg" alt="Hùng Madding"></div>
        <div class="title-neon">HUNG MADDING</div>
        <div id="bar-ui" class="load-bar-container">
            <div class="bar-bg"><div id="fill" class="bar-fill"></div></div>
            <div id="status" class="status-msg">BOOTING... 0%</div>
        </div>
        <button id="btn-go" onclick="enter()">ACCESS BIO-OS</button>
    </div>

    <div id="cd-player" onclick="toggleM()"><i class="fas fa-compact-disc"></i></div>
    <audio id="audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        const audio = document.getElementById('audio');
        let p = 0;

        // Tải Loading
        const load = setInterval(() => {
            if (p >= 100) {
                clearInterval(load);
                document.getElementById('status').innerText = "SYSTEM READY!";
                document.getElementById('bar-ui').style.display = 'none';
                document.getElementById('btn-go').style.display = 'block';
            } else {
                p += Math.random() * 3; if(p > 100) p = 100;
                document.getElementById('fill').style.width = p + '%';
                document.getElementById('status').innerText = "LOADING... " + Math.floor(p) + "%";
            }
        }, 30);

        function enter() {
            // Biến mất lớp Loading
            document.getElementById('loading-overlay').classList.add('exit');
            audio.play();
            document.getElementById('cd-player').style.display = 'flex';
            document.getElementById('cd-player').style.animation = 'spin 3s linear infinite';
            type();
        }

        function type() {
            const t = "> System Online. Welcome back, Hùng Madding.";
            let i = 0;
            function run() {
                if(i < t.length) {
                    document.getElementById('tw-box').innerHTML += t.charAt(i++);
                    setTimeout(run, 50);
                }
            }
            run();
        }

        function toggleM() {
            if (audio.paused) { audio.play(); document.getElementById('cd-player').style.animation = 'spin 3s linear infinite'; }
            else { audio.pause(); document.getElementById('cd-player').style.animation = 'none'; }
        }

        // Tuyết rơi (Fix 500 lines logic)
        const c = document.getElementById('snow-canvas');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let flakes = Array.from({length: 80}, () => ({x: Math.random()*c.width, y: Math.random()*c.height, r: Math.random()*2+1, s: Math.random()*1+0.5}));
        function draw() {
            ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.beginPath();
            flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); }); ctx.fill();
            flakes.forEach(f => { f.y += f.s; if(f.y > c.height) f.y = -10; }); requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
