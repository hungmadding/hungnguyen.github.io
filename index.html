<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Nguyễn | Bio Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #ffafbd;
            --secondary-color: #ffc3a0;
            --text-color: #2d3436;
            --glass-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 {
            color: var(--text-color);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: white;
            color: var(--text-color);
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .link-card:hover {
            transform: translateY(-3px);
            background: var(--text-color);
            color: white;
        }

        .social-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: var(--text-color);
            font-size: 1.5rem;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: white;
        }

        /* Hiệu ứng hạt bụi bay cho sinh động */
        .bg-dots {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.imgur.com/youravatar.jpg" alt="Hùng Nguyễn" class="profile-img">
        
        <h1>Hùng Nguyễn</h1>
        <p>✨ kolomoo pink vibe | Student & Tech Enthusiast</p>

        <div class="links-container">
            <a href="https://www.facebook.com/hung.madding" class="link-card" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://www.tiktok.com/@hung_md3" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="#" class="link-card" target="_blank">
                <i class="fab fa-discord"></i> Discord Server
            </a>
            <a href="https://github.com/hungmadding" class="link-card" target="_blank">
                <i class="fab fa-github"></i> GitHub Project
            </a>
        </div>

        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
