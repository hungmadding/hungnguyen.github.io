<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Python Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; --pink-glow: #ff0077; --pink-dark: #cc3a73;
            --bg: #0a0a0a; --glass: rgba(255,255,255,0.03); --text: rgba(255,255,255,0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg); overflow: hidden; }
        body:not(.loaded) * { cursor: none !important; }

        /* LOADING SCREEN */
        #overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--bg) 0%, #1a0a1a 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--pink); transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .logo { font-size: 3rem; font-weight: 700; margin-bottom: 2rem; animation: logoFloat 3s ease-in-out infinite; font-family: 'Fira Code', monospace; }
        .loading-bar { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 2rem; }
        .loading-progress { height: 100%; background: linear-gradient(90deg, var(--pink), var(--pink-glow)); width: 0%; border-radius: 2px; animation: load 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; box-shadow: 0 0 20px var(--pink-glow); }
        .enter-btn { border: 2px solid var(--pink); padding: 18px 40px; letter-spacing: 6px; animation: neonPulse 2s infinite; text-transform: uppercase; font-weight: 600; font-size: 1.1rem; backdrop-filter: blur(10px); background: var(--glass); cursor: pointer; margin-top: 2rem; }
        .enter-btn:hover { background: rgba(255,77,148,0.15); transform: scale(1.05); }

        @keyframes logoFloat { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-20px);} }
        @keyframes neonPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,77,148,0.7);} 50%{box-shadow:0 0 0 30px rgba(255,77,148,0);} }
        @keyframes load { to { width: 100%; } }

        /* CURSOR */
        #cursor { 
            position: fixed; width: 20px; height: 20px; background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 10002; transform: translate(-50%, -50%);
            box-shadow: 0 0 25px var(--pink-glow); transition: all 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: none;
        }
        #cursor.hover { width: 50px; height: 50px; opacity: 0.7; }
        #cursor.click { transform: translate(-50%, -50%) scale(0); animation: clickPulse 0.3s forwards; }
        @keyframes clickPulse { 0%{transform:translate(-50%,-50%) scale(0);} 50%{transform:translate(-50%,-50%) scale(1.2);} 100%{transform:translate(-50%,-50%) scale(1);} }

        /* CANVAS */
        #canvas-bg, #canvas-snow { position: fixed; inset: 0; z-index: 1; }

        /* MAIN */
        .main-wrapper { height: 100vh; display: flex; justify-content: center; align-items: center; perspective: 1500px; opacity: 0; transform: scale(0.8) rotateX(10deg); transition: all 2s cubic-bezier(0.23, 1, 0.32, 1); }
        .main-wrapper.active { opacity: 1; transform: scale(1) rotateX(0deg); }

        .card {
            background: linear-gradient(145deg, rgba(20,20,30,0.8), rgba(10,10,20,0.9)); backdrop-filter: blur(35px) saturate(180%);
            border-radius: 40px; padding: 60px 50px; width: 420px; text-align: center; position: relative;
            border: 1px solid rgba(255,77,148,0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transform-style: preserve-3d; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar-container { position: relative; width: 140px; height: 140px; margin: 0 auto 30px; animation: floatCard 6s ease-in-out infinite; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 4px solid transparent; background: linear-gradient(var(--pink), var(--pink-glow)) padding-box, linear-gradient(45deg, var(--pink), #ff69b4) border-box; position: relative; z-index: 3; object-fit: cover; box-shadow: 0 0 40px rgba(255,77,148,0.4); }
        
        h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, #fff 0%, var(--pink) 50%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .typewriter { font-family: 'Fira Code', monospace; color: var(--pink); font-size: 12px; letter-spacing: 3px; height: 20px; margin: 20px 0; border-right: 2px solid var(--pink); }

        .link-item {
            background: var(--glass); padding: 15px 25px; border-radius: 20px; color: var(--text); text-decoration: none; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.4s; border: 1px solid rgba(255,255,255,0.08);
        }
        .link-item:hover { background: rgba(255,77,148,0.2); transform: translateX(10px); color: #fff; border-color: var(--pink); }

        .music-toggle, .stats {
            position: fixed; bottom: 25px; left: 25px; color: var(--pink); font-size: 11px; font-family: 'Fira Code', monospace;
            padding: 12px 20px; backdrop-filter: blur(20px); background: var(--glass); border-radius: 25px; z-index: 100; cursor: pointer;
        }
        .stats { left: auto; right: 25px; }
        .toast { position: fixed; top: 30px; right: 30px; padding: 15px 25px; background: var(--pink); color: white; border-radius: 30px; opacity: 0; transition: 0.4s; z-index: 10000; }
        .toast.show { opacity: 1; }

        @keyframes floatCard { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    </style>
</head>
<body>

    <div id="overlay" onclick="startExperience()">
        <div class="logo">HUNG MADDING</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <div class="enter-btn">ENTER TERMINAL</div>
    </div>

    <div id="cursor"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-snow"></canvas>

    <div class="main-wrapper" id="mainContent">
        <div class="card">
            <div class="avatar-container">
                <img src="https://i.imgur.com/uIKY94v.png" class="avatar" alt="Avatar">
            </div>
            <h1>Hùng Madding</h1>
            <div class="subtitle">Python Developer</div>
            <div class="typewriter" id="typewriter"></div>
            
            <div class="links">
                <a href="https://facebook.com" class="link-item"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://tiktok.com" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <a href="https://github.com" class="link-item"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="#" class="link-item" onclick="copyEmail(event)"><span>Email</span><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </div>

    <div class="music-toggle" onclick="toggleMusic()"><i class="fas fa-music" id="musicIcon"></i></div>
    <div class="stats" id="stats">BIO-OS v3.0 | READY</div>
    <div class="toast" id="toast">Copied!</div>

    <script>
        const canvasBg = document.getElementById('canvas-bg');
        const canvasSnow = document.getElementById('canvas-snow');
        const ctxBg = canvasBg.getContext('2d');
        const ctxSnow = canvasSnow.getContext('2d');
        let stars = [], snowParticles = [];

        class Snowflake {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 1 + 0.5;
            }
            update() {
                this.y += this.speed;
                if (this.y > window.innerHeight) this.y = -10;
            }
            draw() {
                ctxSnow.fillStyle = "rgba(255, 255, 255, 0.5)";
                ctxSnow.beginPath();
                ctxSnow.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxSnow.fill();
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 1.5;
            }
            draw() {
                ctxBg.fillStyle = "#fff";
                ctxBg.beginPath();
                ctxBg.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxBg.fill();
            }
        }

        function init() {
            canvasBg.width = canvasSnow.width = window.innerWidth;
            canvasBg.height = canvasSnow.height = window.innerHeight;
            stars = Array.from({length: 100}, () => new Star());
            snowParticles = Array.from({length: 50}, () => new Snowflake());
        }

        function animate() {
            ctxBg.clearRect(0,0,canvasBg.width, canvasBg.height);
            ctxSnow.clearRect(0,0,canvasSnow.width, canvasSnow.height);
            stars.forEach(s => s.draw());
            snowParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                document.body.classList.add('loaded');
                document.getElementById('cursor').style.display = 'block';
                startTypewriter();
            }, 1000);
        }

        function startTypewriter() {
            const text = "> Python Automation Engineer _";
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById('typewriter').innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        }

        function copyEmail(e) {
            e.preventDefault();
            navigator.clipboard.writeText("contact@hungmadding.io");
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.addEventListener('mousemove', (e) => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX + 'px';
            c.style.top = e.clientY + 'px';
        });

        init(); animate();
        window.onresize = init;
    </script>
</body>
</html>
