<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hùng Madding | Bio Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --pink: #ff79c6; /* Màu hồng điểm nhấn */
            --bg-dark: #080808;
            --card-glass: rgba(20, 20, 20, 0.85);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            color: white;
        }

        /* NỀN ĐỘNG (Dùng GIF hoặc Video tối) */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            /* Thay link này bằng link GIF/Video của bạn nếu muốn */
            background-image: 
                radial-gradient(circle at center, #111 0%, #000 100%);
            background-size: cover;
            filter: blur(2px);
        }

        /* CARD BIO */
        .card {
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 50px 35px;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 60px rgba(0,0,0,1);
            animation: floating 4s ease-in-out infinite; /* Hiệu ứng lơ lửng */
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* AVATAR CÓ VIỀN PHÁT SÁNG */
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid var(--pink);
            box-shadow: 0 0 20px var(--pink);
            object-fit: cover;
            margin-bottom: 20px;
            background: #222; /* Màu nền tạm nếu ảnh lỗi */
        }

        h1 { font-size: 26px; margin: 0; letter-spacing: 1px; font-weight: 700; }
        .bio-text { color: var(--pink); font-size: 14px; margin: 8px 0 30px; font-weight: 500; }

        .links-list { display: flex; flex-direction: column; gap: 12px; }

        .link-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px; border-radius: 12px;
            color: white; text-decoration: none;
            font-weight: 600; font-size: 15px;
            transition: 0.3s all;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .link-btn:hover {
            background: #fff; color: #000;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .link-btn i { font-size: 18px; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="card">
        <img src="LINK_ẢNH_THẬT_CỦA_BẠN_Ở_ĐÂY" class="avatar" alt="Hùng Madding">
        
        <h1>Hùng Madding</h1>
        <div class="bio-text">hungmadding ngu lol | Siêu tuất</div>

        <div class="links-list">
            <a href="https://facebook.com/hung.madding" class="link-btn"><i class="fab fa-facebook-f"></i> Facebook</a>
            <a href="https://tiktok.com/@hung_md3" class="link-btn"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="https://github.com/hungmadding" class="link-btn"><i class="fab fa-github"></i> GitHub</a>
            <a href="#" class="link-btn"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </div>

</body>
</html>
