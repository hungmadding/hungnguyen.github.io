<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Cinematic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
:root{
--pink:#ff4fa3;
--blue:#6ee7ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
overflow:hidden;
font-family:'Inter',sans-serif;

/* NỀN ANIME THẬT */
background:
radial-gradient(circle at 20% 30%, rgba(255,79,163,0.4), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(110,231,255,0.3), transparent 40%),
linear-gradient(120deg,#0f0f1a,#1a1a2e,#0f0f1a);
}

/* ánh sáng mờ */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(120deg,#ff4fa3,#6ee7ff);
opacity:0.08;
filter:blur(120px);
}

/* CARD */
.wrapper{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:360px;
padding:50px;
border-radius:30px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 60px rgba(255,79,163,0.15);

text-align:center;
transition:0.3s;
}

/* AVATAR */
.avatar{
width:100px;height:100px;
border-radius:50%;
border:2px solid var(--pink);
margin-bottom:20px;

box-shadow:
0 0 20px var(--pink),
0 0 40px rgba(255,79,163,0.5);
}

/* TEXT */
h1{
color:#fff;
font-weight:600;
margin-bottom:10px;
}

.type{
color:var(--pink);
font-size:13px;
letter-spacing:2px;
margin-bottom:30px;
}

/* LINKS */
.link{
display:block;
padding:15px;
margin-bottom:12px;
border-radius:14px;

background:rgba(255,255,255,0.06);
color:#ddd;
text-decoration:none;

transition:0.25s;
}

.link:hover{
background:linear-gradient(90deg,var(--pink),var(--blue));
color:#000;
transform:translateY(-3px) scale(1.03);
}

/* SAKURA */
canvas{
position:fixed;
inset:0;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="sakura"></canvas>

<div class="wrapper">
<div class="card">
<img src="https://i.imgur.com/uIKY94v.png" class="avatar">

<h1>Hùng Madding</h1>
<div class="type">ANIME CINEMATIC</div>

<a href="#" class="link">Facebook</a>
<a href="#" class="link">TikTok</a>
<a href="#" class="link">GitHub</a>

</div>
</div>

<script>
let c=document.getElementById("sakura");
let ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let petals=[];

/* ít nhưng đẹp */
for(let i=0;i<25;i++){
petals.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
size:Math.random()*5+3,
speed:Math.random()*0.7+0.3,
angle:Math.random()*Math.PI*2
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);

petals.forEach(p=>{
p.y+=p.speed;
p.x+=Math.sin(p.angle)*0.3;
p.angle+=0.01;

if(p.y>c.height){
p.y=0;
p.x=Math.random()*c.width;
}

ctx.beginPath();
ctx.fillStyle="rgba(255,182,193,0.7)";
ctx.ellipse(p.x,p.y,p.size,p.size/2,0,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
