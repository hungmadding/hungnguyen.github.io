<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding | Bio-OS v3.22</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077;
            --black: #000000;
            --glass: rgba(10, 5, 10, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        /* --- BACKGROUND & SNOW MODULE --- */
        #bg-image {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0;
        }
        canvas { position: fixed; inset: 0; pointer-events: none; }
        #canvas-bg { z-index: 1; }
        #canvas-mid { z-index: 2; }
        #canvas-fg { z-index: 10001; }

        /* --- LOADING SCREEN (DEEP MADDING STYLE) --- */
        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }

        /* Hiển thị tấm ảnh kiệt tác của Hùng */
        .loading-art {
            width: 280px; height: 420px;
            border-radius: 35px;
            overflow: hidden;
            margin-bottom: 35px;
            animation: float 4s ease-in-out infinite;
            /* Giữ nguyên cái viền hồng từ ảnh ông làm */
            box-shadow: 0 0 40px rgba(255, 77, 148, 0.3);
        }
        .loading-art img { width: 100%; height: 100%; object-fit: cover; }

        .brand-title {
            font-family: 'Fira Code', monospace;
            font-size: 34px; font-weight: 700;
            color: var(--pink); letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--pink-glow);
            margin-bottom: 30px;
        }

        .loader-ui { width: 300px; text-align: center; }
        .bar-container {
            width: 100%; height: 4px; background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 77, 148, 0.1);
        }
        .bar-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 15px var(--pink); transition: 0.1s; }
        
        .status-log { font-family: 'Fira Code'; font-size: 10px; color: var(--pink); margin-top: 15px; letter-spacing: 2px; height: 15px; }
        .percent-num { font-family: 'Fira Code'; font-size: 16px; color: var(--pink); margin-top: 5px; }

        .btn-access { 
            display: none; border: 2px solid var(--pink); padding: 15px 40px; 
            cursor: pointer; background: transparent; color: var(--pink); 
            font-family: 'Fira Code'; font-weight: 700; letter-spacing: 3px;
            border-radius: 8px; margin-top: 25px; transition: 0.4s;
            box-shadow: 0 0 15px var(--pink);
        }
        .btn-access:hover { background: var(--pink); color: #000; box-shadow: 0 0 30px var(--pink); }

        /* --- MAIN UI MODULE --- */
        .main-content { 
            height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; 
            opacity: 0; visibility: hidden; transition: 2.5s; z-index: 10;
        }
        .main-content.active { opacity: 1; visibility: visible; }

        .profile-card {
            background: rgba(10, 5, 10, 0.85); backdrop-filter: blur(25px);
            border-radius: 45px; padding: 55px 35px; width: 360px;
            text-align: center; position: relative; overflow: hidden;
            border: 1px solid rgba(255, 77, 148, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }

        /* LED NEON BORDER ROTATE */
        .profile-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--pink), transparent);
            animation: rotateLED 4s linear infinite; z-index: -1;
        }
        .profile-card::after { content: ''; position: absolute; inset: 3px; background: #0a050a; border-radius: 42px; z-index: -1; }

        .avatar-ring {
            width: 95px; height: 95px; border-radius: 50%; border: 2px solid var(--pink); 
            margin: 0 auto 25px; box-shadow: 0 0 25px var(--pink);
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-ring span { color: var(--pink); font-size: 45px; font-weight: 900; }

        .type-line { height: 25px; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 35px; font-family: 'Fira Code'; }

        .link-group { display: flex; flex-direction: column; gap: 14px; }
        .btn-link {
            background: rgba(255, 255, 255, 0.03); padding: 16px 20px; color: #fff;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 18px; transition: 0.3s;
        }
        .btn-link:hover { background: rgba(255, 77, 148, 0.15); border-color: var(--pink); transform: translateY(-3px); }
        .btn-link i { font-size: 20px; color: var(--pink); }

        /* MUSIC UI */
        #music-control {
            position: fixed; top: 25px; right: 25px; z-index: 10005;
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--pink);
            color: var(--pink); display: none; justify-content: center; align-items: center;
            cursor: pointer; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            box-shadow: 0 0 15px var(--pink);
        }

        @keyframes rotateLED { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .sys-info { position: fixed; bottom: 20px; right: 25px; font-size: 10px; color: rgba(255,255,255,0.2); font-family: 'Fira Code'; }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-mid"></canvas>
    <canvas id="canvas-fg"></canvas>

    <div id="overlay">
        <div class="loading-wrapper">
            <div class="loading-art">
                <img id="imgSource" src="" alt="Deep Madding Art">
            </div>
            <div class="brand-title">HUNG MADDING</div>
            <div id="loader-box" class="loader-ui">
                <div class="bar-container"><div id="fill-bar" class="bar-fill"></div></div>
                <div id="status-text" class="status-log">INITIALIZING SYSTEM...</div>
                <div id="percent-val" class="percent-num">0%</div>
            </div>
            <button id="startBtn" class="btn-access" onclick="launchSystem()">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="music-control" onclick="handleMusic()"><i class="fas fa-compact-disc"></i></div>
    <audio id="bg-audio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main-ui" class="main-content">
        <div class="profile-card" id="tilt-card">
            <div class="avatar-ring"><span>H</span></div>
            <h1 style="margin-bottom:8px; font-size: 26px;">Nguyễn Mạnh Hùng</h1>
            <div id="typewriter" class="type-line"></div>
            <div class="link-group">
                <a href="https://facebook.com/m.hung.11.02" class="btn-link"><span>Facebook</span><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/hungmadding" class="btn-link"><span>GitHub</span><i class="fab fa-github"></i></a>
                <a href="https://tiktok.com/@hung_madding" class="btn-link"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <div class="btn-link" style="cursor:help;"><span>Bio-OS v3.22</span><i class="fas fa-microchip"></i></div>
            </div>
        </div>
    </div>

    <div class="sys-info">© 2026 HUNG MADDING | SYSTEM_ID: 11A6_V03</div>

    <script>
        // Load kiệt tác của ông
        document.getElementById('imgSource').src = decodeURIComponent('%E1%BA%A3nh%20ch%E1%BB%9D.jpg');
        
        const audio = document.getElementById('bg-audio');
        const fill = document.getElementById('fill-bar');
        const percent = document.getElementById('percent-val');
        const status = document.getElementById('status-text');
        let currentProg = 0;
        const messages = ["INJECTING SAKURA.GIF...", "LOADING NEON ASSETS...", "OPTIMIZING INTERFACE...", "SYSTEM READY!"];

        // Xử lý Loading
        const loadProcess = setInterval(() => {
            if (currentProg >= 100) {
                clearInterval(loadProcess);
                status.innerText = messages[3];
                percent.innerText = "100%";
                setTimeout(() => {
                    document.getElementById('loader-box').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'block';
                }, 600);
            } else {
                currentProg += Math.random() * 1.6;
                if(currentProg > 100) currentProg = 100;
                fill.style.width = currentProg + '%';
                percent.innerText = Math.floor(currentProg) + "%";
                if(currentProg < 30) status.innerText = messages[0];
                else if(currentProg < 70) status.innerText = messages[1];
                else status.innerText = messages[2];
            }
        }, 45);

        function launchSystem() {
            document.getElementById('overlay').style.opacity = '0';
            audio.play().catch(e => console.log("Audio play deferred"));
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-ui').classList.add('active');
                document.getElementById('music-control').style.display = 'flex';
                document.getElementById('music-control').style.animation = 'rotateCD 3s linear infinite';
                startTypewriter();
            }, 1200);
        }

        function startTypewriter() {
            const txt = "> Booting Madding System... Hello, Sir.";
            let i = 0;
            function run() {
                if(i < txt.length) {
                    document.getElementById('typewriter').innerHTML += txt.charAt(i++);
                    setTimeout(run, 60);
                }
            }
            run();
        }

        function handleMusic() {
            if (audio.paused) { 
                audio.play(); 
                document.getElementById('music-control').style.animation = 'rotateCD 3s linear infinite';
            } else { 
                audio.pause(); 
                document.getElementById('music-control').style.animation = 'none';
            }
        }

        // --- SNOW SYSTEM (3 LAYER INDEPENDENT) ---
        function initSnow(id, count, size, speed, opac) {
            const c = document.getElementById(id);
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let particles = Array.from({length: count}, () => ({
                x: Math.random() * c.width, y: Math.random() * c.height,
                r: Math.random() * size + 0.5, d: Math.random() * count
            }));
            function render() {
                ctx.clearRect(0, 0, c.width, c.height);
                ctx.fillStyle = `rgba(255, 255, 255, ${opac})`;
                ctx.beginPath();
                particles.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); });
                ctx.fill();
                particles.forEach(p => {
                    p.y += 1 + speed; p.x += Math.sin(0.1);
                    if(p.y > c.height) { p.y = -10; p.x = Math.random() * c.width; }
                });
                requestAnimationFrame(render);
            }
            render();
        }
        initSnow('canvas-bg', 55, 1, 0.4, 0.2);
        initSnow('canvas-mid', 35, 2.5, 1.1, 0.4);
        initSnow('canvas-fg', 12, 5, 2.2, 0.6);

        // 3D TILT EFFECT
        if (!/Android|iPhone/i.test(navigator.userAgent)) {
            const card = document.getElementById('tilt-card');
            window.addEventListener('mousemove', (e) => {
                let x = (window.innerWidth / 2 - e.clientX) / 25;
                let y = (window.innerHeight / 2 - e.clientY) / 25;
                card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
        }
    </script>
</body>
</html>
