<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hungmadding</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Inter',sans-serif;
    color:white;
    overflow:hidden;
    height:100vh;
    background:black;
}

/* nền glow */
.bg-glow{
    position:fixed;
    width:600px;
    height:600px;
    background:#ff00cc;
    filter:blur(150px);
    opacity:0.25;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:-2;
}

/* particles */
.particle{
    position:fixed;
    width:3px;
    height:3px;
    background:#ff4d94;
    border-radius:50%;
    opacity:0.5;
    animation:float linear infinite;
}
@keyframes float{
    from{transform:translateY(0)}
    to{transform:translateY(-100vh)}
}

/* container */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* card sạch */
.card{
    width:320px;
    padding:30px;
    border-radius:25px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(25px);
    text-align:center;
    border:1px solid rgba(255,255,255,0.08);
}

/* avatar */
.avatar{
    width:90px;
    border-radius:50%;
    margin-bottom:10px;
}

/* text */
h1{
    margin-bottom:5px;
}

.tag{
    color:#ff4d94;
    margin-bottom:20px;
}

/* links */
.link{
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.05);
    transition:0.3s;
}
.link:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #ff4d94;
}

/* music */
.music{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:10px;
    border-radius:50%;
    border:1px solid #ff4d94;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="music" onclick="toggleMusic()">🎵</div>

<div class="container">
<div class="card">

<img src="https://i.imgur.com/uIKY94v.png" class="avatar">

<h1>Hùng Madding</h1>

<div class="tag">💀 vừa ngu vừa tuất</div>

<a class="link" href="https://facebook.com/hung.madding" target="_blank">Facebook</a>
<a class="link" href="https://tiktok.com/@hung_md3" target="_blank">TikTok</a>
<a class="link" href="#">GitHub</a>

</div>
</div>

<script>
/* particles */
for(let i=0;i<50;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.top=Math.random()*100+"%";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

/* music */
let music=document.getElementById("music");
function toggleMusic(){
    music.paused?music.play():music.pause();
}
</script>

</body>
</html>
