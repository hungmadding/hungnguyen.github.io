            reset() {
                this.x = Math.random() * canvasSnow.width;
                this.y = Math.random() * canvasSnow.height - 100;
                this.size = (this.layer === 0) ? Math.random() * 2 + 0.5 : (this.layer === 1) ? Math.random() * 4 + 1 : Math.random() * 6 + 2;

                ctxSnow.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxSnow.fillStyle = 'white';
                ctxSnow.fill();
                ctxSnow.restore();
            }
        }

            }
