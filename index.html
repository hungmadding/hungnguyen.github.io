<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hùng Madding - Profile</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff4d94; 
            --pink-glow: #ff0077;
            --glass: rgba(15, 10, 15, 0.15);
            --glass-border: rgba(255, 77, 148, 0.25);
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { height: 100%; width: 100%; font-family: 'Quicksand', sans-serif; background: var(--bg-dark); overflow: hidden; color: #fff; }

        /* NỀN TRANG CHÍNH */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('7730f1dc01b225319269cbc655cc1998.gif') no-repeat center center;
            background-size: cover; z-index: 0; filter: brightness(0.8);
        }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #canvas-bg { z-index: 1; }

        /* =========================================
           FULL SCREEN LOADING OVERLAY 
        ========================================= */
        #overlay {
            position: fixed; 
            inset: 0; /* Phủ toàn màn hình */
            z-index: 99999; 
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            background: #000; /* Nền đen sâu */
            transition: opacity 1.2s ease-in-out, visibility 1.2s;
        }

        /* Hình nền mờ phía sau loading */
        .overlay-bg-image {
            position: absolute;
            inset: 0;
            background: url('anhcho.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(50px) brightness(0.3); /* Làm mờ cực mạnh để nổi bật nội dung */
            transform: scale(1.1);
            z-index: -1;
        }

        .loading-content { 
            position: relative; 
            z-index: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-width: 400px;
            padding: 20px;
        }
        
        .loading-img-box {
            width: 200px; 
            height: 200px; 
            border-radius: 30px; 
            overflow: hidden; 
            margin-bottom: 40px; 
            border: 2px solid var(--pink);
            box-shadow: 0 0 30px var(--pink-glow);
            animation: floatImage 4s ease-in-out infinite;
        }
        .loading-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .loading-name { 
            font-family: 'Fira Code', monospace; 
            font-size: 28px; 
            font-weight: 700; 
            letter-spacing: 10px; 
            text-shadow: 0 0 20px var(--pink-glow); 
            margin-bottom: 30px; 
            color: #fff;
            text-align: center;
        }

        .loader-container { width: 80%; max-width: 300px; }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .progress-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 15px var(--pink); transition: width 0.3s ease; }
        
        .status-box { 
            display: flex; justify-content: space-between; 
            font-family: 'Fira Code', monospace; 
            font-size: 10px; 
            color: var(--pink); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .enter-btn {
            display: none; background: rgba(255, 77, 148, 0.1); border: 1px solid var(--pink);
            color: var(--pink); padding: 15px 40px; font-family: 'Fira Code', monospace;
            font-weight: 700; font-size: 14px; letter-spacing: 3px; border-radius: 50px;
            cursor: pointer; transition: all 0.4s;
            box-shadow: 0 0 15px rgba(255, 77, 148, 0.2);
        }
        .enter-btn:hover { background: var(--pink); color: #000; box-shadow: 0 0 30px var(--pink-glow); transform: translateY(-3px); }

        /* =========================================
           MAIN UI
        ========================================= */
        .main-wrapper { position: relative; height: 100dvh; width: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; opacity: 0; visibility: hidden; }
        .main-wrapper.active { opacity: 1; visibility: visible; }
        
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 40px; width: 90%; max-width: 360px; padding: 40px 25px; text-align: center; border: 1px solid var(--glass-border); position: relative; }
        
        .avatar-box { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--pink); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--pink-glow); }
        .avatar-box span { color: var(--pink); font-size: 40px; font-weight: 900; text-shadow: 0 0 10px var(--pink-glow); }
        
        .waviy { margin-bottom: 15px; font-size: 22px; font-weight: 700; color: #fff; text-shadow: 0 0 15px var(--pink-glow); }
        .typewriter { font-family: 'Fira Code', monospace; font-size: 13px; color: var(--pink); min-height: 40px; margin-bottom: 20px; }

        .link-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 77, 148, 0.2);
            border-radius: 12px; padding: 12px 20px; color: #fff !important;
            text-decoration: none; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; transition: 0.3s;
        }
        .link-item:hover { background: rgba(255, 77, 148, 0.1); border-color: var(--pink); transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 77, 148, 0.2); }

        #greeting-toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 77, 148, 0.2); border: 1px solid var(--pink);
            padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(10px);
            color: #fff; font-size: 13px; z-index: 10006; opacity: 0; transition: 0.5s;
        }
        #greeting-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes floatImage { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    
    <canvas id="canvas-bg"></canvas>

    <div id="overlay">
        <div class="overlay-bg-image"></div> 
        <div class="loading-content">
            <div class="loading-img-box">
                <img src="anhcho.jpg" onerror="this.src='https://via.placeholder.com/200'">
            </div>
            <div class="loading-name">HUNG MADDING</div>
            
            <div id="loaderUI" class="loader-container">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div class="status-box">
                    <span id="loadStatus">Loading System...</span>
                    <span id="loadPercent">0%</span>
                </div>
            </div>
            
            <button id="enterBtn" class="enter-btn" onclick="initSystem()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="greeting-toast"></div>
    <audio id="mainAudio" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <main id="mainUI" class="main-wrapper">
        <div class="card">
            <div class="avatar-box"><span>H</span></div>
            <h1 class="waviy">Nguyễn Mạnh Hùng</h1>
            <div id="typewriter" class="typewriter"></div>
            <div class="links-container">
                <a href="#" class="link-item"><span>Facebook</span><i class="fab fa-facebook"></i></a>
                <a href="#" class="link-item"><span>TikTok</span><i class="fab fa-tiktok"></i></a>
                <a href="#" class="link-item"><span>Github</span><i class="fab fa-github"></i></a>
            </div>
        </div>
    </main>

    <script>
        const fill = document.getElementById('progressFill');
        const percentTxt = document.getElementById('loadPercent');
        const statusTxt = document.getElementById('loadStatus');
        const enterBtn = document.getElementById('enterBtn');
        const loaderUI = document.getElementById('loaderUI');
        const audio = document.getElementById('mainAudio');
        
        let currentProgress = 0;
        const loaderTask = setInterval(() => {
            if (currentProgress >= 100) {
                currentProgress = 100;
                clearInterval(loaderTask);
                loaderUI.style.display = "none";
                enterBtn.style.display = "block";
            } else {
                currentProgress += Math.random() * 3;
                if (currentProgress > 100) currentProgress = 100;
                fill.style.width = currentProgress + "%";
                percentTxt.innerText = Math.floor(currentProgress) + "%";
                if(currentProgress > 70) statusTxt.innerText = "Ready!";
            }
        }, 50);

        function initSystem() {
            document.getElementById('overlay').style.opacity = "0";
            audio.play().catch(() => {});
            setTimeout(() => {
                document.getElementById('overlay').style.display = "none";
                document.getElementById('mainUI').classList.add('active');
                showGreeting();
                startTypeWriter();
            }, 1000);
        }

        function showGreeting() {
            const hours = new Date().getHours();
            const toast = document.getElementById('greeting-toast');
            let msg = hours < 12 ? "Chào buổi sáng tốt lành! ☀️" : (hours < 18 ? "Chào buổi chiều vui vẻ! ☕" : "Chào buổi tối ấm áp! ✨");
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function startTypeWriter() {
            const text = "> cám ơn bạn trai xinh gái đẹp đã ghé thăm nha!";
            let i = 0;
            const target = document.getElementById('typewriter');
            function type() {
                if (i < text.length) { target.innerHTML += text.charAt(i); i++; setTimeout(type, 50); }
            }
            type();
        }
    </script>
</body>
</html>
